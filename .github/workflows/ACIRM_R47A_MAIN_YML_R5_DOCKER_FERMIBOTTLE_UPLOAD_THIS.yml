name: ACIRM R47A Expanded Controls R5 Docker FermiBottle Stable

"on":
  workflow_dispatch:

permissions:
  contents: read

env:
  RUN_ID: ACIRM_R47A_EXPANDED_CONTROLS_COMPLETION_RESULTS
  FERMI_DOCKER_IMAGE: fssc/fermibottle:latest

jobs:
  r47a-expanded-controls-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Prepare folders
        shell: bash
        run: |
          set -e
          mkdir -p "$RUN_ID/results" "$RUN_ID/logs" "$RUN_ID/data" "$RUN_ID/work" "$RUN_ID/pfiles"
          echo "START_UTC=$(date -u +%Y-%m-%dT%H:%M:%SZ)" | tee "$RUN_ID/logs/start_utc.txt"
          df -h . | tee "$RUN_ID/logs/disk_start.log"

      - name: Pull FermiBottle Docker image
        shell: bash
        run: |
          set +e
          docker pull "$FERMI_DOCKER_IMAGE" 2>&1 | tee "$RUN_ID/logs/docker_pull.log"
          rc=${PIPESTATUS[0]}
          if [ "$rc" -ne 0 ]; then
            echo "R47A_DOCKER_PULL_FAILED_NO_SCIENTIFIC_NULL" | tee "$RUN_ID/results/R47A_DOCKER_PULL_FAILED.txt"
            echo '{"verdict":"R47A_DOCKER_PULL_FAILED_NO_SCIENTIFIC_NULL","not_scientific_null":true}' > "$RUN_ID/results/R47A_DECISION_SUMMARY.json"
            python3 -m zipfile -c "$RUN_ID.zip" "$RUN_ID/results" "$RUN_ID/logs" || true
            sha256sum "$RUN_ID.zip" > "$RUN_ID.zip.sha256.txt" || true
            exit 0
          fi

