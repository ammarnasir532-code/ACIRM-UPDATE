name: ACIRM R49 Diffuse Background Model Systematics R1 Docker FermiBottle

"on":
  workflow_dispatch:

permissions:
  contents: read

env:
  RUN_ID: ACIRM_R49_DIFFUSE_BACKGROUND_MODEL_SYSTEMATICS_RESULTS
  FERMI_DOCKER_IMAGE: fssc/fermibottle:latest

jobs:
  r49-background-model-systematics:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Prepare folders
        shell: bash
        run: |
          set -e
          mkdir -p "$RUN_ID/results" "$RUN_ID/logs" "$RUN_ID/data" "$RUN_ID/work" "$RUN_ID/pfiles"
          echo "START_UTC=$(date -u +%Y-%m-%dT%H:%M:%SZ)" | tee "$RUN_ID/logs/start_utc.txt"
          df -h . | tee "$RUN_ID/logs/disk_start.log"

      - name: Pull FermiBottle Docker image
        shell: bash
        run: |
          set +e
          docker pull "$FERMI_DOCKER_IMAGE" 2>&1 | tee "$RUN_ID/logs/docker_pull.log"
          rc=${PIPESTATUS[0]}
          if [ "$rc" -ne 0 ]; then
            echo "R49_DOCKER_PULL_FAILED_NO_SCIENTIFIC_NULL" | tee "$RUN_ID/results/R49_DOCKER_PULL_FAILED.txt"
            echo '{"verdict":"R49_DOCKER_PULL_FAILED_NO_SCIENTIFIC_NULL","not_scientific_null":true}' > "$RUN_ID/results/R49_DECISION_SUMMARY.json"
            python3 -m zipfile -c "$RUN_ID.zip" "$RUN_ID/results" "$RUN_ID/logs" || true
            sha256sum "$RUN_ID.zip" > "$RUN_ID.zip.sha256.txt" || true
            exit 0
          fi

      - name: Write R49 inner script
        shell: bash
        run: |
          cat > r49_inside_fermibottle.sh <<'R49INNER'
          #!/usr/bin/env bash
          set +u
          set -o pipefail
          export RUN_ID="${RUN_ID:-ACIRM_R49_DIFFUSE_BACKGROUND_MODEL_SYSTEMATICS_RESULTS}"
          mkdir -p "$RUN_ID/results" "$RUN_ID/logs" "$RUN_ID/data" "$RUN_ID/work" "$RUN_ID/pfiles"
          # FermiBottle usually sets FERMI_DIR/CALDB/PATH, but keep a defensive path pass.
          if [ -f /opt/conda/etc/profile.d/conda.sh ]; then source /opt/conda/etc/profile.d/conda.sh || true; fi
          if command -v conda >/dev/null 2>&1; then conda activate fermi || source activate fermi || true; fi
          for d in /opt/anaconda/envs/fermi/bin /opt/conda/envs/fermi/bin /home/fermi/miniconda3/envs/fermi/bin /opt/miniconda/envs/fermi/bin /usr/local/bin; do
            if [ -d "$d" ]; then export PATH="$d:$PATH"; fi
          done
          {
            echo "RUN_ID=$RUN_ID"; echo "PWD=$PWD"; echo "PATH=$PATH"; echo "FERMI_DIR=${FERMI_DIR:-}"; echo "CONDA_PREFIX=${CONDA_PREFIX:-}"; echo "CALDB=${CALDB:-}"; which python || true; python --version || true; which gtselect || true; which gtlike || true; find / -path '*/caldb/software/tools/alias_config.fits' 2>/dev/null | head -20 || true
          } | tee "$RUN_ID/logs/docker_env_probe.log"
          cat > r49_run.py <<'PYCODE'
          import os, json, hashlib, subprocess, traceback, zipfile, sys, shutil
          from pathlib import Path
          from datetime import datetime, timezone
          
          RUN_ID = os.environ.get('RUN_ID', 'ACIRM_R49_DIFFUSE_BACKGROUND_MODEL_SYSTEMATICS_RESULTS')
          ROOT = Path(RUN_ID)
          RESULTS = ROOT / 'results'
          LOGS = ROOT / 'logs'
          DATA = ROOT / 'data'
          WORK = ROOT / 'work'
          for p in [RESULTS, LOGS, DATA, WORK]:
              p.mkdir(parents=True, exist_ok=True)
          
          def write_text(path, text):
              Path(path).write_text(str(text), encoding='utf-8')
          
          try:
              import pandas as pd
              import numpy as np
          except Exception as exc:
              write_text(RESULTS/'R49_PYTHON_IMPORT_FAILURE.txt', repr(exc))
              raise
          
          LOCKED = {
              'run_id': RUN_ID,
              'source_label': '3C279',
              'target_source': '4FGL J1256.1-0547',
              'ra_deg': 194.04150390625,
              'dec_deg': -5.788700103759766,
              'irfs': 'P8R3_SOURCE_V3',
              'evclass': 128,
              'evtype': 3,
              'zmax': 90,
              'emax_mev': 300000,
              'catalog_url': 'https://fermi.gsfc.nasa.gov/ssc/data/access/lat/14yr_catalog/gll_psc_v35.fit',
              'rows': [
                  {'tag':'P4','role':'TARGET_PLUS4','week':290,'tmin_met':409104385.0,'tmax_met':409710423.0},
                  {'tag':'P8','role':'TARGET_PLUS8','week':294,'tmin_met':411528090.0,'tmax_met':412127228.0},
                  {'tag':'C310','role':'CONTROL_C310','week':310,'tmin_met':421202185.0,'tmax_met':421808226.0},
              ],
              'axes': {
                  'E300': {'emin_mev':300, 'binsz_deg':0.2, 'locked_target_min_ts':947.2909592286205, 'locked_c310_ts':634.6586938330279},
                  'BINSZ010': {'emin_mev':100, 'binsz_deg':0.1, 'locked_target_min_ts':1298.9194615430806, 'locked_c310_ts':784.3474092030756},
              },
              'variants': [
                  {'variant':'SRCROI24_TIGHT_MODEL_FIELD', 'src_roiwidth_deg':24.0, 'roiwidth_deg':24.0, 'description':'same official diffuse files; smaller source-model inclusion field'},
                  {'variant':'SRCROI36_WIDE_MODEL_FIELD', 'src_roiwidth_deg':36.0, 'roiwidth_deg':24.0, 'description':'same official diffuse files; wider source-model inclusion field'},
              ],
              'claim_ceiling': 'first-order background/source-model field systematics only; official diffuse templates unchanged; not proof; not discovery; not final physical law',
          }
          (RESULTS/'R49_LOCKED_CONTEXT.json').write_text(json.dumps(LOCKED, indent=2), encoding='utf-8')
          
          def run(cmd, logname, timeout=None):
              log_path = LOGS/logname
              with log_path.open('w', encoding='utf-8') as f:
                  f.write('CMD: ' + ' '.join(map(str, cmd)) + '\n')
                  f.flush()
                  p = subprocess.run(cmd, stdout=f, stderr=subprocess.STDOUT, text=True, timeout=timeout)
                  f.write(f'\nRC={p.returncode}\n')
                  return p.returncode
          
          def download(url, outpath, logname):
              outpath = Path(outpath)
              if outpath.exists() and outpath.stat().st_size > 0:
                  return {'url':url, 'file':str(outpath), 'status':'CACHED', 'size_bytes':outpath.stat().st_size, 'rc':0}
              if shutil.which('wget'):
                  cmd = ['bash','-lc', f"wget -nv -t 5 --retry-connrefused --timeout=90 -O '{outpath}' '{url}'"]
              elif shutil.which('curl'):
                  cmd = ['bash','-lc', f"curl -L --retry 5 --retry-delay 10 --connect-timeout 90 -o '{outpath}' '{url}'"]
              else:
                  return {'url':url, 'file':str(outpath), 'status':'FAILED_NO_DOWNLOADER', 'size_bytes':0, 'rc':127}
              rc = run(cmd, logname, timeout=1800)
              ok = rc == 0 and outpath.exists() and outpath.stat().st_size > 0
              return {'url':url, 'file':str(outpath), 'status':'OK' if ok else 'FAILED', 'size_bytes':outpath.stat().st_size if outpath.exists() else 0, 'rc':rc}
          
          # Robust CALDB/PFILES discovery before importing Fermipy.
          search_roots = [os.environ.get('CALDB',''), os.environ.get('FERMI_DIR',''), os.environ.get('CONDA_PREFIX',''), '/refdata/fermi', '/opt/anaconda/envs/fermi', '/opt/conda/envs/fermi', '/opt/conda', '/usr/local', '/home/fermi']
          alias = None
          for root in [r for r in search_roots if r]:
              rootp = Path(root)
              if not rootp.exists():
                  continue
              direct = rootp/'software'/'tools'/'alias_config.fits'
              if direct.exists():
                  alias = direct; break
              found = list(rootp.glob('**/caldb/software/tools/alias_config.fits'))[:1]
              if found:
                  alias = found[0]; break
          if alias is not None:
              os.environ['CALDB'] = str(alias.parents[2])
          
          pfiles_local = Path.cwd()/RUN_ID/'pfiles'
          pfiles_local.mkdir(parents=True, exist_ok=True)
          sysps = []
          for cand in [os.environ.get('FERMI_DIR',''), os.environ.get('CONDA_PREFIX',''), '/opt/anaconda/envs/fermi', '/opt/conda/envs/fermi', '/usr/local/share/fermitools']:
              if cand:
                  sp = Path(cand)/'syspfiles'
                  if sp.exists():
                      sysps.append(str(sp))
          os.environ['PFILES'] = str(pfiles_local) + (';' + sysps[0] if sysps else '')
          
          # Diffuse paths; official recommendation is gll_iem_v07 + iso_P8R3_SOURCE_V3_v1 for normal point-source analysis.
          diff_roots = [os.environ.get('FERMI_DIR',''), os.environ.get('CONDA_PREFIX',''), os.environ.get('CALDB',''), '/refdata/fermi', '/opt/anaconda/envs/fermi', '/opt/conda/envs/fermi', '/opt/conda', '/usr/local', '/home/fermi']
          galdiff = None
          isodiff = None
          for root in [r for r in diff_roots if r]:
              rootp = Path(root)
              if not rootp.exists():
                  continue
              for pat in ['**/galdiffuse/gll_iem_v07.fits', '**/gll_iem_v07.fits']:
                  found = list(rootp.glob(pat))[:1]
                  if found and galdiff is None:
                      galdiff = str(found[0])
              for pat in ['**/galdiffuse/iso_P8R3_SOURCE_V3_v1.txt', '**/iso_P8R3_SOURCE_V3_v1.txt']:
                  found = list(rootp.glob(pat))[:1]
                  if found and isodiff is None:
                      isodiff = str(found[0])
          if not galdiff or not isodiff:
              write_text(RESULTS/'R49_DIFFUSE_DISCOVERY_FAILURE.txt', f'galdiff={galdiff}\nisodiff={isodiff}\nCALDB={os.environ.get("CALDB","")}\nPFILES={os.environ.get("PFILES","")}\n')
              raise RuntimeError('Diffuse files missing in Docker/Fermitools environment')
          write_text(RESULTS/'R49_DIFFUSE_PATHS.txt', f'CALDB={os.environ.get("CALDB","")}\nPFILES={os.environ.get("PFILES","")}\nGALDIFF={galdiff}\nISODIFF={isodiff}\n')
          
          from fermipy.gtanalysis import GTAnalysis
          write_text(RESULTS/'R49_FERMIPY_IMPORT_OK.txt', 'FERMIPY_GTANALYSIS_IMPORT_OK_AFTER_DOCKER_ENV_SETUP\n')
          try:
              import importlib.metadata as md
              lines=[]
              for pkg in ['fermipy','fermitools','gammapy','regions','astropy','numpy','matplotlib','pandas']:
                  try: lines.append(f'{pkg}={md.version(pkg)}')
                  except Exception as exc: lines.append(f'{pkg}=ERROR:{exc!r}')
              write_text(RESULTS/'R49_PACKAGE_VERSIONS.txt', '\n'.join(lines)+'\n')
          except Exception as exc:
              write_text(RESULTS/'R49_PACKAGE_VERSIONS_ERROR.txt', repr(exc))
          
          # Downloads only needed weeks P4/P8/C310 + catalog.
          download_rows=[]
          catalog_file = DATA/'gll_psc_v35.fit'
          download_rows.append(download(LOCKED['catalog_url'], catalog_file, 'dl_catalog.log'))
          for row in LOCKED['rows']:
              week=row['week']
              photon=DATA/f'lat_photon_weekly_w{week:03d}_p305_v001.fits'
              spacecraft=DATA/f'lat_spacecraft_weekly_w{week:03d}_p310_v001.fits'
              row['photon_file']=str(photon)
              row['spacecraft_file']=str(spacecraft)
              download_rows.append(download(f'https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/photon/lat_photon_weekly_w{week:03d}_p305_v001.fits', photon, f'dl_{row["tag"]}_photon.log'))
              download_rows.append(download(f'https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/spacecraft/lat_spacecraft_weekly_w{week:03d}_p310_v001.fits', spacecraft, f'dl_{row["tag"]}_spacecraft.log'))
          pd.DataFrame(download_rows).to_csv(RESULTS/'R49_DOWNLOAD_STATUS.csv', index=False)
          failed=[r for r in download_rows if r['status'].startswith('FAILED')]
          if failed:
              (RESULTS/'R49_TECH_INCOMPLETE_DOWNLOAD_FAILURE.json').write_text(json.dumps(failed, indent=2), encoding='utf-8')
              raise RuntimeError('Download failure: cannot run likelihood safely')
          
          def run_fermipy(axis_name, variant, event_row):
              axis=LOCKED['axes'][axis_name]
              tag=event_row['tag']
              vtag=variant['variant']
              workdir=WORK/f'fermipy_{axis_name}_{vtag}_{tag}'
              workdir.mkdir(parents=True, exist_ok=True)
              cfg={
                  'data': {'evfile':event_row['photon_file'], 'scfile':event_row['spacecraft_file']},
                  'binning': {'roiwidth':variant['roiwidth_deg'], 'binsz':axis['binsz_deg'], 'binsperdec':4, 'coordsys':'CEL', 'proj':'AIT'},
                  'selection': {
                      'ra':LOCKED['ra_deg'], 'dec':LOCKED['dec_deg'], 'tmin':event_row['tmin_met'], 'tmax':event_row['tmax_met'],
                      'emin':axis['emin_mev'], 'emax':LOCKED['emax_mev'], 'zmax':LOCKED['zmax'], 'evclass':LOCKED['evclass'], 'evtype':LOCKED['evtype'],
                      'target':LOCKED['target_source'],
                  },
                  'gtlike': {'irfs':LOCKED['irfs'], 'edisp':False},
                  'model': {'src_roiwidth':variant['src_roiwidth_deg'], 'galdiff':galdiff, 'isodiff':isodiff, 'catalogs':[str(catalog_file)]},
                  'fileio': {'workdir':str(workdir), 'outdir':str(workdir), 'logfile':str(LOGS/f'fermipy_{axis_name}_{vtag}_{tag}.log')},
                  'logging': {'verbosity':3},
              }
              out={
                  'axis':axis_name, 'variant':vtag, 'variant_description':variant['description'], 'tag':tag, 'role':event_row['role'], 'week':event_row['week'],
                  'src_roiwidth_deg':variant['src_roiwidth_deg'], 'roiwidth_deg':variant['roiwidth_deg'], 'emin_mev':axis['emin_mev'], 'binsz_deg':axis['binsz_deg'],
                  'target_source':LOCKED['target_source'], 'setup_ok':False, 'optimize_ok':False, 'fit_ok':False,
                  'ts':None, 'npred':None, 'flux':None, 'fit_quality':None, 'error':'',
              }
              try:
                  gta=GTAnalysis(cfg, logging={'verbosity':3})
                  gta.setup(); out['setup_ok']=True
                  try:
                      gta.optimize(); out['optimize_ok']=True
                  except Exception as exc:
                      out['error'] += 'OPTIMIZE_WARNING: '+repr(exc)+'\n'
                  try:
                      fitres=gta.fit(optimizer='NEWMINUIT', reoptimize=True); out['fit_ok']=True
                      if isinstance(fitres, dict): out['fit_quality']=fitres.get('fit_quality', None)
                  except Exception as exc:
                      out['error'] += 'FIT_ERROR: '+repr(exc)+'\n'
                  try:
                      out['ts']=float(gta.like.Ts(LOCKED['target_source']))
                  except Exception:
                      try:
                          src=gta.roi.get_source_by_name(LOCKED['target_source'])
                          out['ts']=float(src['ts'] if isinstance(src, dict) else src.ts)
                      except Exception as exc:
                          out['error'] += 'TS_EXTRACTION_ERROR: '+repr(exc)+'\n'
                  try: out['npred']=float(gta.like.NpredValue(LOCKED['target_source']))
                  except Exception: pass
                  try:
                      src=gta.roi.get_source_by_name(LOCKED['target_source'])
                      out['flux']=float(src['flux'] if isinstance(src, dict) else src.flux)
                  except Exception: pass
              except Exception as exc:
                  out['error'] += 'RUN_ERROR: '+repr(exc)+'\n'+traceback.format_exc(limit=20)
              return out
          
          all_rows=[]
          for variant in LOCKED['variants']:
              for axis_name in ['E300','BINSZ010']:
                  for erow in LOCKED['rows']:
                      print(f"[R49] Running {axis_name} {variant['variant']} {erow['tag']} week {erow['week']}", flush=True)
                      rr=run_fermipy(axis_name, variant, erow)
                      all_rows.append(rr)
                      pd.DataFrame(all_rows).to_csv(RESULTS/'R49_MODEL_SYSTEMATICS_RESULTS_PARTIAL.csv', index=False)
          res=pd.DataFrame(all_rows)
          res.to_csv(RESULTS/'R49_MODEL_SYSTEMATICS_RESULTS.csv', index=False)
          
          summary=[]
          for variant in LOCKED['variants']:
              vtag=variant['variant']
              for axis_name in ['E300','BINSZ010']:
                  sub=res[(res['variant']==vtag)&(res['axis']==axis_name)].copy()
                  numeric=pd.to_numeric(sub['ts'], errors='coerce')
                  p4=float(sub[sub['tag']=='P4']['ts'].iloc[0]) if len(sub[sub['tag']=='P4']) and pd.notna(sub[sub['tag']=='P4']['ts'].iloc[0]) else None
                  p8=float(sub[sub['tag']=='P8']['ts'].iloc[0]) if len(sub[sub['tag']=='P8']) and pd.notna(sub[sub['tag']=='P8']['ts'].iloc[0]) else None
                  c310=float(sub[sub['tag']=='C310']['ts'].iloc[0]) if len(sub[sub['tag']=='C310']) and pd.notna(sub[sub['tag']=='C310']['ts'].iloc[0]) else None
                  fit_ok_count=int(sub['fit_ok'].fillna(False).sum()) if 'fit_ok' in sub else 0
                  min_target=None if p4 is None or p8 is None else min(p4,p8)
                  margin=None if min_target is None or c310 is None else min_target-c310
                  pass_axis=bool(fit_ok_count==3 and min_target is not None and c310 is not None and margin>0)
                  summary.append({'variant':vtag, 'axis':axis_name, 'p4_ts':p4, 'p8_ts':p8, 'c310_ts':c310, 'min_p4_p8_ts':min_target, 'margin_min_target_minus_c310':margin, 'fit_ok_count':fit_ok_count, 'axis_variant_pass':pass_axis})
          sumdf=pd.DataFrame(summary)
          sumdf.to_csv(RESULTS/'R49_MODEL_SYSTEMATICS_SUMMARY.csv', index=False)
          
          if len(sumdf)==4 and sumdf['axis_variant_pass'].all():
              verdict='R49_FIRST_ORDER_BACKGROUND_SOURCE_MODEL_FIELD_SYSTEMATICS_PASS_NOT_PROOF'
          elif sumdf['axis_variant_pass'].any():
              verdict='R49_PARTIAL_SYSTEMATICS_PASS_LIMITED_NOT_PROOF'
          elif int(res['fit_ok'].fillna(False).sum()) < len(res) or int(pd.to_numeric(res['ts'], errors='coerce').notna().sum()) < len(res):
              verdict='R49_TECH_INCOMPLETE_NO_SCIENTIFIC_NULL'
          else:
              verdict='R49_SYSTEMATICS_CHALLENGE_DO_NOT_UPGRADE_CLAIM'
          
          decision={'run_id':RUN_ID, 'created_utc':datetime.now(timezone.utc).isoformat(), 'verdict':verdict, 'rows_attempted':int(len(res)), 'fit_ok_count':int(res['fit_ok'].fillna(False).sum()), 'numeric_ts_count':int(pd.to_numeric(res['ts'], errors='coerce').notna().sum()), 'summary':summary, 'claim_ceiling':LOCKED['claim_ceiling'], 'not_proof':True, 'not_discovery':True, 'not_final_physical_law':True}
          (RESULTS/'R49_DECISION_SUMMARY.json').write_text(json.dumps(decision, indent=2), encoding='utf-8')
          
          # Manual markdown; no pandas.to_markdown/tabulate dependency.
          lines=[f'# {RUN_ID}', '', f'Verdict: `{verdict}`', '', '## Model-systematics summary', '', 'variant,axis,p4_ts,p8_ts,c310_ts,min_p4_p8_ts,margin,pass']
          for s in summary:
              lines.append(f"{s['variant']},{s['axis']},{s['p4_ts']},{s['p8_ts']},{s['c310_ts']},{s['min_p4_p8_ts']},{s['margin_min_target_minus_c310']},{s['axis_variant_pass']}")
          lines += ['', '## Claim ceiling', '', LOCKED['claim_ceiling'], '', 'This is a first-order source-model field/systematics audit using official diffuse templates. It is not an alternative Galactic diffuse-template ensemble and does not establish proof/discovery/final physical law.']
          (RESULTS/'R49_REPORT.md').write_text('\n'.join(lines), encoding='utf-8')
          
          manifest=[]
          for p in sorted(RESULTS.rglob('*'))+sorted(LOGS.rglob('*')):
              if p.is_file():
                  manifest.append({'relative_path':str(p.relative_to(ROOT)), 'bytes':p.stat().st_size, 'sha256':hashlib.sha256(p.read_bytes()).hexdigest()})
          pd.DataFrame(manifest).to_csv(RESULTS/'R49_MANIFEST_SHA256.csv', index=False)
          zip_path=Path(f'{RUN_ID}.zip')
          with zipfile.ZipFile(zip_path, 'w', compression=zipfile.ZIP_DEFLATED) as z:
              for sub in [RESULTS, LOGS]:
                  for p in sub.rglob('*'):
                      if p.is_file():
                          z.write(p, arcname=str(Path(RUN_ID)/p.relative_to(ROOT)))
          sha=hashlib.sha256(zip_path.read_bytes()).hexdigest()
          Path(f'{RUN_ID}.zip.sha256.txt').write_text(f'{sha}  {RUN_ID}.zip\n', encoding='utf-8')
          print('R49 package:', zip_path)
          print('SHA256:', sha)
          print('VERDICT:', verdict)
          PYCODE
          set +e
          python r49_run.py 2>&1 | tee "$RUN_ID/logs/r49_console.log"
          PY_RC=${PIPESTATUS[0]}
          set +e
          if [ ! -f "$RUN_ID.zip" ]; then
            echo "R49_TECH_ABORT_NO_SCIENTIFIC_NULL" | tee "$RUN_ID/results/R49_TECH_ABORT_STATUS.txt"
            echo "python_return_code=$PY_RC" | tee -a "$RUN_ID/results/R49_TECH_ABORT_STATUS.txt"
            echo '{"verdict":"R49_TECH_ABORT_NO_SCIENTIFIC_NULL","not_scientific_null":true}' > "$RUN_ID/results/R49_DECISION_SUMMARY.json"
            python -m zipfile -c "$RUN_ID.zip" "$RUN_ID/results" "$RUN_ID/logs" || true
            sha256sum "$RUN_ID.zip" > "$RUN_ID.zip.sha256.txt" || true
          fi
          ls -lh "$RUN_ID"*.zip* || true
          exit 0R49INNER
          chmod +x r49_inside_fermibottle.sh

      - name: Run R49 inside FermiBottle
        shell: bash
        run: |
          set +e
          docker run --rm -e RUN_ID="$RUN_ID" -v "$PWD:/work" -w /work "$FERMI_DOCKER_IMAGE" bash /work/r49_inside_fermibottle.sh 2>&1 | tee "$RUN_ID/logs/docker_run_host_console.log"
          rc=${PIPESTATUS[0]}
          echo "docker_run_rc=$rc" | tee "$RUN_ID/logs/docker_run_rc.txt"
          if [ ! -f "$RUN_ID.zip" ]; then
            echo "R49_HOST_TECH_ABORT_NO_SCIENTIFIC_NULL" | tee "$RUN_ID/results/R49_HOST_TECH_ABORT_STATUS.txt"
            echo '{"verdict":"R49_HOST_TECH_ABORT_NO_SCIENTIFIC_NULL","not_scientific_null":true}' > "$RUN_ID/results/R49_DECISION_SUMMARY.json"
            python3 -m zipfile -c "$RUN_ID.zip" "$RUN_ID/results" "$RUN_ID/logs" || true
            sha256sum "$RUN_ID.zip" > "$RUN_ID.zip.sha256.txt" || true
          fi
          ls -lh "$RUN_ID"*.zip* || true
          exit 0

      - name: Upload R49 artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ env.RUN_ID }}
          path: |
            ${{ env.RUN_ID }}.zip
            ${{ env.RUN_ID }}.zip.sha256.txt
            ACIRM_R49_DIFFUSE_BACKGROUND_MODEL_SYSTEMATICS_RESULTS/**
          if-no-files-found: warn
