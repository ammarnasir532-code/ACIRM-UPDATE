name: ACIRM R51C Blind Validation 3C4543 R1 Docker FermiBottle

"on":
  workflow_dispatch:

permissions:
  contents: read

env:
  RUN_ID: ACIRM_R51C_BLIND_VALIDATION_3C4543_RESULTS
  FERMI_DOCKER_IMAGE: fssc/fermibottle:latest

jobs:
  r51c-blind-validation-3c4543:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Prepare folders
        shell: bash
        run: |
          set -e
          mkdir -p "$RUN_ID/results" "$RUN_ID/logs" "$RUN_ID/data" "$RUN_ID/work" "$RUN_ID/pfiles"
          echo "START_UTC=$(date -u +%Y-%m-%dT%H:%M:%SZ)" | tee "$RUN_ID/logs/start_utc.txt"
          df -h . | tee "$RUN_ID/logs/disk_start.log"

      - name: Pull FermiBottle Docker image
        shell: bash
        run: |
          set +e
          docker pull "$FERMI_DOCKER_IMAGE" 2>&1 | tee "$RUN_ID/logs/docker_pull.log"
          rc=${PIPESTATUS[0]}
          if [ "$rc" -ne 0 ]; then
            echo "R51C_DOCKER_PULL_FAILED_NO_SCIENTIFIC_NULL" | tee "$RUN_ID/results/R51C_DOCKER_PULL_FAILED.txt"
            echo '{"verdict":"R51C_DOCKER_PULL_FAILED_NO_SCIENTIFIC_NULL","not_scientific_null":true}' > "$RUN_ID/results/R51C_DECISION_SUMMARY.json"
            python3 -m zipfile -c "$RUN_ID.zip" "$RUN_ID/results" "$RUN_ID/logs" || true
            sha256sum "$RUN_ID.zip" > "$RUN_ID.zip.sha256.txt" || true
            exit 0
          fi

      - name: Write and run R51C inside FermiBottle
        shell: bash
        run: |
          set +e
          cat > r51c_inside_fermibottle.sh <<'R51INNER'
          #!/usr/bin/env bash
          set +u
          set -o pipefail
          export RUN_ID="${RUN_ID:-ACIRM_R51C_BLIND_VALIDATION_3C4543_RESULTS}"
          mkdir -p "$RUN_ID/results" "$RUN_ID/logs" "$RUN_ID/data" "$RUN_ID/work" "$RUN_ID/pfiles"
          if [ -f /opt/conda/etc/profile.d/conda.sh ]; then source /opt/conda/etc/profile.d/conda.sh || true; fi
          if command -v conda >/dev/null 2>&1; then conda activate fermi || source activate fermi || true; fi
          for d in /opt/anaconda/envs/fermi/bin /opt/conda/envs/fermi/bin /home/fermi/miniconda3/envs/fermi/bin /opt/miniconda/envs/fermi/bin /usr/local/bin; do
            if [ -d "$d" ]; then export PATH="$d:$PATH"; fi
          done
          {
            echo "RUN_ID=$RUN_ID"; echo "PWD=$PWD"; echo "PATH=$PATH"; echo "FERMI_DIR=${FERMI_DIR:-}"; echo "CONDA_PREFIX=${CONDA_PREFIX:-}"; echo "CALDB=${CALDB:-}"; which python || true; python --version || true; which gtselect || true; which gtlike || true; find / -path '*/caldb/software/tools/alias_config.fits' 2>/dev/null | head -20 || true
          } | tee "$RUN_ID/logs/docker_env_probe.log"
          cat > r51c_run.py <<'PYCODE'
          import os, json, subprocess, traceback, zipfile, sys, shutil, math
          from pathlib import Path
          from datetime import datetime, timezone
          RUN_ID = os.environ.get('RUN_ID', 'ACIRM_R51C_BLIND_VALIDATION_3C4543_RESULTS')
          ROOT = Path(RUN_ID); RESULTS=ROOT/'results'; LOGS=ROOT/'logs'; DATA=ROOT/'data'; WORK=ROOT/'work'
          for p in [RESULTS, LOGS, DATA, WORK]: p.mkdir(parents=True, exist_ok=True)
          def write_text(path, text): Path(path).write_text(str(text), encoding='utf-8')
          verdict = {'verdict':'TECHNICAL_FAILURE_NO_SCIENTIFIC_RESULT','fit_rows_computed':0,'not_scientific_null':True}
          try:
              import pandas as pd
              import numpy as np
              LOCKED = {
                  'run_id': RUN_ID,
                  'blind_protocol':'R51B_TO_R51C_PRE_RUN_LOCKED_LIMITED_CONTROL_TRANSFER',
                  'source_label':'3C4543',
                  'target_source_preferred':'4FGL J2253.9+1609',
                  'target_association':'3C 454.3',
                  'target_ra_deg':343.496,
                  'target_dec_deg':16.151,
                  'catalog_match_radius_deg':0.30,
                  'irfs':'P8R3_SOURCE_V3',
                  'evclass':128,
                  'evtype':3,
                  'zmax':90,
                  'emax_mev':300000,
                  'catalog_url':'https://fermi.gsfc.nasa.gov/ssc/data/access/lat/14yr_catalog/gll_psc_v35.fit',
                  'rows':[
                      {'tag':'P4','role':'TARGET_PLUS4','week':290,'tmin_met':409104385.0,'tmax_met':409710423.0},
                      {'tag':'P8','role':'TARGET_PLUS8','week':294,'tmin_met':411528090.0,'tmax_met':412127228.0},
                      {'tag':'C310','role':'PRINCIPAL_CONTROL_C310','week':310,'tmin_met':421202185.0,'tmax_met':421808226.0},
                  ],
                  'axes':{
                      'E300': {'emin_mev':300, 'binsz_deg':0.2},
                      'BINSZ010': {'emin_mev':100, 'binsz_deg':0.1},
                  },
                  'variants':[
                      {'variant':'SRCROI24_TIGHT_MODEL_FIELD','src_roiwidth_deg':24.0,'roiwidth_deg':24.0},
                      {'variant':'SRCROI36_WIDE_MODEL_FIELD','src_roiwidth_deg':36.0,'roiwidth_deg':24.0},
                  ],
                  'primary_pass_rule':'For each axis/model: min(TS_P4, TS_P8) > TS_C310; aggregate pass requires all four comparisons pass.',
                  'claim_ceiling':'limited-control blind validation support only; not proof; not discovery; not final physical law',
              }
              (RESULTS/'R51C_LOCKED_CONTEXT.json').write_text(json.dumps(LOCKED, indent=2), encoding='utf-8')
              def run(cmd, logname, timeout=None):
                  log_path=LOGS/logname
                  with log_path.open('w', encoding='utf-8') as f:
                      f.write('CMD: '+' '.join(map(str,cmd))+'\n'); f.flush()
                      p=subprocess.run(cmd, stdout=f, stderr=subprocess.STDOUT, text=True, timeout=timeout)
                      f.write(f'\nRC={p.returncode}\n')
                      return p.returncode
              def download(url, outpath, logname):
                  outpath=Path(outpath)
                  if outpath.exists() and outpath.stat().st_size>0:
                      return {'url':url,'file':str(outpath),'status':'CACHED','size_bytes':outpath.stat().st_size,'rc':0}
                  if shutil.which('wget'):
                      cmd=['bash','-lc', f"wget -nv -t 5 --retry-connrefused --timeout=90 -O '{outpath}' '{url}'"]
                  elif shutil.which('curl'):
                      cmd=['bash','-lc', f"curl -L --retry 5 --retry-delay 10 --connect-timeout 90 -o '{outpath}' '{url}'"]
                  else:
                      return {'url':url,'file':str(outpath),'status':'FAILED_NO_DOWNLOADER','size_bytes':0,'rc':127}
                  rc=run(cmd, logname, timeout=1800)
                  ok=rc==0 and outpath.exists() and outpath.stat().st_size>0
                  return {'url':url,'file':str(outpath),'status':'OK' if ok else 'FAILED','size_bytes':outpath.stat().st_size if outpath.exists() else 0,'rc':rc}
              # CALDB and PFILES before Fermipy import.
              search_roots=[os.environ.get('CALDB',''), os.environ.get('FERMI_DIR',''), os.environ.get('CONDA_PREFIX',''), '/refdata/fermi', '/opt/anaconda/envs/fermi', '/opt/conda/envs/fermi', '/opt/conda', '/usr/local', '/home/fermi']
              alias=None
              for root in [r for r in search_roots if r]:
                  rp=Path(root)
                  if not rp.exists(): continue
                  direct=rp/'software'/'tools'/'alias_config.fits'
                  if direct.exists(): alias=direct; break
                  found=list(rp.glob('**/caldb/software/tools/alias_config.fits'))[:1]
                  if found: alias=found[0]; break
              if alias is not None: os.environ['CALDB']=str(alias.parents[2])
              pfiles_local=Path.cwd()/RUN_ID/'pfiles'; pfiles_local.mkdir(parents=True, exist_ok=True)
              sysp=[]
              for cand in [os.environ.get('FERMI_DIR',''), os.environ.get('CONDA_PREFIX',''), '/opt/anaconda/envs/fermi', '/opt/conda/envs/fermi', '/usr/local/share/fermitools']:
                  if cand:
                      sp=Path(cand)/'syspfiles'
                      if sp.exists(): sysp.append(str(sp))
              os.environ['PFILES']=str(pfiles_local)+(';' + sysp[0] if sysp else '')
              diff_roots=[os.environ.get('FERMI_DIR',''), os.environ.get('CONDA_PREFIX',''), os.environ.get('CALDB',''), '/refdata/fermi', '/opt/anaconda/envs/fermi', '/opt/conda/envs/fermi', '/opt/conda', '/usr/local', '/home/fermi']
              galdiff=isodiff=None
              for root in [r for r in diff_roots if r]:
                  rp=Path(root)
                  if not rp.exists(): continue
                  if galdiff is None:
                      for pat in ['**/galdiffuse/gll_iem_v07.fits','**/gll_iem_v07.fits']:
                          found=list(rp.glob(pat))[:1]
                          if found: galdiff=str(found[0]); break
                  if isodiff is None:
                      for pat in ['**/galdiffuse/iso_P8R3_SOURCE_V3_v1.txt','**/iso_P8R3_SOURCE_V3_v1.txt']:
                          found=list(rp.glob(pat))[:1]
                          if found: isodiff=str(found[0]); break
              write_text(RESULTS/'R51C_ENV_PATHS.txt', f'CALDB={os.environ.get("CALDB","")}\nPFILES={os.environ.get("PFILES","")}\nGALDIFF={galdiff}\nISODIFF={isodiff}\n')
              if not galdiff or not isodiff: raise RuntimeError('Diffuse files missing in FermiBottle environment')
              from fermipy.gtanalysis import GTAnalysis
              from astropy.table import Table
              from astropy.coordinates import SkyCoord
              import astropy.units as u
              write_text(RESULTS/'R51C_FERMIPY_IMPORT_OK.txt', 'FERMIPY_GTANALYSIS_IMPORT_OK_AFTER_DOCKER_ENV_SETUP\n')
              try:
                  import importlib.metadata as md
                  lines=[]
                  for pkg in ['fermipy','fermitools','gammapy','regions','astropy','numpy','matplotlib','pandas']:
                      try: lines.append(f'{pkg}={md.version(pkg)}')
                      except Exception as exc: lines.append(f'{pkg}=ERROR:{exc!r}')
                  write_text(RESULTS/'R51C_PACKAGE_VERSIONS.txt','\n'.join(lines)+'\n')
              except Exception as exc: write_text(RESULTS/'R51C_PACKAGE_VERSIONS_ERROR.txt', repr(exc))
              # Downloads.
              drows=[]; catalog_file=DATA/'gll_psc_v35.fit'
              drows.append(download(LOCKED['catalog_url'], catalog_file, 'dl_catalog.log'))
              for row in LOCKED['rows']:
                  week=row['week']
                  photon=DATA/f'lat_photon_weekly_w{week:03d}_p305_v001.fits'
                  spacecraft=DATA/f'lat_spacecraft_weekly_w{week:03d}_p310_v001.fits'
                  row['photon_file']=str(photon); row['spacecraft_file']=str(spacecraft)
                  drows.append(download(f'https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/photon/lat_photon_weekly_w{week:03d}_p305_v001.fits', photon, f'dl_{row["tag"]}_photon.log'))
                  drows.append(download(f'https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/spacecraft/lat_spacecraft_weekly_w{week:03d}_p310_v001.fits', spacecraft, f'dl_{row["tag"]}_spacecraft.log'))
              pd.DataFrame(drows).to_csv(RESULTS/'R51C_DOWNLOAD_STATUS.csv', index=False)
              failed=[r for r in drows if r['status'].startswith('FAILED')]
              if failed: raise RuntimeError('Download failure: cannot run likelihood safely: '+repr(failed))
              # Resolve exact catalog source name from locked coordinate/name, without inspecting TS.
              tab=Table.read(str(catalog_file))
              names=[str(x).strip() for x in tab['Source_Name']]
              resolved=None; resolver_note=''
              if LOCKED['target_source_preferred'] in names:
                  resolved=LOCKED['target_source_preferred']; resolver_note='exact Source_Name match'
              else:
                  # Robust nearest-source fallback by coordinates.
                  coord=SkyCoord(LOCKED['target_ra_deg']*u.deg, LOCKED['target_dec_deg']*u.deg)
                  cats=SkyCoord(tab['RAJ2000']*u.deg, tab['DEJ2000']*u.deg)
                  sep=coord.separation(cats).deg
                  idx=int(np.argmin(sep)); minsep=float(sep[idx])
                  if minsep <= LOCKED['catalog_match_radius_deg']:
                      resolved=names[idx]; resolver_note=f'nearest catalog source at {minsep:.6f} deg'
                  else:
                      raise RuntimeError(f'No catalog source within {LOCKED["catalog_match_radius_deg"]} deg; nearest={minsep}')
              LOCKED['target_source_resolved']=resolved
              (RESULTS/'R51C_TARGET_RESOLUTION.json').write_text(json.dumps({'preferred':LOCKED['target_source_preferred'],'resolved':resolved,'note':resolver_note,'ra_deg':LOCKED['target_ra_deg'],'dec_deg':LOCKED['target_dec_deg']}, indent=2), encoding='utf-8')
              def run_fermipy(axis_name, variant, event_row):
                  axis=LOCKED['axes'][axis_name]; tag=event_row['tag']; vtag=variant['variant']
                  workdir=WORK/f'fermipy_{axis_name}_{vtag}_{tag}'; workdir.mkdir(parents=True, exist_ok=True)
                  cfg={
                      'data': {'evfile':event_row['photon_file'], 'scfile':event_row['spacecraft_file']},
                      'binning': {'roiwidth':variant['roiwidth_deg'], 'binsz':axis['binsz_deg'], 'binsperdec':4, 'coordsys':'CEL', 'proj':'AIT'},
                      'selection': {'ra':LOCKED['target_ra_deg'], 'dec':LOCKED['target_dec_deg'], 'tmin':event_row['tmin_met'], 'tmax':event_row['tmax_met'], 'emin':axis['emin_mev'], 'emax':LOCKED['emax_mev'], 'zmax':LOCKED['zmax'], 'evclass':LOCKED['evclass'], 'evtype':LOCKED['evtype'], 'target':resolved},
                      'gtlike': {'irfs':LOCKED['irfs'], 'edisp':False},
                      'model': {'src_roiwidth':variant['src_roiwidth_deg'], 'galdiff':galdiff, 'isodiff':isodiff, 'catalogs':[str(catalog_file)]},
                      'fileio': {'workdir':str(workdir), 'outdir':str(workdir), 'logfile':str(LOGS/f'fermipy_{axis_name}_{vtag}_{tag}.log')},
                      'logging': {'verbosity':3},
                  }
                  out={'axis':axis_name,'variant':vtag,'tag':tag,'role':event_row['role'],'week':event_row['week'],'src_roiwidth_deg':variant['src_roiwidth_deg'],'roiwidth_deg':variant['roiwidth_deg'],'emin_mev':axis['emin_mev'],'binsz_deg':axis['binsz_deg'],'target_source':resolved,'setup_ok':False,'optimize_ok':False,'fit_ok':False,'ts':None,'npred':None,'fit_quality':None,'error':''}
                  try:
                      gta=GTAnalysis(cfg, logging={'verbosity':3})
                      gta.setup(); out['setup_ok']=True
                      try: gta.optimize(); out['optimize_ok']=True
                      except Exception as exc: out['error'] += 'OPTIMIZE_WARNING: '+repr(exc)+'\n'
                      try:
                          fitres=gta.fit(optimizer='NEWMINUIT', reoptimize=True); out['fit_ok']=True
                          if isinstance(fitres, dict): out['fit_quality']=fitres.get('fit_quality', None)
                      except Exception as exc: out['error'] += 'FIT_ERROR: '+repr(exc)+'\n'
                      try: out['ts']=float(gta.like.Ts(resolved))
                      except Exception:
                          try:
                              src=gta.roi.get_source_by_name(resolved)
                              out['ts']=float(src['ts'] if isinstance(src, dict) else src.ts)
                          except Exception as exc: out['error'] += 'TS_EXTRACTION_ERROR: '+repr(exc)+'\n'
                      try: out['npred']=float(gta.like.NpredValue(resolved))
                      except Exception: pass
                  except Exception as exc:
                      out['error'] += 'RUN_EXCEPTION: '+repr(exc)+'\n'+traceback.format_exc()[-4000:]
                  return out
              rows=[]
              for axis_name in LOCKED['axes']:
                  for variant in LOCKED['variants']:
                      for event_row in LOCKED['rows']:
                          print('R51C_RUN_START', axis_name, variant['variant'], event_row['tag'], flush=True)
                          out=run_fermipy(axis_name, variant, event_row)
                          print('R51C_RUN_DONE', axis_name, variant['variant'], event_row['tag'], 'fit_ok=', out.get('fit_ok'), 'ts=', out.get('ts'), flush=True)
                          rows.append(out)
                          pd.DataFrame(rows).to_csv(RESULTS/'R51C_RUN_LEVEL_TS_INCREMENTAL.csv', index=False)
              df=pd.DataFrame(rows); df.to_csv(RESULTS/'R51C_RUN_LEVEL_TS.csv', index=False)
              fit_rows=int(df['ts'].notna().sum()) if 'ts' in df else 0
              verdict['fit_rows_computed']=fit_rows
              ag=[]
              for (axis, variant), g in df.groupby(['axis','variant']):
                  vals={r['tag']:r for _,r in g.iterrows()}
                  if all(k in vals and pd.notna(vals[k].get('ts')) for k in ['P4','P8','C310']):
                      p4=float(vals['P4']['ts']); p8=float(vals['P8']['ts']); c=float(vals['C310']['ts']); margin=min(p4,p8)-c; passed=margin>0
                      ag.append({'axis':axis,'variant':variant,'TS_P4':p4,'TS_P8':p8,'TS_C310':c,'min_target_ts':min(p4,p8),'margin_vs_C310':margin,'pass':bool(passed),'rule':'min(TS_P4,TS_P8)>TS_C310'})
                  else:
                      ag.append({'axis':axis,'variant':variant,'TS_P4':None,'TS_P8':None,'TS_C310':None,'min_target_ts':None,'margin_vs_C310':None,'pass':False,'rule':'INCOMPLETE_TS'})
              agdf=pd.DataFrame(ag); agdf.to_csv(RESULTS/'R51C_AGGREGATE_PASS_FAIL_BY_AXIS_AND_MODEL.csv', index=False)
              if fit_rows == 0:
                  verdict.update({'verdict':'TECHNICAL_FAILURE_NO_SCIENTIFIC_RESULT','not_scientific_null':True})
              elif len(agdf)>0 and bool(agdf['pass'].all()):
                  verdict.update({'verdict':'BLIND_VALIDATION_LIMITED_CONTROL_ALL_MODEL_FIELDS_PASS_NOT_PROOF','not_scientific_null':False})
              elif len(agdf)>0 and bool(agdf['pass'].any()):
                  verdict.update({'verdict':'BLIND_VALIDATION_LIMITED_CONTROL_PARTIAL_SUPPORT_NOT_PROOF','not_scientific_null':False})
              else:
                  verdict.update({'verdict':'BLIND_VALIDATION_NOT_CONFIRMED_UNDER_LOCKED_CONDITIONS','not_scientific_null':False})
              verdict['completed_utc']=datetime.now(timezone.utc).isoformat()
              verdict['target_source_resolved']=resolved
              (RESULTS/'R51C_DECISION_SUMMARY.json').write_text(json.dumps(verdict, indent=2), encoding='utf-8')
          except Exception as exc:
              verdict.update({'verdict':'TECHNICAL_FAILURE_NO_SCIENTIFIC_RESULT','not_scientific_null':True,'error':repr(exc),'traceback_tail':traceback.format_exc()[-6000:]})
              (RESULTS/'R51C_DECISION_SUMMARY.json').write_text(json.dumps(verdict, indent=2), encoding='utf-8')
              write_text(RESULTS/'R51C_TOP_LEVEL_EXCEPTION.txt', traceback.format_exc())
              raise
          PYCODE
          python r51c_run.py 2>&1 | tee "$RUN_ID/logs/r51c_python_outer.log"
          pyrc=${PIPESTATUS[0]}
          if [ "$pyrc" -ne 0 ]; then echo "R51C_PYTHON_EXIT_CODE=$pyrc" | tee "$RUN_ID/results/R51C_PYTHON_NONZERO_EXIT.txt"; fi
          python - <<'ZIPCODE'
          import zipfile, hashlib
          from pathlib import Path
          run_id = 'ACIRM_R51C_BLIND_VALIDATION_3C4543_RESULTS'
          root = Path(run_id)
          zip_path = Path(run_id + '.zip')
          with zipfile.ZipFile(zip_path, 'w', compression=zipfile.ZIP_DEFLATED) as z:
              for p in root.rglob('*'):
                  if p.is_file(): z.write(p, p.relative_to(root.parent))
          h=hashlib.sha256(zip_path.read_bytes()).hexdigest()
          Path(str(zip_path)+'.sha256.txt').write_text(h+'  '+zip_path.name+'\n', encoding='utf-8')
          print('ZIP_READY', zip_path, h)
          ZIPCODE
          exit 0
          R51INNER
          chmod +x r51c_inside_fermibottle.sh
          docker run --rm -e RUN_ID="$RUN_ID" -v "$PWD:/work" -w /work "$FERMI_DOCKER_IMAGE" bash r51c_inside_fermibottle.sh 2>&1 | tee "$RUN_ID/logs/docker_run_outer.log"
          docker_rc=${PIPESTATUS[0]}
          if [ "$docker_rc" -ne 0 ]; then
            echo "R51C_DOCKER_RUN_NONZERO=$docker_rc" | tee "$RUN_ID/results/R51C_DOCKER_RUN_NONZERO.txt"
            python3 -m zipfile -c "$RUN_ID.zip" "$RUN_ID/results" "$RUN_ID/logs" || true
            sha256sum "$RUN_ID.zip" > "$RUN_ID.zip.sha256.txt" || true
          fi
          ls -lah "$RUN_ID.zip" "$RUN_ID.zip.sha256.txt" || true

      - name: Upload R51C artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ACIRM_R51C_BLIND_VALIDATION_3C4543_RESULTS
          path: |
            ACIRM_R51C_BLIND_VALIDATION_3C4543_RESULTS.zip
            ACIRM_R51C_BLIND_VALIDATION_3C4543_RESULTS.zip.sha256.txt
            ACIRM_R51C_BLIND_VALIDATION_3C4543_RESULTS/results/**
            ACIRM_R51C_BLIND_VALIDATION_3C4543_RESULTS/logs/**
          if-no-files-found: warn
