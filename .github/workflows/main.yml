name: ACIRM R22F R10B R14 SPI511 cache redownload gate dynamic SPI

on:
  workflow_dispatch:
    inputs:
      allow_redownload:
        description: "Download missing swg.fits if GitHub cache is empty? Use true if R13 showed empty cache."
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  r22f-r10b-r14-cache-redownload-dynamic-spi:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare locked state
        shell: bash
        run: |
          set -euo pipefail
          RUN_ID="R22F_R10B_R14_SPI511_CACHE_REDOWNLOAD_GATE_DYNAMIC_SPI_EXECUTION"
          CACHE="ACIRM_CACHE_R10B_R14"
          echo "RUN_ID=${RUN_ID}" >> "$GITHUB_ENV"
          echo "CACHE=${CACHE}" >> "$GITHUB_ENV"
          mkdir -p "$RUN_ID" "$RUN_ID/logs" "$RUN_ID/scripts" "$RUN_ID/slim_results" "$CACHE/scw" "$CACHE/aux" "$CACHE/ic" "$CACHE/idx" "$CACHE/cat"
          echo "false" > "$RUN_ID/PREFLIGHT_PASS.flag"
          echo "false" > "$RUN_ID/OG_CREATE_PASS.flag"
          echo "false" > "$RUN_ID/DIRECT_SPI_PASS.flag"
          echo "not_started" > "$RUN_ID/RUN_STAGE.txt"
          cat > "$RUN_ID/LOCK.json" <<'JSON'
          {
            "run_id": "R22F_R10B_R14_SPI511_CACHE_REDOWNLOAD_GATE_DYNAMIC_SPI_EXECUTION",
            "parent_result": "R22F_R10B_R13_EMPTY_CACHE_FALSE_PASS_OG_CREATE_FAILED_NO_THEORY_FAILURE",
            "critical_repair": "Fix false cache-pass caused by Bash pipeline subshell; if cache is missing, optionally redownload only locked swg.fits before running OSA.",
            "instrument": "INTEGRAL_SPI",
            "revision": "2504",
            "locked_scw": [
              "250400090010",
              "250400020010",
              "250400080010",
              "250400030010",
              "250400070021",
              "250400040010",
              "250400060010",
              "250400050010"
            ],
            "line_band_keV": [508.0, 514.0],
            "low_sideband_keV": [490.0, 500.0],
            "high_sideband_keV": [522.0, 532.0],
            "direct_energy_grid_keV": [490.0, 532.0],
            "direct_energy_bins": 42,
            "min_line_to_sideband_ratio": 1.2,
            "claim_ceiling": "CACHE_REDOWNLOAD_GATE_DYNAMIC_DIRECT_SPI_EXECUTION_ATTEMPT_NOT_PROOF_NOT_FINAL_LAW",
            "no_rescue_rules": [
              "No energy-band change after results.",
              "No SCW drop after results.",
              "No threshold reduction after results.",
              "Do not accept cache/metadata spectrum as 511 measurement.",
              "Only RUN_OUTPUT files under obs/r10b_r14_og/spi are accepted for line-sideband extraction.",
              "Any technical failure is TECHNICAL_NO_GO_NO_THEORY_FAILURE."
            ]
          }
          JSON
          cat > "$RUN_ID/README_AR.md" <<'MD'
          # R22F_R10B_R14
          R13 فشل لأن cache كان فارغًا لكن فحص Bash عده ناجحًا بسبب pipe/subshell.
          R14 يصلح العد، ويعيد تنزيل ملفات `swg.fits` المقفلة فقط إذا كان `allow_redownload=true`.
          لا يرفع الملفات الخام في artifact، ولا يقبل 511 إلا من RUN_OUTPUT.
          MD

      - name: Install host tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y curl ca-certificates xvfb zip unzip
          python3 -m pip install -q astropy numpy pandas
          {
            echo "date_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "runner=$(uname -a)"
            echo "disk_start"; df -h
            echo "memory_start"; free -h || true
            echo "docker_version"; docker --version || true
          } | tee "$RUN_ID/logs/system_preflight.log"

      - name: Restore existing cache if available
        uses: actions/cache@v4
        with:
          path: ACIRM_CACHE_R10B_R14
          key: acirm-r22f-r10b-r14-rev2504-cache-v1
          restore-keys: |
            acirm-r22f-r10b-r14-rev2504-cache-
            acirm-r22f-r10b-r4-rev2504-cache-
            acirm-r22f-r10b-r5-
            acirm-r22f-r10b-r6-
            acirm-r22f-r10b-

      - name: Write helper scripts
        shell: bash
        run: |
          set -euo pipefail
          cat > "$RUN_ID/scripts/download_locked_swg.py" <<'PY'
          import os, json, urllib.request, time
          from pathlib import Path
          RUN_ID="R22F_R10B_R14_SPI511_CACHE_REDOWNLOAD_GATE_DYNAMIC_SPI_EXECUTION"
          CACHE=Path("ACIRM_CACHE_R10B_R14")
          OUT=Path(RUN_ID)
          SCWS=["250400090010","250400020010","250400080010","250400030010","250400070021","250400040010","250400060010","250400050010"]
          BASES=[
            "https://heasarc.gsfc.nasa.gov/FTP/integral/data/scw/2504/{scw}.001/swg.fits",
            "https://heasarc.gsfc.nasa.gov/FTP/integral/data/scw/2504/{scw}.001/swg.fits.gz",
            "https://heasarc.gsfc.nasa.gov/FTP/integral/data/scw/25/2504/{scw}.001/swg.fits",
            "https://heasarc.gsfc.nasa.gov/FTP/integral/data/scw/25/2504/{scw}.001/swg.fits.gz",
            "https://isdc.unige.ch/integral/archive/data/scw/2504/{scw}.001/swg.fits",
            "https://www.isdc.unige.ch/integral/archive/data/scw/2504/{scw}.001/swg.fits",
          ]
          rows=[]
          for scw in SCWS:
            target=(CACHE/"scw"/"2504"/(scw+".001")/"swg.fits")
            target.parent.mkdir(parents=True, exist_ok=True)
            if target.exists() and target.stat().st_size>0:
              rows.append({"scw":scw,"status":"CACHE","url":"","bytes":target.stat().st_size})
              continue
            ok=False
            for templ in BASES:
              url=templ.format(scw=scw)
              tmp=target
              try:
                print("TRY",url,flush=True)
                urllib.request.urlretrieve(url,tmp)
                if tmp.exists() and tmp.stat().st_size>0:
                  rows.append({"scw":scw,"status":"DOWNLOADED","url":url,"bytes":tmp.stat().st_size})
                  ok=True
                  break
              except Exception as e:
                rows.append({"scw":scw,"status":"FAILED","url":url,"bytes":0,"error":repr(e)[:180]})
                try:
                  if tmp.exists() and tmp.stat().st_size==0: tmp.unlink()
                except Exception: pass
            if not ok:
              rows.append({"scw":scw,"status":"MISSING_AFTER_DOWNLOAD","url":"","bytes":0})
          import csv
          with (OUT/"download_locked_swg_log.csv").open("w",newline="",encoding="utf-8") as f:
            fields=sorted(set().union(*(r.keys() for r in rows)))
            w=csv.DictWriter(f,fieldnames=fields); w.writeheader(); w.writerows(rows)
          print(json.dumps(rows,indent=2))
          PY

          cat > "$RUN_ID/scripts/osa_command_bootstrap.sh" <<'SH'
          #!/usr/bin/env bash
          set +e
          echo "BOOTSTRAP_START"
          for s in /etc/profile /init.d/*.sh /home/integral/.bashrc /home/integral/.profile /opt/osa*/*.sh /opt/osa*/bin/*.sh; do
            [ -f "$s" ] && . "$s" >/dev/null 2>&1 && echo "sourced=$s"
          done
          for cmd in og_create spibounds spihist plist dal_list; do
            p="$(find / -type f -name "$cmd" 2>/dev/null | head -1)"
            [ -n "$p" ] && export PATH="$(dirname "$p"):$PATH" && echo "found_${cmd}=$p"
          done
          export HEADASNOQUERY=1
          export HEADASPROMPT=/dev/null
          command -v og_create || true
          command -v spibounds || true
          command -v spihist || true
          command -v plist || true
          if command -v og_create >/dev/null 2>&1 && command -v spibounds >/dev/null 2>&1 && command -v spihist >/dev/null 2>&1; then
            echo "BOOTSTRAP_DIRECT_COMMANDS_PASS"
            exit 0
          else
            echo "BOOTSTRAP_DIRECT_COMMANDS_FAIL"
            exit 17
          fi
          SH
          chmod +x "$RUN_ID/scripts/osa_command_bootstrap.sh"

          cat > "$RUN_ID/scripts/r14_dynamic_direct_spi_inner.sh" <<'SH'
          #!/usr/bin/env bash
          set +e
          export HEADASNOQUERY=1
          export HEADASPROMPT=/dev/null
          cd /home/integral/R22F_R10B_R14_SPI511_CACHE_REDOWNLOAD_GATE_DYNAMIC_SPI_EXECUTION || exit 80
          bash scripts/osa_command_bootstrap.sh || exit 81
          if [ ! -s scw_dol.list ]; then
            echo "EMPTY_SCW_DOL_LIST" | tee logs/dynamic_direct_spi_error.log
            echo 74 > logs/og_create_exit_code.txt
            exit 74
          fi
          echo "--- scw_dol.list ---"
          cat scw_dol.list
          echo "--- og_create R14 ---"
          og_create idxSwg="scw_dol.list" instrument="SPI" ogid="r10b_r14_og" baseDir="."
          og_rc=$?
          echo "$og_rc" > logs/og_create_exit_code.txt
          if [ "$og_rc" != "0" ]; then exit "$og_rc"; fi
          echo "true" > OG_CREATE_PASS.flag
          cd obs/r10b_r14_og || exit 82
          mkdir -p spi ../../logs/pars
          plist spibounds 2>&1 | tee ../../logs/plist_spibounds.log
          plist spihist 2>&1 | tee ../../logs/plist_spihist.log
          SPB_PAR="$(find /home/integral/pfiles / -name 'spibounds.par' 2>/dev/null | head -1)"
          SPH_PAR="$(find /home/integral/pfiles / -name 'spihist.par' 2>/dev/null | head -1)"
          echo "SPB_PAR=$SPB_PAR" | tee ../../logs/spi_par_paths.log
          echo "SPH_PAR=$SPH_PAR" | tee -a ../../logs/spi_par_paths.log
          [ -s "$SPB_PAR" ] && cp "$SPB_PAR" ../../logs/pars/spibounds.par
          [ -s "$SPH_PAR" ] && cp "$SPH_PAR" ../../logs/pars/spihist.par
          if [ ! -s "$SPB_PAR" ] || [ ! -s "$SPH_PAR" ]; then
            echo 73 > ../../logs/direct_spibounds_exit_code.txt
            echo 73 > ../../logs/direct_spihist_exit_code.txt
            exit 73
          fi
          par_has() { grep -q "^$2," "$1"; }
          choose_name() { par="$1"; shift; for n in "$@"; do if par_has "$par" "$n"; then echo "$n"; return 0; fi; done; return 1; }
          add_if_present() { arrname="$1"; par="$2"; val="$3"; shift 3; n="$(choose_name "$par" "$@")"; if [ -n "$n" ]; then eval "$arrname+=(\"$n=$val\")"; echo "ADD $n=$val" >> ../../logs/dynamic_param_build.log; else echo "SKIP $*" >> ../../logs/dynamic_param_build.log; fi; }
          : > ../../logs/dynamic_param_build.log
          spb_cmd=()
          add_if_present spb_cmd "$SPB_PAR" "" outfile
          add_if_present spb_cmd "$SPB_PAR" "" in-og-dol inogdol in-og-dol
          add_if_present spb_cmd "$SPB_PAR" "spi/energy_boundaries.fits(SPI.-EBDS-SET.tpl)" energy-boundaries-dol energy_boundaries_dol energyboundariesdol
          add_if_present spb_cmd "$SPB_PAR" "og_spi.fits[GROUPING]" out-og-dol out_og_dol outogdol
          add_if_present spb_cmd "$SPB_PAR" "" gti-dol gti_dol gtidol
          add_if_present spb_cmd "$SPB_PAR" "" deadtime-dol deadtime_dol deadtimedol
          add_if_present spb_cmd "$SPB_PAR" "" ebounds-dol ebounds_dol eboundsdol
          add_if_present spb_cmd "$SPB_PAR" "yes" clobber
          add_if_present spb_cmd "$SPB_PAR" "none" binfile
          add_if_present spb_cmd "$SPB_PAR" "1" nregions
          add_if_present spb_cmd "$SPB_PAR" "490,532" regions
          add_if_present spb_cmd "$SPB_PAR" "42" nbins
          add_if_present spb_cmd "$SPB_PAR" "INTEGRAL" telescope
          add_if_present spb_cmd "$SPB_PAR" "SPI" instrume instrument
          add_if_present spb_cmd "$SPB_PAR" "" filter
          add_if_present spb_cmd "$SPB_PAR" "PI" bintype chantype
          add_if_present spb_cmd "$SPB_PAR" "20" chatter
          add_if_present spb_cmd "$SPB_PAR" "h" mode
          printf 'spibounds'; printf ' %q' "${spb_cmd[@]}"; echo | tee ../../logs/direct_spibounds_command.log
          spibounds "${spb_cmd[@]}" 2>&1 | tee ../../logs/direct_spibounds.log
          sb_rc=${PIPESTATUS[0]}
          echo "$sb_rc" > ../../logs/direct_spibounds_exit_code.txt
          if [ "$sb_rc" != "0" ]; then exit "$sb_rc"; fi
          sph_cmd=()
          add_if_present sph_cmd "$SPH_PAR" "hist" outfile
          add_if_present sph_cmd "$SPH_PAR" "" in-og-dol in_og_dol inogdol
          add_if_present sph_cmd "$SPH_PAR" "spi/evts_det_spec.fits(SPI.-OBS.-DSP.tpl)" det-spec-dol det_spec_dol detspecdol
          add_if_present sph_cmd "$SPH_PAR" "og_spi.fits[GROUPING]" out-og-dol out_og_dol outogdol
          add_if_present sph_cmd "$SPH_PAR" "" gti-dol gti_dol gtidol
          add_if_present sph_cmd "$SPH_PAR" "" deadtime-dol deadtime_dol deadtimedol
          add_if_present sph_cmd "$SPH_PAR" "spi/energy_boundaries.fits[1]" ebounds-dol ebounds_dol eboundsdol
          add_if_present sph_cmd "$SPH_PAR" "yes" clobber
          add_if_present sph_cmd "$SPH_PAR" "1" dtype
          add_if_present sph_cmd "$SPH_PAR" "raw" psdtype
          add_if_present sph_cmd "$SPH_PAR" "0-84" detnums
          add_if_present sph_cmd "$SPH_PAR" "d" multipointing
          add_if_present sph_cmd "$SPH_PAR" "no" detsummed
          add_if_present sph_cmd "$SPH_PAR" "no" pntgsummed
          add_if_present sph_cmd "$SPH_PAR" "indef" tstart
          add_if_present sph_cmd "$SPH_PAR" "indef" tstop
          add_if_present sph_cmd "$SPH_PAR" "SPI" instrume instrument
          add_if_present sph_cmd "$SPH_PAR" "20" chatter
          add_if_present sph_cmd "$SPH_PAR" "ISDC" outputformat output-format
          add_if_present sph_cmd "$SPH_PAR" "h" mode
          printf 'spihist'; printf ' %q' "${sph_cmd[@]}"; echo | tee ../../logs/direct_spihist_command.log
          spihist "${sph_cmd[@]}" 2>&1 | tee ../../logs/direct_spihist.log
          sh_rc=${PIPESTATUS[0]}
          echo "$sh_rc" > ../../logs/direct_spihist_exit_code.txt
          if [ "$sh_rc" = "0" ]; then echo "true" > ../../DIRECT_SPI_PASS.flag; else echo "false" > ../../DIRECT_SPI_PASS.flag; fi
          exit "$sh_rc"
          SH
          chmod +x "$RUN_ID/scripts/r14_dynamic_direct_spi_inner.sh"

          cat > "$RUN_ID/scripts/r14_extract_line_sideband.py" <<'PY'
          import json, csv
          from pathlib import Path
          import numpy as np
          from astropy.io import fits
          RUN_ID="R22F_R10B_R14_SPI511_CACHE_REDOWNLOAD_GATE_DYNAMIC_SPI_EXECUTION"
          ROOT=Path.cwd(); OUT=ROOT/RUN_ID; OBS=OUT/"obs"/"r10b_r14_og"/"spi"
          LINE=(508.0,514.0); LOW=(490.0,500.0); HIGH=(522.0,532.0); MIN_RATIO=1.2
          inventory=[]; rows=[]
          for p in sorted(OBS.rglob("*.fit*")):
            try:
              hdul=fits.open(p, memmap=False)
              for i,h in enumerate(hdul):
                names=list(getattr(getattr(h,'data',None),'names',[]) or [])
                inventory.append({"file":str(p),"hdu":i,"name":h.name,"columns":"|".join(names),"nrows":len(h.data) if getattr(h,'data',None) is not None and hasattr(h.data,'__len__') else ""})
            except Exception as e: inventory.append({"file":str(p),"hdu":"ERR","name":"ERR","columns":repr(e)[:160],"nrows":""})
          def integrate(e1,e2,y,band):
            e1=np.asarray(e1,dtype=float); e2=np.asarray(e2,dtype=float); y=np.asarray(y,dtype=float)
            m=np.isfinite(e1)&np.isfinite(e2)&np.isfinite(y)&(e2>=band[0])&(e1<=band[1])
            return float(np.nansum(y[m])) if m.any() else None
          ebounds=[]
          for ep in sorted(OBS.rglob("*energy*bound*.fit*")) + sorted(OBS.rglob("energy_boundaries.fit*")):
            try:
              hdul=fits.open(ep, memmap=False)
              for h in hdul:
                data=getattr(h,"data",None)
                if data is None or not hasattr(data,"names") or data.names is None: continue
                names=[n.upper() for n in data.names]
                for a,b in [("E_MIN","E_MAX"),("ENERG_LO","ENERG_HI"),("CHANNEL_LO","CHANNEL_HI"),("E_LOW","E_HIGH")]:
                  if a in names and b in names:
                    e1=np.asarray(data[data.names[names.index(a)]],dtype=float).ravel(); e2=np.asarray(data[data.names[names.index(b)]],dtype=float).ravel()
                    if len(e1)>0 and len(e1)==len(e2): ebounds.append((ep,e1,e2))
            except Exception: pass
          for dp in sorted(OBS.rglob("*evts*det*spec*.fit*")) + sorted(OBS.rglob("evts_det_spec.fit*")) + sorted(OBS.rglob("*.fit*")):
            try:
              hdul=fits.open(dp, memmap=False)
              for hdu_i,h in enumerate(hdul):
                data=getattr(h,"data",None)
                if data is None or not hasattr(data,"names") or data.names is None: continue
                for cname in data.names:
                  try: arr=np.asarray(data[cname], dtype=float)
                  except Exception: continue
                  if arr.size==0: continue
                  for ep,e1,e2 in ebounds:
                    n=len(e1); y=None
                    if arr.ndim==1 and arr.size==n: y=arr
                    elif arr.ndim>=2:
                      for ax,dim in enumerate(arr.shape):
                        if dim==n:
                          y=np.nansum(np.moveaxis(arr, ax, 0).reshape(n,-1), axis=1); break
                    if y is None: continue
                    line=integrate(e1,e2,y,LINE); low=integrate(e1,e2,y,LOW); high=integrate(e1,e2,y,HIGH)
                    sides=[v for v in [low,high] if v is not None]; side=sum(sides)/len(sides) if sides else None
                    ratio=(line/side) if (line is not None and side not in (None,0)) else None
                    rows.append({"method":"paired_ebounds_array","file":str(dp),"hdu":hdu_i,"column":cname,"ebounds_file":str(ep),"line_508_514":line,"low_490_500":low,"high_522_532":high,"sideband_mean":side,"line_to_sideband_ratio":ratio,"passes_min_ratio":bool(ratio is not None and ratio>=MIN_RATIO)})
            except Exception: pass
          with (OUT/"run_output_fits_inventory.csv").open("w",newline="",encoding="utf-8") as f:
            w=csv.DictWriter(f, fieldnames=["file","hdu","name","columns","nrows"]); w.writeheader(); w.writerows(inventory)
          fieldnames=sorted(set().union(*(r.keys() for r in rows))) if rows else ["method","file","hdu","column","line_508_514","low_490_500","high_522_532","sideband_mean","line_to_sideband_ratio","passes_min_ratio"]
          with (OUT/"line_sideband_candidates.csv").open("w",newline="",encoding="utf-8") as f:
            w=csv.DictWriter(f, fieldnames=fieldnames); w.writeheader(); w.writerows(rows)
          valid=[r for r in rows if r.get("line_to_sideband_ratio") not in (None,"")]
          best=max(valid, key=lambda r: float(r["line_to_sideband_ratio"])) if valid else None
          status={"candidate_rows":len(rows),"valid_ratio_rows":len(valid),"best_candidate":best,"run_output_fits_files":len({r['file'] for r in inventory}),"claim_ceiling":"RUN_OUTPUT dynamic plist direct SPI only; not proof without controls"}
          (OUT/"line_sideband_status.json").write_text(json.dumps(status,indent=2,sort_keys=True),encoding="utf-8")
          print(json.dumps(status,indent=2,sort_keys=True))
          PY

      - name: Verify cache, optionally redownload locked swg, and write DOL list
        shell: bash
        continue-on-error: true
        run: |
          set +e
          echo "cache_gate" > "$RUN_ID/RUN_STAGE.txt"
          mkdir -p "$CACHE/scw" "$CACHE/aux" "$CACHE/ic" "$CACHE/idx" "$CACHE/cat"
          SCWS="250400090010 250400020010 250400080010 250400030010 250400070021 250400040010 250400060010 250400050010"
          : > "$RUN_ID/logs/cache_verify.log"
          verify_cache() {
            local missing=0
            : > "$RUN_ID/scw_dol.list"
            for scw in $SCWS; do
              p="$CACHE/scw/2504/${scw}.001/swg.fits"
              if [ -s "$p" ]; then
                echo "/data/scw/2504/${scw}.001/swg.fits" >> "$RUN_ID/scw_dol.list"
                echo "OK $p" >> "$RUN_ID/logs/cache_verify.log"
              else
                echo "MISSING $p" >> "$RUN_ID/logs/cache_verify.log"
                missing=$((missing+1))
              fi
            done
            echo "$missing" > "$RUN_ID/logs/swg_missing_count.txt"
            if [ "$missing" = "0" ]; then return 0; else return 66; fi
          }
          verify_cache
          rc=$?
          if [ "$rc" != "0" ] && [ "${{ github.event.inputs.allow_redownload }}" = "true" ]; then
            echo "CACHE_MISSING_REDOWNLOAD_ALLOWED" | tee -a "$RUN_ID/logs/cache_verify.log"
            python3 "$RUN_ID/scripts/download_locked_swg.py" 2>&1 | tee "$RUN_ID/logs/download_locked_swg.log"
            verify_cache
            rc=$?
          fi
          cat "$RUN_ID/logs/cache_verify.log"
          cat "$RUN_ID/scw_dol.list" > "$RUN_ID/logs/scw_dol_list_final.txt"
          find "$CACHE" -maxdepth 4 -type f | sort | head -300 > "$RUN_ID/logs/cache_tree_head.txt" || true
          du -sh "$CACHE" 2>/dev/null | tee "$RUN_ID/logs/cache_size.log" || true
          echo "$rc" > "$RUN_ID/logs/cache_verify_exit_code.txt"

      - name: Fetch and patch OSA wrapper no-TTY
        shell: bash
        continue-on-error: true
        run: |
          set +e
          echo "wrapper_fetch_patch" > "$RUN_ID/RUN_STAGE.txt"
          curl -L --retry 3 --retry-delay 5 https://raw.githubusercontent.com/ISDC-integral/osa-docker/master/osa-container.sh -o osa-container.sh 2>&1 | tee "$RUN_ID/logs/osa_wrapper_fetch.log"
          rc=${PIPESTATUS[0]}
          chmod +x osa-container.sh 2>/dev/null || true
          cp osa-container.sh osa-container.notty.sh
          sed -i -E 's/(docker run[^\n]*) --rm -it /\1 --rm /g; s/(docker run[^\n]*) --rm -i /\1 --rm /g; s/(docker run[^\n]*) --rm -t /\1 --rm /g; s/ --rm -it / --rm /g; s/ --rm -i / --rm /g; s/ --rm -t / --rm /g; s/ -it / /g' osa-container.notty.sh
          chmod +x osa-container.notty.sh
          echo "$rc" > "$RUN_ID/logs/osa_wrapper_fetch_exit_code.txt"
          grep -n "docker run" osa-container.notty.sh > "$RUN_ID/logs/osa_wrapper_docker_run_notty_excerpt.txt" || true
          if grep -nE 'docker run .* -it|docker run .* --tty|docker run .* --interactive' osa-container.notty.sh > "$RUN_ID/logs/notty_patch_validation.log"; then
            echo 88 > "$RUN_ID/logs/notty_patch_validation_exit_code.txt"
          else
            echo 0 > "$RUN_ID/logs/notty_patch_validation_exit_code.txt"
            echo "NOTTY_PATCH_PASS" | tee "$RUN_ID/logs/notty_patch_validation.log"
          fi

      - name: OSA dynamic direct-command preflight
        shell: bash
        continue-on-error: true
        run: |
          set +e
          echo "osa_preflight" > "$RUN_ID/RUN_STAGE.txt"
          if [ "$(cat "$RUN_ID/logs/cache_verify_exit_code.txt" 2>/dev/null || echo 99)" != "0" ]; then
            echo "SKIP_PREFLIGHT_CACHE_INCOMPLETE" | tee "$RUN_ID/logs/osa_command_preflight.log"
            echo 66 > "$RUN_ID/logs/osa_command_preflight_exit_code.txt"
            exit 0
          fi
          if [ "$(cat "$RUN_ID/logs/notty_patch_validation_exit_code.txt" 2>/dev/null || echo 99)" != "0" ]; then
            echo "SKIP_PREFLIGHT_NOTTY_PATCH_FAILED" | tee "$RUN_ID/logs/osa_command_preflight.log"
            echo 88 > "$RUN_ID/logs/osa_command_preflight_exit_code.txt"
            exit 0
          fi
          export OSA_VERSION="11.2"
          export OSA_DOCKER_IMAGE="integralsw/osa:11.2-2-g667521a3-20220403-190332"
          export OSA_DOCKER_PULL="no"
          export REP_BASE_PROD="$PWD/$CACHE"
          export CURRENT_IC="$PWD/$CACHE"
          export WORKDIR="$PWD"
          xvfb-run -a bash ./osa-container.notty.sh docker 'cd /home/integral/'"$RUN_ID"' || exit 80; bash scripts/osa_command_bootstrap.sh' 2>&1 | tee "$RUN_ID/logs/osa_command_preflight.log"
          rc=${PIPESTATUS[0]}
          echo "$rc" > "$RUN_ID/logs/osa_command_preflight_exit_code.txt"
          if [ "$rc" = "0" ]; then echo "true" > "$RUN_ID/PREFLIGHT_PASS.flag"; else echo "false" > "$RUN_ID/PREFLIGHT_PASS.flag"; fi
          sudo chown -R "$USER:$USER" . 2>/dev/null || true

      - name: Run og_create and dynamic plist direct spibounds spihist
        shell: bash
        if: ${{ always() }}
        continue-on-error: true
        run: |
          set +e
          if [ "$(cat "$RUN_ID/PREFLIGHT_PASS.flag" 2>/dev/null || echo false)" != "true" ]; then
            echo "SKIP_DYNAMIC_DIRECT_OSA_PREFLIGHT_FAILED" | tee "$RUN_ID/logs/dynamic_direct_spi.log"
            echo 77 > "$RUN_ID/logs/og_create_exit_code.txt"
            echo 77 > "$RUN_ID/logs/direct_spibounds_exit_code.txt"
            echo 77 > "$RUN_ID/logs/direct_spihist_exit_code.txt"
            exit 0
          fi
          export OSA_VERSION="11.2"
          export OSA_DOCKER_IMAGE="integralsw/osa:11.2-2-g667521a3-20220403-190332"
          export OSA_DOCKER_PULL="no"
          export REP_BASE_PROD="$PWD/$CACHE"
          export CURRENT_IC="$PWD/$CACHE"
          export WORKDIR="$PWD"
          xvfb-run -a bash ./osa-container.notty.sh docker 'bash /home/integral/'"$RUN_ID"'/scripts/r14_dynamic_direct_spi_inner.sh' 2>&1 | tee "$RUN_ID/logs/dynamic_direct_spi.log"
          rc=${PIPESTATUS[0]}
          [ -s "$RUN_ID/logs/og_create_exit_code.txt" ] || echo "$rc" > "$RUN_ID/logs/og_create_exit_code.txt"
          [ -s "$RUN_ID/logs/direct_spibounds_exit_code.txt" ] || echo "$rc" > "$RUN_ID/logs/direct_spibounds_exit_code.txt"
          [ -s "$RUN_ID/logs/direct_spihist_exit_code.txt" ] || echo "$rc" > "$RUN_ID/logs/direct_spihist_exit_code.txt"
          sudo chown -R "$USER:$USER" . 2>/dev/null || true
          find "$RUN_ID/obs" -maxdepth 6 -type f | sort > "$RUN_ID/logs/run_output_files_after_dynamic_direct_spi.txt" || true

      - name: Extract locked 511 line-sideband from RUN_OUTPUT only
        shell: bash
        if: ${{ always() }}
        continue-on-error: true
        run: |
          set +e
          python3 "$RUN_ID/scripts/r14_extract_line_sideband.py" 2>&1 | tee "$RUN_ID/logs/line_sideband_extract.log"
          echo ${PIPESTATUS[0]} > "$RUN_ID/logs/line_sideband_extract_exit_code.txt"

      - name: Build final guarded decision and slim phone package
        shell: bash
        if: ${{ always() }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, csv, hashlib
          from pathlib import Path
          RUN_ID="R22F_R10B_R14_SPI511_CACHE_REDOWNLOAD_GATE_DYNAMIC_SPI_EXECUTION"
          OUT=Path(RUN_ID)
          def read_int(name):
            p=OUT/"logs"/name
            try: return int(p.read_text().strip().splitlines()[-1])
            except Exception: return None
          def read_bool(path):
            try: return Path(path).read_text().strip().lower()=="true"
            except Exception: return False
          def read_missing():
            try: return int((OUT/"logs/swg_missing_count.txt").read_text().strip())
            except Exception: return None
          line={}
          if (OUT/"line_sideband_status.json").exists():
            try: line=json.loads((OUT/"line_sideband_status.json").read_text())
            except Exception: line={}
          valid=int(line.get("valid_ratio_rows",0) or 0); best=line.get("best_candidate")
          missing=read_missing(); cache_rc=read_int("cache_verify_exit_code.txt"); notty_rc=read_int("notty_patch_validation_exit_code.txt")
          pre_rc=read_int("osa_command_preflight_exit_code.txt"); og_rc=read_int("og_create_exit_code.txt"); sb_rc=read_int("direct_spibounds_exit_code.txt"); sh_rc=read_int("direct_spihist_exit_code.txt"); ex_rc=read_int("line_sideband_extract_exit_code.txt")
          pre_pass=read_bool(OUT/"PREFLIGHT_PASS.flag"); og_pass=read_bool(OUT/"OG_CREATE_PASS.flag"); direct_pass=read_bool(OUT/"DIRECT_SPI_PASS.flag")
          if missing not in (0,None) or cache_rc not in (0,None): decision="R22F_R10B_R14_CACHE_INCOMPLETE_AFTER_OPTIONAL_REDOWNLOAD_NO_THEORY_FAILURE"
          elif notty_rc not in (0,None): decision="R22F_R10B_R14_NOTTY_PATCH_FAILED_NO_THEORY_FAILURE"
          elif not pre_pass: decision="R22F_R10B_R14_DYNAMIC_DIRECT_COMMAND_PREFLIGHT_FAILED_NO_THEORY_FAILURE"
          elif og_rc not in (0,None) or not og_pass: decision="R22F_R10B_R14_OG_CREATE_FAILED_NO_THEORY_FAILURE"
          elif sb_rc not in (0,None): decision="R22F_R10B_R14_DYNAMIC_SPIBOUNDS_FAILED_NO_THEORY_FAILURE"
          elif sh_rc not in (0,None) or not direct_pass: decision="R22F_R10B_R14_DYNAMIC_SPIHIST_FAILED_NO_THEORY_FAILURE"
          elif valid and best and best.get("passes_min_ratio"): decision="R22F_R10B_R14_SPI511_DYNAMIC_RUN_OUTPUT_LINE_SIDEBAND_RATIO_PASS_REQUIRES_CONTROLS_NOT_PROOF"
          elif valid: decision="R22F_R10B_R14_SPI511_DYNAMIC_RUN_OUTPUT_LINE_SIDEBAND_RATIO_AVAILABLE_NOT_PRODUCT_PROOF_AUDIT_REQUIRED"
          else: decision="R22F_R10B_R14_NO_USABLE_RUN_OUTPUT_LINE_SIDEBAND_EXTRACTED_NO_THEORY_FAILURE"
          status={"run_id":RUN_ID,"decision":decision,"swg_missing_count":missing,"cache_verify_exit":cache_rc,"notty_patch_validation_exit":notty_rc,"osa_dynamic_command_preflight_exit":pre_rc,"preflight_pass":pre_pass,"og_create_exit":og_rc,"og_create_pass":og_pass,"dynamic_spibounds_exit":sb_rc,"dynamic_spihist_exit":sh_rc,"direct_spi_pass":direct_pass,"line_sideband_extract_exit":ex_rc,"valid_ratio_rows":valid,"best_candidate":best,"claim_ceiling":"CACHE_REDOWNLOAD_GATE_DYNAMIC_PLIST_DIRECT_SPI_RUN_OUTPUT_NOT_PROOF_NOT_FINAL_LAW","raw_heavy_files_packaged":False,"no_rescue_applied":True}
          (OUT/"STATUS.json").write_text(json.dumps(status,indent=2,sort_keys=True),encoding="utf-8")
          with (OUT/"R22F_R10B_R14_GO_NO_GO_DECISION.csv").open("w",newline="",encoding="utf-8") as f:
            w=csv.DictWriter(f, fieldnames=list(status.keys())); w.writeheader(); w.writerow(status)
          rows=[]
          for p in sorted(OUT.rglob("*")):
            if p.is_file(): rows.append({"file":str(p.relative_to(OUT)),"sha256":hashlib.sha256(p.read_bytes()).hexdigest(),"bytes":p.stat().st_size})
          with (OUT/"MANIFEST_SHA256.csv").open("w",newline="",encoding="utf-8") as f:
            w=csv.DictWriter(f, fieldnames=["file","sha256","bytes"]); w.writeheader(); w.writerows(rows)
          print(json.dumps(status,indent=2,sort_keys=True))
          PY
          ZIP="${RUN_ID}_RESULTS.zip"
          SHA="${ZIP}.sha256.txt"
          zip -r "$ZIP" "$RUN_ID" -x "*/__pycache__/*" >/dev/null
          sha256sum "$ZIP" > "$SHA"
          echo "ZIP=$ZIP"; cat "$SHA"

      - name: Upload slim results artifact
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: R22F_R10B_R14_SPI511_CACHE_REDOWNLOAD_DYNAMIC_SPI_RESULTS
          path: |
            R22F_R10B_R14_SPI511_CACHE_REDOWNLOAD_GATE_DYNAMIC_SPI_EXECUTION_RESULTS.zip
            R22F_R10B_R14_SPI511_CACHE_REDOWNLOAD_GATE_DYNAMIC_SPI_EXECUTION_RESULTS.zip.sha256.txt
          if-no-files-found: error
          retention-days: 14
