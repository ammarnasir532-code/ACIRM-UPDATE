name: ACIRM R22F R10B R17B safe download diagnostic

on:
  workflow_dispatch:

jobs:
  r17b-safe-download-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare folders
        shell: bash
        run: |
          set -euo pipefail
          RUN_ID="R22F_R10B_R17B_SAFE_DOWNLOAD_DIAGNOSTIC"
          CACHE="ACIRM_CACHE_R10B_R17B"
          echo "RUN_ID=${RUN_ID}" >> "$GITHUB_ENV"
          echo "CACHE=${CACHE}" >> "$GITHUB_ENV"
          mkdir -p "$RUN_ID/logs" "$RUN_ID/scripts" "$CACHE/scw" "$CACHE/aux" "$CACHE/ic" "$CACHE/idx" "$CACHE/cat"
          echo "false" > "$RUN_ID/DOWNLOAD_COMPLETE.flag"
          cat > "$RUN_ID/README.txt" <<'TXT'
          R17B safe download diagnostic only.
          No OSA. No spibounds. No spihist. No SPI 511 measurement.
          This workflow only checks and downloads required INTEGRAL/SPI support files with caps.
          TXT

      - name: Install tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y curl ca-certificates zip unzip
          python3 -m pip install -q astropy numpy
          date -u | tee "$RUN_ID/logs/start_time_utc.txt"
          df -h | tee "$RUN_ID/logs/disk_start.txt"

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            ACIRM_CACHE_R10B_R4
            ACIRM_CACHE_R10B_R14
            ACIRM_CACHE_R10B_R15
            ACIRM_CACHE_R10B_R16
            ACIRM_CACHE_R10B_R17
            ACIRM_CACHE_R10B_R17B
          key: acirm-r10b-r17b-safe-download-cache-v1
          restore-keys: |
            acirm-r10b-
            acirm-r22f-r10b-

      - name: Write diagnostic script
        shell: bash
        run: |
          set -euo pipefail
          cat > "$RUN_ID/scripts/r17b_safe_download.py" <<'PY'
          import os, re, csv, json, shutil, subprocess, time
          from pathlib import Path
          from urllib.parse import quote

          RUN_ID = "R22F_R10B_R17B_SAFE_DOWNLOAD_DIAGNOSTIC"
          ROOT = Path.cwd()
          OUT = ROOT / RUN_ID
          CACHE = ROOT / "ACIRM_CACHE_R10B_R17B"
          REV = "2504"
          SCW = [
              "250400090010", "250400020010", "250400080010", "250400030010",
              "250400070021", "250400040010", "250400060010", "250400050010"
          ]
          BASES = [
              "https://heasarc.gsfc.nasa.gov/FTP/integral/data/",
              "https://isdc.unige.ch/integral/archive/data/",
              "https://www.isdc.unige.ch/integral/archive/data/",
          ]
          MAX_FILES = 55
          MAX_TOTAL_MB = 2200.0
          PER_FILE_MAX_TIME = 60
          CONNECT_TIMEOUT = 10

          for d in ["scw", "aux", "ic", "idx", "cat"]:
              (CACHE / d).mkdir(parents=True, exist_ok=True)

          existing_cache_dirs = [p for p in ROOT.glob("ACIRM_CACHE_R10B_*") if p.is_dir()]

          def write_csv(path, rows, fields):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=fields)
                  w.writeheader()
                  w.writerows(rows)

          def find_existing(rel):
              for c in existing_cache_dirs:
                  p = c / rel
                  if p.exists() and p.stat().st_size > 0:
                      return p
              return None

          def copy_existing(rel):
              dst = CACHE / rel
              if dst.exists() and dst.stat().st_size > 0:
                  return "CACHE_R17B", dst.stat().st_size
              src = find_existing(rel)
              if src:
                  dst.parent.mkdir(parents=True, exist_ok=True)
                  shutil.copy2(src, dst)
                  return "COPIED_LOCAL", dst.stat().st_size
              return "MISSING_LOCAL", 0

          def rel_urls(rel):
              rel_s = str(rel).replace("\\", "/").lstrip("/")
              enc = "/".join(quote(x) for x in rel_s.split("/"))
              return [b + enc for b in BASES]

          def curl_download(rel):
              dst = CACHE / rel
              dst.parent.mkdir(parents=True, exist_ok=True)
              tmp = Path(str(dst) + ".part")
              attempts = []
              for url in rel_urls(rel):
                  cmd = [
                      "curl", "-fL", "--connect-timeout", str(CONNECT_TIMEOUT),
                      "--max-time", str(PER_FILE_MAX_TIME), "--retry", "1", "--retry-delay", "2",
                      "-o", str(tmp), url
                  ]
                  t0 = time.time()
                  cp = subprocess.run(cmd, text=True, stdout=subprocess.PIPE, stderr=subprocess.PIPE)
                  elapsed = round(time.time() - t0, 3)
                  size = tmp.stat().st_size if tmp.exists() else 0
                  attempts.append({
                      "relpath": str(rel), "url": url, "exit": cp.returncode,
                      "elapsed_sec": elapsed, "bytes_tmp": size,
                      "stderr_tail": cp.stderr[-240:].replace("\n", " ")
                  })
                  if cp.returncode == 0 and size > 0:
                      tmp.replace(dst)
                      return "DOWNLOADED", dst.stat().st_size, attempts
                  if tmp.exists():
                      tmp.unlink(missing_ok=True)
              return "DOWNLOAD_FAILED", 0, attempts

          def ensure_file(rel):
              st, b = copy_existing(rel)
              if b > 0:
                  return st, b, []
              st, b, attempts = curl_download(rel)
              return st, b, attempts

          swg_rows = []
          attempts_all = []
          for scw in SCW:
              rel = Path("scw") / REV / f"{scw}.001" / "swg.fits"
              st, b, attempts = ensure_file(rel)
              attempts_all.extend(attempts)
              swg_rows.append({"scw": scw, "relpath": str(rel), "status": st, "bytes": b})

          required = set()
          parse_rows = []
          common = ["spi_spectra.fits", "spi_oper.fits", "spi_science_hk.fits", "spi_gti.fits", "sc_gti.fits"]
          for scw in SCW:
              for fn in common:
                  required.add(str(Path("scw") / REV / f"{scw}.001" / fn))

          try:
              from astropy.io import fits
              token_re = re.compile(r"[A-Za-z0-9_./+\-]+\.fits(?:\.gz)?(?:\[[^\]]+\])?")
              for scw in SCW:
                  swg = CACHE / "scw" / REV / f"{scw}.001" / "swg.fits"
                  if not swg.exists():
                      continue
                  try:
                      hdul = fits.open(swg, memmap=False)
                      texts = []
                      for hdu in hdul:
                          for _, v in hdu.header.items():
                              if isinstance(v, str) and ".fits" in v:
                                  texts.append(v)
                          data = getattr(hdu, "data", None)
                          names = getattr(data, "names", None)
                          if data is not None and names:
                              for n in names:
                                  try:
                                      col = data[n]
                                      vals = col.ravel()[:1000] if hasattr(col, "ravel") else col[:1000]
                                      for x in vals:
                                          s = x.decode("utf-8", errors="ignore") if isinstance(x, bytes) else str(x)
                                          if ".fits" in s:
                                              texts.append(s)
                                  except Exception:
                                      pass
                      for txt in texts:
                          for raw in token_re.findall(txt):
                              tok = raw.split("[")[0].strip().strip("'\"()")
                              rel = None
                              for anchor in ["scw/", "aux/", "ic/", "idx/", "cat/"]:
                                  if anchor in tok:
                                      rel = tok[tok.index(anchor):]
                                      break
                              if rel is None:
                                  rel = str(Path("scw") / REV / f"{scw}.001" / Path(tok).name)
                              if rel and not rel.endswith("swg.fits"):
                                  required.add(rel)
                                  parse_rows.append({"source_swg": str(swg), "raw_token": raw, "relpath": rel})
                  except Exception as e:
                      parse_rows.append({"source_swg": str(swg), "raw_token": "PARSE_FAILED", "relpath": repr(e)[:140]})
          except Exception as e:
              parse_rows.append({"source_swg": "ASTROPY_UNAVAILABLE", "raw_token": repr(e)[:140], "relpath": ""})

          member_rows = []
          attempted = 0
          new_bytes = 0
          for rel_s in sorted(required):
              rel = Path(rel_s)
              st, b = copy_existing(rel)
              if b > 0:
                  member_rows.append({"relpath": rel_s, "status": st, "bytes": b, "attempted_now": False})
                  continue
              if attempted >= MAX_FILES:
                  member_rows.append({"relpath": rel_s, "status": "SKIPPED_MAX_FILES", "bytes": 0, "attempted_now": False})
                  continue
              if new_bytes / 1e6 >= MAX_TOTAL_MB:
                  member_rows.append({"relpath": rel_s, "status": "SKIPPED_MAX_TOTAL_MB", "bytes": 0, "attempted_now": False})
                  continue
              st, b, attempts = curl_download(rel)
              attempts_all.extend(attempts)
              attempted += 1
              new_bytes += b
              member_rows.append({"relpath": rel_s, "status": st, "bytes": b, "attempted_now": True})

          write_csv(OUT / "swg_status.csv", swg_rows, ["scw", "relpath", "status", "bytes"])
          write_csv(OUT / "swg_reference_parse.csv", parse_rows, ["source_swg", "raw_token", "relpath"])
          write_csv(OUT / "required_members_status.csv", member_rows, ["relpath", "status", "bytes", "attempted_now"])
          write_csv(OUT / "curl_attempts.csv", attempts_all, ["relpath", "url", "exit", "elapsed_sec", "bytes_tmp", "stderr_tail"])

          swg_missing = sum(1 for r in swg_rows if int(r["bytes"] or 0) <= 0)
          missing_members = [r for r in member_rows if int(r["bytes"] or 0) <= 0]
          completed = swg_missing == 0 and len(member_rows) > 0 and len(missing_members) == 0
          summary = {
              "run_id": RUN_ID,
              "swg_missing_count": swg_missing,
              "required_member_count": len(member_rows),
              "missing_member_count": len(missing_members),
              "attempted_member_downloads_now": attempted,
              "downloaded_new_mb_estimate": new_bytes / 1e6,
              "download_complete": completed,
              "decision": "R17B_DOWNLOAD_COMPLETE_READY_FOR_OSA_NEXT" if completed else "R17B_DOWNLOAD_INCOMPLETE_CAPPED_DIAGNOSTIC_NO_THEORY_FAILURE",
              "claim_ceiling": "DOWNLOAD_ONLY_NO_OSA_NO_SPI511_MEASUREMENT_NOT_PROOF"
          }
          (OUT / "download_summary.json").write_text(json.dumps(summary, indent=2, sort_keys=True), encoding="utf-8")
          print(json.dumps(summary, indent=2, sort_keys=True))
          PY

      - name: Run safe capped diagnostic
        shell: bash
        timeout-minutes: 32
        continue-on-error: true
        run: |
          set +e
          timeout 28m python3 "$RUN_ID/scripts/r17b_safe_download.py" 2>&1 | tee "$RUN_ID/logs/r17b_safe_download.log"
          rc=${PIPESTATUS[0]}
          echo "$rc" > "$RUN_ID/logs/r17b_safe_download_exit_code.txt"
          if [ -s "$RUN_ID/download_summary.json" ] && grep -q '"download_complete": true' "$RUN_ID/download_summary.json"; then
            echo "true" > "$RUN_ID/DOWNLOAD_COMPLETE.flag"
          else
            echo "false" > "$RUN_ID/DOWNLOAD_COMPLETE.flag"
          fi
          du -sh ACIRM_CACHE_R10B_* 2>/dev/null | tee "$RUN_ID/logs/cache_sizes_all.log" || true

      - name: Build artifact
        shell: bash
        if: ${{ always() }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, csv, hashlib
          from pathlib import Path
          RUN_ID="R22F_R10B_R17B_SAFE_DOWNLOAD_DIAGNOSTIC"
          OUT=Path(RUN_ID)
          summary={}
          if (OUT/"download_summary.json").exists():
              try:
                  summary=json.loads((OUT/"download_summary.json").read_text())
              except Exception:
                  summary={}
          try:
              exit_code=(OUT/"logs/r17b_safe_download_exit_code.txt").read_text().strip()
          except Exception:
              exit_code=None
          try:
              complete=(OUT/"DOWNLOAD_COMPLETE.flag").read_text().strip()=="true"
          except Exception:
              complete=False
          status={
              "run_id":RUN_ID,
              "decision":summary.get("decision", "R17B_SCRIPT_ABORTED_OR_TIMEOUT_ARTIFACT_FOR_DIAGNOSTIC_NO_THEORY_FAILURE"),
              "download_complete":complete,
              "download_step_exit_code":exit_code,
              "swg_missing_count":summary.get("swg_missing_count"),
              "required_member_count":summary.get("required_member_count"),
              "missing_member_count":summary.get("missing_member_count"),
              "claim_ceiling":"DOWNLOAD_ONLY_NO_OSA_NO_SPI511_MEASUREMENT_NOT_PROOF"
          }
          (OUT/"STATUS.json").write_text(json.dumps(status, indent=2, sort_keys=True), encoding="utf-8")
          with (OUT/"R17B_GO_NO_GO_DECISION.csv").open("w", newline="", encoding="utf-8") as f:
              w=csv.DictWriter(f, fieldnames=list(status.keys()))
              w.writeheader(); w.writerow(status)
          rows=[]
          for p in sorted(OUT.rglob("*")):
              if p.is_file():
                  rows.append({"file":str(p.relative_to(OUT)),"sha256":hashlib.sha256(p.read_bytes()).hexdigest(),"bytes":p.stat().st_size})
          with (OUT/"MANIFEST_SHA256.csv").open("w", newline="", encoding="utf-8") as f:
              w=csv.DictWriter(f, fieldnames=["file","sha256","bytes"])
              w.writeheader(); w.writerows(rows)
          print(json.dumps(status, indent=2, sort_keys=True))
          PY
          ZIP="${RUN_ID}_RESULTS.zip"
          SHA="${ZIP}.sha256.txt"
          zip -r "$ZIP" "$RUN_ID" -x "*/__pycache__/*" >/dev/null
          sha256sum "$ZIP" > "$SHA"
          cat "$SHA"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: R22F_R10B_R17B_SAFE_DOWNLOAD_DIAGNOSTIC_RESULTS
          path: |
            R22F_R10B_R17B_SAFE_DOWNLOAD_DIAGNOSTIC_RESULTS.zip
            R22F_R10B_R17B_SAFE_DOWNLOAD_DIAGNOSTIC_RESULTS.zip.sha256.txt
          if-no-files-found: error
          retention-days: 14
