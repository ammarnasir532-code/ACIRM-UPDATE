          import zipfile, hashlib
          from pathlib import Path
          run_id = 'ACIRM_R134_RESULTS'
          root = Path(run_id)
          zip_path = Path(run_id + '.zip')
          include_dirs = [root/'results', root/'logs']
          with zipfile.ZipFile(zip_path, 'w', compression=zipfile.ZIP_DEFLATED) as z:
              for d in include_dirs:
                  if d.exists():
                      for p in d.rglob('*'):
                          if p.is_file():
                              z.write(p, p.relative_to(root.parent))
          h=hashlib.sha256(zip_path.read_bytes()).hexdigest()
          Path(str(zip_path)+'.sha256.txt').write_text(h+'  '+zip_path.name+'\n', encoding='utf-8')
          print('ZIP_READY_SLIM_RESULTS_LOGS_ONLY', zip_path, h, 'bytes', zip_path.stat().st_size)
          ZIPCODE
          exit 0
