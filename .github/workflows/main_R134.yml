name: ACIRM R134 S50716 Likelihood
"on":
  workflow_dispatch:
permissions:
  contents: read
env:
  RUN_ID: ACIRM_R134_RESULTS
  FERMI_DOCKER_IMAGE: fssc/fermibottle:latest
jobs:
  r128-r125-s50716-two-lobe-likelihood:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Prepare folders
        shell: bash
        run: |
          set -e
          mkdir -p "$RUN_ID/results" "$RUN_ID/logs" "$RUN_ID/data" "$RUN_ID/work" "$RUN_ID/pfiles"
          echo "START_UTC=$(date -u +%Y-%m-%dT%H:%M:%SZ)" | tee "$RUN_ID/logs/start_utc.txt"
          df -h . | tee "$RUN_ID/logs/disk_start.log"
      - name: Pull FermiBottle Docker image
        shell: bash
        run: |
          set +e
          docker pull "$FERMI_DOCKER_IMAGE" 2>&1 | tee "$RUN_ID/logs/docker_pull.log"
          rc=${PIPESTATUS[0]}
          if [ "$rc" -ne 0 ]; then
            echo "R134_DOCKER_PULL_FAILED_NO_SCIENTIFIC_NULL" | tee "$RUN_ID/results/R134_DOCKER_PULL_FAILED.txt"
            echo '{"verdict":"R134_DOCKER_PULL_FAILED_NO_SCIENTIFIC_NULL","not_scientific_null":true}' > "$RUN_ID/results/R134_DECISION_SUMMARY.json"
            python3 -m zipfile -c "$RUN_ID.zip" "$RUN_ID/results" "$RUN_ID/logs" || true
            sha256sum "$RUN_ID.zip" > "$RUN_ID.zip.sha256.txt" || true
            exit 0
          fi
      - name: Write and run R125 likelihood inside FermiBottle using R51C proven pattern
        shell: bash
        run: |
          set +e
          cat > r134_inside_fermibottle.sh <<'R129INNER'
          #!/usr/bin/env bash
          set +u
          set -o pipefail
          export RUN_ID="${RUN_ID:-ACIRM_R134_RESULTS}"
          mkdir -p "$RUN_ID/results" "$RUN_ID/logs" "$RUN_ID/data" "$RUN_ID/work" "$RUN_ID/pfiles"
          if [ -f /opt/conda/etc/profile.d/conda.sh ]; then source /opt/conda/etc/profile.d/conda.sh || true; fi
          if command -v conda >/dev/null 2>&1; then conda activate fermi || source activate fermi || true; fi
          for d in /opt/anaconda/envs/fermi/bin /opt/conda/envs/fermi/bin /home/fermi/miniconda3/envs/fermi/bin /opt/miniconda/envs/fermi/bin /usr/local/bin; do
            if [ -d "$d" ]; then export PATH="$d:$PATH"; fi
          done
          {
            echo "RUN_ID=$RUN_ID"
            echo "PWD=$PWD"
            echo "PATH=$PATH"
            echo "FERMI_DIR=${FERMI_DIR:-}"
            echo "CONDA_PREFIX=${CONDA_PREFIX:-}"
            echo "CALDB=${CALDB:-}"
            which python || true
            python --version || true
            which gtselect || true
            which gtlike || true
            find / -path '*/caldb/software/tools/alias_config.fits' 2>/dev/null | head -20 || true
          } | tee "$RUN_ID/logs/docker_env_probe_before_caldb_fix.log"
          CALDB_REAL=""
          for c in \
            /opt/anaconda/envs/fermi/share/fermitools/data/caldb \
            /opt/conda/envs/fermi/share/fermitools/data/caldb \
            /usr/local/share/fermitools/data/caldb \
            /refdata/fermi/caldb; do
            if [ -f "$c/software/tools/alias_config.fits" ]; then CALDB_REAL="$c"; break; fi
          done
          if [ -n "$CALDB_REAL" ]; then
            mkdir -p /refdata/fermi || true
            if [ "$CALDB_REAL" != "/refdata/fermi/caldb" ]; then
              rm -rf /refdata/fermi/caldb 2>/dev/null || true
              ln -s "$CALDB_REAL" /refdata/fermi/caldb 2>/dev/null || true
            fi
            export CALDB=/refdata/fermi/caldb
          fi
          {
            echo "R134_CALDB_REAL=$CALDB_REAL"
            echo "CALDB=$CALDB"
            ls -lah /refdata/fermi/caldb/software/tools/alias_config.fits 2>/dev/null || true
            find /refdata/fermi -maxdepth 5 -name alias_config.fits 2>/dev/null || true
          } | tee "$RUN_ID/logs/docker_caldb_refdata_fix.log"
          cat > r134_r125_run.py <<'PYCODE'
          import os, json, subprocess, traceback, zipfile, sys, shutil, math, hashlib
          from pathlib import Path
          from datetime import datetime, timezone
          RUN_ID = os.environ.get('RUN_ID', 'ACIRM_R134_RESULTS')
          ROOT = Path(RUN_ID); RESULTS=ROOT/'results'; LOGS=ROOT/'logs'; DATA=ROOT/'data'; WORK=ROOT/'work'
          for p in [RESULTS, LOGS, DATA, WORK, ROOT/'pfiles']:
              p.mkdir(parents=True, exist_ok=True)
          def write_text(path, text): Path(path).write_text(str(text), encoding='utf-8')
          def sha256_file(path):
              h=hashlib.sha256();
              with open(path,'rb') as f:
                  for b in iter(lambda:f.read(1024*1024), b''): h.update(b)
              return h.hexdigest()
          def write_json(path, obj): Path(path).write_text(json.dumps(obj, indent=2, ensure_ascii=False), encoding='utf-8')
          verdict = {
              'verdict':'TECHNICAL_FAILURE_NO_SCIENTIFIC_RESULT',
              'not_scientific_null':True,
              'claim_ceiling':'NOT_GENERAL002_NOT_PARTICLE_PROOF_NOT_MATTER_PROOF',
              'fit_rows_computed':0,
          }
          LOCKED = {
              'run_id': RUN_ID,
              'source_label':'S5 0716+714',
              'target_source_preferred':'4FGL J0721.9+7120',
              'target_association':'S5 0716+714',
              'target_ra_deg':110.47269583333333,
              'target_dec_deg':71.34343055555556,
              'catalog_match_radius_deg':0.50,
              'branch':'P4_PLUS_LATE_DOMINANT_TWO_LOBE',
              'decision_pattern':'L310 > P4 > max(C286,P8)',
              'irfs':'P8R3_SOURCE_V3',
              'evclass':128,
              'evtype':3,
              'zmax':90,
              'emax_mev':300000,
              'catalog_url':'https://fermi.gsfc.nasa.gov/ssc/data/access/lat/14yr_catalog/gll_psc_v35.fit',
              'rows':[
                  {'tag':'C286','role':'PRE_CONTROL_C286','week':286},
                  {'tag':'P4','role':'EARLY_LOBE_TARGET_P4','week':290},
                  {'tag':'P8','role':'COMPARATOR_CONTROL_P8','week':294},
                  {'tag':'L310','role':'LATE_LOBE_TARGET_L310','week':310},
              ],
              'axes':{
                  'E100': {'emin_mev':100, 'binsz_deg':0.1},
                  'E300': {'emin_mev':300, 'binsz_deg':0.2},
              },
              'variant': {'variant':'R51C_PATTERN_SRCROI24','src_roiwidth_deg':24.0,'roiwidth_deg':24.0},
              'primary_pass_rule':'For each metric TS/npred/flux and both energy axes: L310 > P4 > max(C286,P8). Strong support requires at least two full metrics pass both axes.',
              'method_note':'R125 scientific target rebuilt in R134 using the successful R51C Docker/CALDB/PFILES pattern; source/windows/claim ceiling unchanged.',
              'claim_ceiling':'full LAT likelihood candidate support only; not GENERAL_002; not proof; not discovery; not particle or matter production proof',
          }
          write_json(RESULTS/'R134_R125_LOCKED_CONTEXT.json', LOCKED)
          def run(cmd, logname, timeout=None):
              log_path=LOGS/logname
              with log_path.open('w', encoding='utf-8') as f:
                  f.write('CMD: '+' '.join(map(str,cmd))+'\n'); f.flush()
                  p=subprocess.run(cmd, stdout=f, stderr=subprocess.STDOUT, text=True, timeout=timeout)
                  f.write(f'\nRC={p.returncode}\n')
                  return p.returncode
          def download(url, outpath, logname):
              outpath=Path(outpath)
              if outpath.exists() and outpath.stat().st_size>0:
                  return {'url':url,'file':str(outpath),'status':'CACHED','size_bytes':outpath.stat().st_size,'rc':0,'sha256':sha256_file(outpath)}
              if shutil.which('wget'):
                  cmd=['bash','-lc', f"wget -nv -t 5 --retry-connrefused --timeout=90 -O '{outpath}' '{url}'"]
              elif shutil.which('curl'):
                  cmd=['bash','-lc', f"curl -L --retry 5 --retry-delay 10 --connect-timeout 90 -o '{outpath}' '{url}'"]
              else:
                  return {'url':url,'file':str(outpath),'status':'FAILED_NO_DOWNLOADER','size_bytes':0,'rc':127,'sha256':''}
              rc=run(cmd, logname, timeout=1800)
              ok=rc==0 and outpath.exists() and outpath.stat().st_size>0
              return {'url':url,'file':str(outpath),'status':'OK' if ok else 'FAILED','size_bytes':outpath.stat().st_size if outpath.exists() else 0,'rc':rc,'sha256':sha256_file(outpath) if ok else ''}
          try:
              import pandas as pd
              import numpy as np
              from astropy.table import Table
              from astropy.coordinates import SkyCoord
              from astropy.io import fits
              import astropy.units as u
              try:
                  ref_alias = Path('/refdata/fermi/caldb/software/tools/alias_config.fits')
                  if not ref_alias.exists():
                      candidates = [
                          Path('/opt/anaconda/envs/fermi/share/fermitools/data/caldb'),
                          Path('/opt/conda/envs/fermi/share/fermitools/data/caldb'),
                          Path('/usr/local/share/fermitools/data/caldb')]
                      real = next((c for c in candidates if (c/'software/tools/alias_config.fits').exists()), None)
                      if real is not None:
                          try:
                              Path('/refdata/fermi').mkdir(parents=True, exist_ok=True)
                              try:
                                  if Path('/refdata/fermi/caldb').exists() or Path('/refdata/fermi/caldb').is_symlink():
                                      if Path('/refdata/fermi/caldb').is_symlink(): Path('/refdata/fermi/caldb').unlink()
                              except Exception: pass
                              try: os.symlink(str(real), '/refdata/fermi/caldb')
                              except Exception: pass
                          except Exception as exc:
                              write_text(RESULTS/'R134_REFDATA_SYMLINK_NOT_WRITABLE_WARNING.txt', repr(exc))
                  if Path('/refdata/fermi/caldb/software/tools/alias_config.fits').exists():
                      os.environ['CALDB'] = '/refdata/fermi/caldb'
              except Exception as exc:
                  write_text(RESULTS/'R134_CALDB_REF_SYMLINK_WARNING.txt', repr(exc))
              search_roots=[os.environ.get('CALDB',''), os.environ.get('FERMI_DIR',''), os.environ.get('CONDA_PREFIX',''), '/refdata/fermi', '/opt/anaconda/envs/fermi', '/opt/conda/envs/fermi', '/opt/conda', '/usr/local', '/home/fermi']
              alias=None
              for root in [r for r in search_roots if r]:
                  rp=Path(root)
                  if not rp.exists(): continue
                  direct=rp/'software'/'tools'/'alias_config.fits'
                  if direct.exists(): alias=direct; break
                  found=list(rp.glob('**/caldb/software/tools/alias_config.fits'))[:1]
                  if found: alias=found[0]; break
              if alias is not None:
                  os.environ['CALDB']=str(alias.parents[2])
              pfiles_local=Path.cwd()/RUN_ID/'pfiles'; pfiles_local.mkdir(parents=True, exist_ok=True)
              par_search_roots=[
                  os.environ.get('PFILES',''),
                  os.environ.get('FERMI_DIR',''),
                  os.environ.get('CONDA_PREFIX',''),
                  '/opt/anaconda/envs/fermi',
                  '/opt/conda/envs/fermi',
                  '/home/fermi',
                  '/usr/local',
                  '/refdata/fermi'
              ]
              par_hits=[]
              for root in [r for r in par_search_roots if r]:
                  for part in str(root).split(';'):
                      part=part.strip()
                      if not part: continue
                      rp=Path(part)
                      if not rp.exists(): continue
                      direct=rp/'gtselect.par'
                      if direct.exists(): par_hits.append(direct)
                      try:
                          par_hits.extend(list(rp.glob('**/gtselect.par'))[:20])
                      except Exception:
                          pass
              seen=set(); par_hits_unique=[]
              for h in par_hits:
                  s=str(h)
                  if s not in seen:
                      seen.add(s); par_hits_unique.append(h)
              sysp_dir = par_hits_unique[0].parent if par_hits_unique else None
              if sysp_dir is not None:
                  os.environ['PFILES']=str(pfiles_local)+';'+str(sysp_dir)
                  try:
                      import shutil as _shutil
                      for pf in sysp_dir.glob('*.par'):
                          dst=pfiles_local/pf.name
                          if not dst.exists():
                              _shutil.copy2(pf, dst)
                  except Exception as exc:
                      write_text(RESULTS/'R134_PFILES_COPY_WARNING.txt', repr(exc))
              else:
                  os.environ['PFILES']=str(pfiles_local)
              write_text(
                  RESULTS/'R134_PFILES_DIAGNOSTIC.txt',
                  'PFILES='+os.environ.get('PFILES','')+'\n'
                  +'GTSELECT_PAR_HITS='+'|'.join(str(x) for x in par_hits_unique[:50])+'\n'
                  +'SYSP_DIR='+(str(sysp_dir) if sysp_dir else '')+'\n'
              )
              if sysp_dir is None:
                  raise RuntimeError('R134_PFILES_SYSTEM_PAR_NOT_FOUND: gtselect.par not found in FermiBottle roots')
              lt_hits=[]
              for root in [os.environ.get('CONDA_PREFIX',''), os.environ.get('FERMI_DIR',''), '/opt/anaconda/envs/fermi', '/opt/conda/envs/fermi', '/usr/local', '/refdata/fermi']:
                  if not root: continue
                  rp=Path(root)
                  if rp.exists():
                      try: lt_hits.extend(list(rp.glob('**/LivetimeCubeTemplate'))[:3])
                      except Exception: pass
              lt=lt_hits[0] if lt_hits else None
              try:
                  if lt is not None:
                      d=Path('/refdata/fermi/Likelihood'); d.mkdir(parents=True, exist_ok=True)
                      dst=d/'LivetimeCubeTemplate'
                      if dst.exists() or dst.is_symlink():
                          try: dst.unlink()
                          except Exception: pass
                      shutil.copy2(lt, dst)
                  write_text(RESULTS/'R134_LIVETIME_TEMPLATE_DIAGNOSTIC.txt','LT='+(str(lt) if lt else '')+'\nDST=/refdata/fermi/Likelihood/LivetimeCubeTemplate exists='+str(Path('/refdata/fermi/Likelihood/LivetimeCubeTemplate').exists())+'\n')
              except Exception as exc:
                  write_text(RESULTS/'R134_LIVETIME_TEMPLATE_WARNING.txt',repr(exc))
              diff_roots=[os.environ.get('FERMI_DIR',''), os.environ.get('CONDA_PREFIX',''), os.environ.get('CALDB',''), '/refdata/fermi', '/opt/anaconda/envs/fermi', '/opt/conda/envs/fermi', '/opt/conda', '/usr/local', '/home/fermi']
              galdiff=isodiff=None
              for root in [r for r in diff_roots if r]:
                  rp=Path(root)
                  if not rp.exists(): continue
                  if galdiff is None:
                      for pat in ['**/galdiffuse/gll_iem_v07.fits','**/gll_iem_v07.fits']:
                          found=list(rp.glob(pat))[:1]
                          if found: galdiff=str(found[0]); break
                  if isodiff is None:
                      for pat in ['**/galdiffuse/iso_P8R3_SOURCE_V3_v1.txt','**/iso_P8R3_SOURCE_V3_v1.txt']:
                          found=list(rp.glob(pat))[:1]
                          if found: isodiff=str(found[0]); break
              write_text(RESULTS/'R134_ENV_PATHS.txt', f'CALDB={os.environ.get("CALDB","")}\nPFILES={os.environ.get("PFILES","")}\nGALDIFF={galdiff}\nISODIFF={isodiff}\n')
              if not galdiff or not isodiff:
                  raise RuntimeError('Diffuse files missing in FermiBottle environment')
              from fermipy.gtanalysis import GTAnalysis
              write_text(RESULTS/'R134_FERMIPY_IMPORT_OK.txt', 'FERMIPY_GTANALYSIS_IMPORT_OK_AFTER_R51C_ENV_SETUP\n')
              try:
                  import importlib.metadata as md
                  lines=[]
                  for pkg in ['fermipy','fermitools','astropy','numpy','pandas']:
                      try: lines.append(f'{pkg}={md.version(pkg)}')
                      except Exception as exc: lines.append(f'{pkg}=ERROR:{exc!r}')
                  write_text(RESULTS/'R134_PACKAGE_VERSIONS.txt','\n'.join(lines)+'\n')
              except Exception as exc:
                  write_text(RESULTS/'R134_PACKAGE_VERSIONS_ERROR.txt', repr(exc))
              drows=[]; catalog_file=DATA/'gll_psc_v35.fit'
              drows.append(download(LOCKED['catalog_url'], catalog_file, 'dl_catalog.log'))
              for row in LOCKED['rows']:
                  week=row['week']
                  photon=DATA/f'lat_photon_weekly_w{week:03d}_p305_v001.fits'
                  spacecraft=DATA/f'lat_spacecraft_weekly_w{week:03d}_p310_v001.fits'
                  row['photon_file']=str(photon); row['spacecraft_file']=str(spacecraft)
                  drows.append(download(f'https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/photon/lat_photon_weekly_w{week:03d}_p305_v001.fits', photon, f'dl_{row["tag"]}_photon.log'))
                  drows.append(download(f'https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/spacecraft/lat_spacecraft_weekly_w{week:03d}_p310_v001.fits', spacecraft, f'dl_{row["tag"]}_spacecraft.log'))
                  try:
                      with fits.open(str(photon)) as hdul:
                          row['tmin_met']=float(hdul[1].header.get('TSTART', hdul[0].header.get('TSTART')))
                          row['tmax_met']=float(hdul[1].header.get('TSTOP', hdul[0].header.get('TSTOP')))
                  except Exception as exc:
                      row['tmin_met']=None; row['tmax_met']=None; row['time_header_error']=repr(exc)
              pd.DataFrame(drows).to_csv(RESULTS/'R134_DOWNLOAD_STATUS.csv', index=False)
              pd.DataFrame(LOCKED['rows']).to_csv(RESULTS/'R134_LOCKED_WINDOWS_WITH_HEADER_TIMES.csv', index=False)
              failed=[r for r in drows if str(r['status']).startswith('FAILED')]
              if failed: raise RuntimeError('Download failure: cannot run likelihood safely: '+repr(failed))
              tab=Table.read(str(catalog_file))
              names=[str(x).strip() for x in tab['Source_Name']]
              resolved=None; resolver_note=''
              if LOCKED['target_source_preferred'] in names:
                  resolved=LOCKED['target_source_preferred']; resolver_note='exact Source_Name match'
              else:
                  coord=SkyCoord(LOCKED['target_ra_deg']*u.deg, LOCKED['target_dec_deg']*u.deg)
                  cats=SkyCoord(tab['RAJ2000']*u.deg, tab['DEJ2000']*u.deg)
                  sep=coord.separation(cats).deg
                  idx=int(np.argmin(sep)); minsep=float(sep[idx])
                  if minsep <= LOCKED['catalog_match_radius_deg']:
                      resolved=names[idx]; resolver_note=f'nearest catalog source at {minsep:.6f} deg'
                  else:
                      raise RuntimeError(f'No catalog source within {LOCKED["catalog_match_radius_deg"]} deg; nearest={minsep}')
              LOCKED['target_source_resolved']=resolved
              write_json(RESULTS/'R134_TARGET_RESOLUTION.json', {'preferred':LOCKED['target_source_preferred'],'resolved':resolved,'note':resolver_note,'ra_deg':LOCKED['target_ra_deg'],'dec_deg':LOCKED['target_dec_deg']})
              def run_fermipy(axis_name, event_row):
                  axis=LOCKED['axes'][axis_name]; tag=event_row['tag']; variant=LOCKED['variant']; vtag=variant['variant']
                  workdir=WORK/f'fermipy_{axis_name}_{vtag}_{tag}'; workdir.mkdir(parents=True, exist_ok=True)
                  selection={'ra':LOCKED['target_ra_deg'], 'dec':LOCKED['target_dec_deg'], 'emin':axis['emin_mev'], 'emax':LOCKED['emax_mev'], 'zmax':LOCKED['zmax'], 'evclass':LOCKED['evclass'], 'evtype':LOCKED['evtype'], 'target':resolved}
                  if event_row.get('tmin_met') is not None and event_row.get('tmax_met') is not None:
                      selection['tmin']=event_row['tmin_met']; selection['tmax']=event_row['tmax_met']
                  cfg={
                      'data': {'evfile':event_row['photon_file'], 'scfile':event_row['spacecraft_file']},
                      'binning': {'roiwidth':variant['roiwidth_deg'], 'binsz':axis['binsz_deg'], 'binsperdec':4, 'coordsys':'CEL', 'proj':'AIT'},
                      'selection': selection,
                      'gtlike': {'irfs':LOCKED['irfs'], 'edisp':False},
                      'model': {'src_roiwidth':variant['src_roiwidth_deg'], 'galdiff':galdiff, 'isodiff':isodiff, 'catalogs':[str(catalog_file)]},
                      'fileio': {'workdir':str(workdir), 'outdir':str(workdir), 'logfile':str(LOGS/f'fermipy_{axis_name}_{tag}.log')},
                      'logging': {'verbosity':3},
                  }
                  out={'axis':axis_name,'variant':vtag,'tag':tag,'role':event_row['role'],'week':event_row['week'],'emin_mev':axis['emin_mev'],'binsz_deg':axis['binsz_deg'],'target_source':resolved,'setup_ok':False,'optimize_ok':False,'fit_ok':False,'ts':None,'npred':None,'flux':None,'flux_err':None,'fit_quality':None,'error':''}
                  try:
                      gta=GTAnalysis(cfg, logging={'verbosity':3})
                      gta.setup(); out['setup_ok']=True
                      try: gta.optimize(); out['optimize_ok']=True
                      except Exception as exc: out['error'] += 'OPTIMIZE_WARNING: '+repr(exc)+'\n'
                      try:
                          fitres=gta.fit(optimizer='NEWMINUIT', reoptimize=True); out['fit_ok']=True
                          if isinstance(fitres, dict): out['fit_quality']=fitres.get('fit_quality', None)
                      except Exception as exc: out['error'] += 'FIT_ERROR: '+repr(exc)+'\n'
                      try: out['ts']=float(gta.like.Ts(resolved))
                      except Exception:
                          try:
                              src=gta.roi.get_source_by_name(resolved)
                              out['ts']=float(src['ts'] if isinstance(src, dict) else src.ts)
                          except Exception as exc: out['error'] += 'TS_EXTRACTION_ERROR: '+repr(exc)+'\n'
                      try: out['npred']=float(gta.like.NpredValue(resolved))
                      except Exception:
                          try:
                              src=gta.roi.get_source_by_name(resolved)
                              out['npred']=float(src['npred'] if isinstance(src, dict) and 'npred' in src else getattr(src,'npred'))
                          except Exception as exc: out['error'] += 'NPRED_EXTRACTION_ERROR: '+repr(exc)+'\n'
                      try:
                          src=gta.roi.get_source_by_name(resolved)
                          if isinstance(src, dict):
                              out['flux']=float(src.get('flux')) if src.get('flux') is not None else None
                              out['flux_err']=float(src.get('flux_err')) if src.get('flux_err') is not None else None
                          else:
                              out['flux']=float(getattr(src,'flux')) if getattr(src,'flux',None) is not None else None
                              out['flux_err']=float(getattr(src,'flux_err')) if getattr(src,'flux_err',None) is not None else None
                      except Exception as exc:
                          out['error'] += 'FLUX_EXTRACTION_WARNING: '+repr(exc)+'\n'
                      try: gta.write_roi(str(workdir/'roi_final'), make_plots=False)
                      except Exception as exc: out['error'] += 'WRITE_ROI_WARNING: '+repr(exc)+'\n'
                  except Exception as exc:
                      out['error'] += 'RUN_EXCEPTION: '+repr(exc)+'\n'+traceback.format_exc()[-4000:]
                  return out
              rows=[]
              for axis_name in LOCKED['axes']:
                  for event_row in LOCKED['rows']:
                      print('R134_RUN_START', axis_name, event_row['tag'], flush=True)
                      out=run_fermipy(axis_name, event_row)
                      print('R134_RUN_DONE', axis_name, event_row['tag'], 'fit_ok=', out.get('fit_ok'), 'ts=', out.get('ts'), 'npred=', out.get('npred'), flush=True)
                      rows.append(out)
                      pd.DataFrame(rows).to_csv(RESULTS/'R134_RUN_LEVEL_LIKELIHOOD_INCREMENTAL.csv', index=False)
              df=pd.DataFrame(rows); df.to_csv(RESULTS/'R134_RUN_LEVEL_LIKELIHOOD.csv', index=False)
              fit_rows=int(df['ts'].notna().sum()) if 'ts' in df else 0
              verdict['fit_rows_computed']=fit_rows
              dec=[]
              for axis, g in df.groupby(['axis']):
                  vals={r['tag']:r for _,r in g.iterrows()}
                  for metric in ['ts','npred','flux']:
                      complete=all(k in vals and vals[k].get(metric) is not None and not pd.isna(vals[k].get(metric)) for k in ['C286','P4','P8','L310'])
                      if complete:
                          cmax=max(float(vals['C286'][metric]), float(vals['P8'][metric]))
                          p4=float(vals['P4'][metric]); late=float(vals['L310'][metric])
                          passed=bool(late>p4 and p4>cmax)
                          dec.append({'axis':axis,'metric':metric,'C286':float(vals['C286'][metric]),'P8':float(vals['P8'][metric]),'control_max':cmax,'P4':p4,'L310':late,'pattern':'L310>P4>max(C286,P8)','pass':passed})
                      else:
                          dec.append({'axis':axis,'metric':metric,'pattern':'L310>P4>max(C286,P8)','pass':False,'error':'INCOMPLETE_METRIC'})
              ddf=pd.DataFrame(dec); ddf.to_csv(RESULTS/'R134_LIKELIHOOD_TWO_LOBE_DECISION_GATES.csv', index=False)
              metric_full={}
              for metric in ['ts','npred','flux']:
                  sub=ddf[ddf['metric']==metric]
                  metric_full[metric]=bool(len(sub)==len(LOCKED['axes']) and sub['pass'].all())
              num_full=sum(1 for v in metric_full.values() if v)
              any_run_fail=bool((df['fit_ok'] != True).any()) if 'fit_ok' in df else True
              if fit_rows == 0:
                  final='R134_TECHNICAL_FAILURE_NO_SCIENTIFIC_RESULT'
                  not_null=True
              elif any_run_fail:
                  final='R134_LIKELIHOOD_EXECUTED_WITH_PARTIAL_RUN_FAILURES_REVIEW_REQUIRED_NOT_CATALOG'
                  not_null=False
              elif num_full >= 2:
                  final='R134_R125_FULL_LAT_LIKELIHOOD_TWO_LOBE_SUPPORT_READY_FOR_CATALOG_REVIEW_NOT_GENERAL002'
                  not_null=False
              elif num_full == 1:
                  final='R134_R125_PARTIAL_LAT_LIKELIHOOD_TWO_LOBE_SUPPORT_HOLD_NOT_CATALOG'
                  not_null=False
              else:
                  final='R134_R125_LAT_LIKELIHOOD_DOES_NOT_SUPPORT_TWO_LOBE_PATTERN_RETAIN_PREFLIGHT_ONLY'
                  not_null=False
              verdict.update({'verdict':final,'not_scientific_null':not_null,'metric_full_pass':metric_full,'num_metric_full_pass':num_full,'runtime_failures_present':any_run_fail,'target_source_resolved':resolved,'completed_utc':datetime.now(timezone.utc).isoformat()})
              write_json(RESULTS/'R134_DECISION_SUMMARY.json', verdict)
          except Exception as exc:
              verdict.update({'verdict':'TECHNICAL_FAILURE_NO_SCIENTIFIC_RESULT','not_scientific_null':True,'error':repr(exc),'traceback_tail':traceback.format_exc()[-6000:]})
              write_json(RESULTS/'R134_DECISION_SUMMARY.json', verdict)
              write_text(RESULTS/'R134_TOP_LEVEL_EXCEPTION.txt', traceback.format_exc())
              raise
