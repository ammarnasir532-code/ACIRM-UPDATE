name: ACIRM R39O R3 Safe No Data Fermitools Interface Dry Run

on:
  workflow_dispatch:

jobs:
  acirm-r39o-r3-safe-no-data-dry-run:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: R39O R3 safe no-data Fermitools interface dry run
        shell: bash
        run: |
          set +e
          RUN_ID="ACIRM_R39O_R3_SAFE_NO_DATA_FERMITOOLS_INTERFACE_DRY_RUN_NO_LATDATA_NO_TS"
          ROOT="$PWD/$RUN_ID"
          OUT="$ROOT/results"
          LOG="$ROOT/logs"
          MMROOT="$PWD/micromamba_r39o_r3"
          ENV_PREFIX="$PWD/acirm-fermi-env-r39o-r3"
          MM="$MMROOT/bin/micromamba"
          mkdir -p "$OUT" "$LOG" "$MMROOT/bin"
          echo "safe no-data interface dry run only; no LAT data; no likelihood; no TS; not proof" > "$OUT/CLAIM_CEILING.txt"
          echo "START_UTC=$(date -u +%Y-%m-%dT%H:%M:%SZ)" | tee "$LOG/run_status.txt"

          echo "Installing micromamba" | tee -a "$LOG/run_status.txt"
          curl -Ls https://micro.mamba.pm/api/micromamba/linux-64/latest | tar -xvj -C "$MMROOT" bin/micromamba > "$LOG/micromamba_install.log" 2>&1
          MM_RC=$?
          echo "MICROMAMBA_INSTALL_RC=$MM_RC" | tee -a "$LOG/run_status.txt"
          "$MM" --version > "$LOG/micromamba_version.txt" 2>&1

          ENV_RC=99
          if [ "$MM_RC" -eq 0 ]; then
            echo "Creating Fermi environment with python=3.11, fermitools, fermipy, regions<0.12" | tee -a "$LOG/run_status.txt"
            "$MM" create -y -p "$ENV_PREFIX" -c conda-forge -c fermi python=3.11 fermitools fermipy 'regions<0.12' pip > "$LOG/attempt1_py311_fermitools_fermipy_regionslt012.log" 2>&1
            ENV_RC=$?
            echo "ATTEMPT1_RC=$ENV_RC" | tee -a "$LOG/run_status.txt"
          fi

          if [ "$ENV_RC" -ne 0 ] && [ "$MM_RC" -eq 0 ]; then
            echo "Fallback: fermi first channel order" | tee -a "$LOG/run_status.txt"
            rm -rf "$ENV_PREFIX"
            "$MM" create -y -p "$ENV_PREFIX" -c fermi -c conda-forge python=3.11 fermitools fermipy 'regions<0.12' pip > "$LOG/attempt2_fermi_first_py311_regionslt012.log" 2>&1
            ENV_RC=$?
            echo "ATTEMPT2_RC=$ENV_RC" | tee -a "$LOG/run_status.txt"
          fi

          if [ "$ENV_RC" -ne 0 ] && [ "$MM_RC" -eq 0 ]; then
            echo "Fallback: fermitools only, no fermipy" | tee -a "$LOG/run_status.txt"
            rm -rf "$ENV_PREFIX"
            "$MM" create -y -p "$ENV_PREFIX" -c conda-forge -c fermi python=3.11 fermitools pip > "$LOG/attempt3_py311_fermitools_only.log" 2>&1
            ENV_RC=$?
            echo "ATTEMPT3_RC=$ENV_RC" | tee -a "$LOG/run_status.txt"
          fi

          echo "FINAL_ENV_CREATE_RC=$ENV_RC" | tee -a "$LOG/run_status.txt"
          echo "$ENV_PREFIX" > "$LOG/env_prefix.txt"

          CORE_COMMANDS="gtselect gtmktime gtbin gtlike gtmodel gtexpcube2 gtltcube gtpsf"
          MODULES="numpy astropy scipy pandas matplotlib fermipy regions gammapy"

          echo "command,found,path,core" > "$OUT/R39O_R3_COMMANDS_CHECK.csv"
          CORE_FOUND=0
          if [ "$ENV_RC" -eq 0 ]; then
            for c in $CORE_COMMANDS; do
              P="$($MM run -p "$ENV_PREFIX" bash -lc "command -v $c" 2>/tmp/r39o_cmd_err.txt)"
              if [ -n "$P" ]; then
                FOUND="true"
                CORE_FOUND=$((CORE_FOUND+1))
              else
                FOUND="false"
              fi
              echo "$c,$FOUND,$P,true" >> "$OUT/R39O_R3_COMMANDS_CHECK.csv"
            done
          else
            for c in $CORE_COMMANDS; do echo "$c,false,,true" >> "$OUT/R39O_R3_COMMANDS_CHECK.csv"; done
          fi

          echo "module,import_ok,error,core" > "$OUT/R39O_R3_MODULES_CHECK.csv"
          CORE_PY_OK="false"
          FERMIPY_IMPORT_OK="false"
          REGIONS_VERSION="NA"
          GAMMAPY_VERSION="NA"
          if [ "$ENV_RC" -eq 0 ]; then
            for m in $MODULES; do
              ERR="$($MM run -p "$ENV_PREFIX" python -c "import $m; print('OK')" 2>&1 >/tmp/r39o_mod_out.txt)"
              RC=$?
              if [ "$RC" -eq 0 ]; then OK="true"; ERR=""; else OK="false"; fi
              CORE="false"
              if [ "$m" = "numpy" ] || [ "$m" = "astropy" ]; then CORE="true"; fi
              if [ "$m" = "fermipy" ] && [ "$OK" = "true" ]; then FERMIPY_IMPORT_OK="true"; fi
              CLEAN_ERR="$(echo "$ERR" | tr '\n' ' ' | tr ',' ';' | cut -c1-500)"
              echo "$m,$OK,$CLEAN_ERR,$CORE" >> "$OUT/R39O_R3_MODULES_CHECK.csv"
            done
            $MM run -p "$ENV_PREFIX" python -c "import numpy, astropy" >/tmp/r39o_core_py_ok.txt 2>&1
            if [ "$?" -eq 0 ]; then CORE_PY_OK="true"; fi
            REGIONS_VERSION="$($MM run -p "$ENV_PREFIX" python -c "import regions; print(getattr(regions,'__version__','NA'))" 2>/dev/null)"
            GAMMAPY_VERSION="$($MM run -p "$ENV_PREFIX" python -c "import gammapy; print(getattr(gammapy,'__version__','NA'))" 2>/dev/null)"
          fi

          GTAPP_IMPORT_OK="false"
          GTAPP_INSTANTIATE_OK="false"
          GTANALYSIS_IMPORT_OK="false"
          if [ "$ENV_RC" -eq 0 ]; then
            $MM run -p "$ENV_PREFIX" python -c "from GtApp import GtApp; print('GtApp import OK')" > "$LOG/gtapp_import.log" 2>&1
            if [ "$?" -eq 0 ]; then GTAPP_IMPORT_OK="true"; fi

            $MM run -p "$ENV_PREFIX" python -c "from GtApp import GtApp; cmds='gtselect gtmktime gtbin gtlike gtmodel gtexpcube2 gtltcube gtpsf'.split(); [GtApp(c) for c in cmds]; print('GtApp instantiate OK')" > "$LOG/gtapp_instantiate_core.log" 2>&1
            if [ "$?" -eq 0 ]; then GTAPP_INSTANTIATE_OK="true"; fi

            $MM run -p "$ENV_PREFIX" python -c "from fermipy.gtanalysis import GTAnalysis; print('GTAnalysis import OK')" > "$LOG/fermipy_gtanalysis_import.log" 2>&1
            if [ "$?" -eq 0 ]; then GTANALYSIS_IMPORT_OK="true"; fi
          fi

          if [ "$ENV_RC" -eq 0 ] && [ "$CORE_FOUND" -eq 8 ] && [ "$CORE_PY_OK" = "true" ] && [ "$GTAPP_IMPORT_OK" = "true" ] && [ "$GTAPP_INSTANTIATE_OK" = "true" ] && [ "$GTANALYSIS_IMPORT_OK" = "true" ]; then
            STATUS="R39O_R3_SAFE_NO_DATA_INTERFACE_DRY_RUN_PASS_READY_FOR_R39P_NO_LATDATA_NO_TS_NOT_PROOF"
          elif [ "$ENV_RC" -eq 0 ] && [ "$CORE_FOUND" -eq 8 ] && [ "$CORE_PY_OK" = "true" ] && [ "$GTAPP_IMPORT_OK" = "true" ]; then
            STATUS="R39O_R3_SAFE_NO_DATA_INTERFACE_PARTIAL_PASS_NEEDS_MANUAL_REVIEW_NOT_PHYSICAL_NULL"
          else
            STATUS="R39O_R3_SAFE_NO_DATA_INTERFACE_TECHNICAL_BLOCK_NOT_PHYSICAL_NULL"
          fi

          cat > "$OUT/R39O_R3_DECISION_SUMMARY.json" <<EOF
          {
            "run_id": "$RUN_ID",
            "status": "$STATUS",
            "claim_ceiling": "safe no-data interface dry run only; no LAT data; no likelihood; no TS; not proof",
            "env_create_rc": "$ENV_RC",
            "core_commands_found": "$CORE_FOUND/8",
            "core_python_modules_ok": "$CORE_PY_OK",
            "fermipy_import_ok": "$FERMIPY_IMPORT_OK",
            "fermipy_gtanalysis_import_ok": "$GTANALYSIS_IMPORT_OK",
            "gtapp_import_ok": "$GTAPP_IMPORT_OK",
            "gtapp_instantiate_core_ok": "$GTAPP_INSTANTIATE_OK",
            "regions_version": "$REGIONS_VERSION",
            "gammapy_version": "$GAMMAPY_VERSION",
            "physical_interpretation": "technical no-data interface probe only; not a physical null and not evidence against 3C279 +4/+8"
          }
          EOF

          echo "STATUS: $STATUS"
          echo "CORE_COMMANDS_FOUND: $CORE_FOUND/8"
          echo "FERMIPY_IMPORT_OK: $FERMIPY_IMPORT_OK"
          echo "FERMIPY_GTANALYSIS_IMPORT_OK: $GTANALYSIS_IMPORT_OK"
          echo "GTAPP_IMPORT_OK: $GTAPP_IMPORT_OK"
          echo "GTAPP_INSTANTIATE_CORE_OK: $GTAPP_INSTANTIATE_OK"
          echo "CORE_PYTHON_MODULES_OK: $CORE_PY_OK"
          echo "REGIONS_VERSION: $REGIONS_VERSION"
          echo "GAMMAPY_VERSION: $GAMMAPY_VERSION"

          echo "# R39O_R3" > "$OUT/README_AR.md"
          echo "STATUS: $STATUS" >> "$OUT/README_AR.md"
          echo "فحص واجهات فقط. لا LAT data ولا likelihood ولا TS ولا proof." >> "$OUT/README_AR.md"

          cd "$PWD"
          ZIP_NAME="${RUN_ID}_RESULTS_PACKAGE.zip"
          zip -r "$ZIP_NAME" "$RUN_ID/results" "$RUN_ID/logs" >/dev/null
          sha256sum "$ZIP_NAME" > "$ZIP_NAME.sha256.txt"
          echo "ZIP: $ZIP_NAME"
          echo "SHA256: $(cut -d' ' -f1 "$ZIP_NAME.sha256.txt")"

      - name: Upload R39O R3 results
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R39O_R3_SAFE_NO_DATA_FERMITOOLS_INTERFACE_DRY_RUN_NO_LATDATA_NO_TS_RESULTS
          path: |
            ACIRM_R39O_R3_SAFE_NO_DATA_FERMITOOLS_INTERFACE_DRY_RUN_NO_LATDATA_NO_TS_RESULTS_PACKAGE.zip
            ACIRM_R39O_R3_SAFE_NO_DATA_FERMITOOLS_INTERFACE_DRY_RUN_NO_LATDATA_NO_TS_RESULTS_PACKAGE.zip.sha256.txt
          if-no-files-found: error
