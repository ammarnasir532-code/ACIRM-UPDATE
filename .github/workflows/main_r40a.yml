name: ACIRM R40A 3C279 Strict Rerun Spec Lock No Download No TS

on:
  workflow_dispatch:

jobs:
  acirm-r40a-strict-rerun-spec-lock:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Prepare R40A folders
        shell: bash
        run: |
          set -u
          RUN_ID="ACIRM_R40A_3C279_STRICT_RERUN_SPEC_LOCK_NO_DOWNLOAD_NO_TS"
          echo "$RUN_ID" > /tmp/acirm_run_id.txt
          mkdir -p "$RUN_ID/results" "$RUN_ID/logs"
          echo "START_UTC=$(date -u +%Y-%m-%dT%H:%M:%SZ)" > "$RUN_ID/logs/run_status.txt"

      - name: Write locked 3C279 reference and strict rerun specification
        shell: bash
        run: |
          set -u
          RUN_ID="$(cat /tmp/acirm_run_id.txt)"
          cat > "$RUN_ID/results/R40A_LOCKED_3C279_REFERENCE.json" <<'EOF'
          {
            "target_source": "3C279",
            "locked_lags_weeks": [4, 8],
            "reference_stage": "R35H_R2",
            "plus4_ts": 2427.718553,
            "plus8_ts": 924.805371,
            "target_min_ts": 924.805371,
            "target_sum_ts": 3352.523924,
            "best_control_min_ts": 201.385473,
            "best_control_sum_ts": 841.990828,
            "target_min_margin": 723.419898,
            "target_sum_margin": 2510.533096,
            "claim_ceiling": "not proof; not discovery; not material production; not universal +4/+8 timing"
          }
          EOF

          cat > "$RUN_ID/results/R40A_STRICT_RERUN_SPEC.csv" <<'EOF'
          field,status,value_or_rule
          target_source,LOCKED,3C279 only
          locked_lags,LOCKED,+4 and +8 weeks only
          reference_stage,LOCKED,R35H_R2 numeric locks preserved
          source_retuning,FORBIDDEN,no alternative source selection
          lag_retuning,FORBIDDEN,no lag search and no +1/+12 rescue
          controls,LOCKED_BY_PRIOR_LEDGER,no post-result control dropping
          catalog_model,REQUIRED_BEFORE_EXECUTION,inherit standard 4FGL/DR4 model path from prior ledger or stop as technical block
          event_query,REQUIRED_BEFORE_EXECUTION,explicit LAT event query must be written before any download
          spacecraft_query,REQUIRED_BEFORE_EXECUTION,explicit spacecraft query must be written before any download
          roi_definition,REQUIRED_BEFORE_EXECUTION,inherit locked ROI from R35H_R2 or stop as manual-review block
          energy_range,REQUIRED_BEFORE_EXECUTION,inherit locked energy range from R35H_R2 or stop as manual-review block
          zmax_filter,REQUIRED_BEFORE_EXECUTION,inherit locked zenith/quality filters from R35H_R2 or stop as manual-review block
          irfs,REQUIRED_BEFORE_EXECUTION,inherit locked IRFs from R35H_R2 or stop as manual-review block
          gti_filter,REQUIRED_BEFORE_EXECUTION,must be specified before gtmktime
          xml_generation,NOT_EXECUTED_IN_R40A,no model XML generated in R40A
          lat_data_download,NOT_EXECUTED_IN_R40A,no LAT event or spacecraft data downloaded in R40A
          fermitools_execution,NOT_EXECUTED_IN_R40A,no gtselect gtmktime gtlike or likelihood command executed in R40A
          ts_computation,NOT_EXECUTED_IN_R40A,no new TS computed in R40A
          claim_ceiling,LOCKED,not proof not discovery not material production
          EOF

          cat > "$RUN_ID/results/R40A_GATES.csv" <<'EOF'
          gate,status,reason
          G1_SOURCE_LOCK,PASS,target source remains 3C279
          G2_LAG_LOCK,PASS,only +4 and +8 are allowed
          G3_R35H_R2_NUMERIC_LOCKS,PASS,locked numeric values preserved
          G4_NO_RESCUE_BRANCHES,PASS,+1 and 3C273 +12 remain excluded
          G5_NO_LATDATA_DOWNLOAD,PASS,no LAT event or spacecraft data downloaded
          G6_NO_FERMITOOLS_EXECUTION,PASS,no gtselect gtmktime gtlike or likelihood command executed
          G7_NO_TS_NEW,PASS,no new TS computed
          G8_READY_FOR_R40B_QUERY_SPEC_VALIDATOR,PASS,next step is explicit query-spec validator before any download
          EOF

          cat > "$RUN_ID/results/CLAIM_CEILING.txt" <<'EOF'
          strict rerun specification only; no LAT data download; no photon selection; no likelihood; no TS; not proof; not discovery; not material production
          EOF

          cat > "$RUN_ID/results/R40B_NEXT_ACTION_PLAN_AR.md" <<'EOF'
          # R40B next action

          R40B should validate the explicit 3C279 data-query specification before any LAT data download.

          It must still avoid photon selection, likelihood, and TS.

          Required before any real download:
          - exact event query specification
          - exact spacecraft query specification
          - inherited ROI / energy / IRF / GTI choices from R35H_R2
          - frozen controls
          - no lag/source retuning
          - no +1 or 3C273 +12 rescue
          EOF

          cat > "$RUN_ID/results/README_AR.md" <<'EOF'
          # R40A

          STATUS: `R40A_3C279_STRICT_RERUN_SPEC_LOCK_PASS_READY_FOR_R40B_NO_DOWNLOAD_NO_TS_NOT_PROOF`

          هذه حزمة تثبيت مواصفات rerun فقط.

          لا LAT data download، لا photon selection، لا likelihood، لا TS، ولا proof.
          EOF

      - name: Build decision summary and manifest
        shell: bash
        run: |
          set -u
          RUN_ID="$(cat /tmp/acirm_run_id.txt)"
          cat > "$RUN_ID/results/R40A_DECISION_SUMMARY.json" <<'EOF'
          {
            "run_id": "ACIRM_R40A_3C279_STRICT_RERUN_SPEC_LOCK_NO_DOWNLOAD_NO_TS",
            "status": "R40A_3C279_STRICT_RERUN_SPEC_LOCK_PASS_READY_FOR_R40B_NO_DOWNLOAD_NO_TS_NOT_PROOF",
            "claim_ceiling": "strict rerun specification only; no LAT data download; no photon selection; no likelihood; no TS; not proof",
            "target_source": "3C279",
            "locked_lags_weeks": [4, 8],
            "locked_reference_stage": "R35H_R2",
            "no_latdata_download": true,
            "no_photon_selection": true,
            "no_likelihood": true,
            "no_ts": true,
            "next_step_if_pass": "R40B explicit data-query specification validator with no download and no TS",
            "physical_interpretation": "rerun specification scaffold only; not a physical test and not a physical null"
          }
          EOF
          (cd "$RUN_ID/results" && sha256sum CLAIM_CEILING.txt R40A_DECISION_SUMMARY.json R40A_GATES.csv R40A_LOCKED_3C279_REFERENCE.json R40A_STRICT_RERUN_SPEC.csv R40B_NEXT_ACTION_PLAN_AR.md README_AR.md > R40A_MANIFEST_SHA256.csv)
          echo "END_UTC=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$RUN_ID/logs/run_status.txt"
          echo "STATUS: R40A_3C279_STRICT_RERUN_SPEC_LOCK_PASS_READY_FOR_R40B_NO_DOWNLOAD_NO_TS_NOT_PROOF"
          echo "TARGET_SOURCE: 3C279"
          echo "LOCKED_LAGS: +4,+8"
          echo "NO_LATDATA_DOWNLOAD: true"
          echo "NO_TS: true"

      - name: Package R40A results
        shell: bash
        run: |
          set -u
          RUN_ID="$(cat /tmp/acirm_run_id.txt)"
          ZIP_NAME="${RUN_ID}_RESULTS_PACKAGE.zip"
          zip -r "$ZIP_NAME" "$RUN_ID/results" "$RUN_ID/logs" >/dev/null
          sha256sum "$ZIP_NAME" > "$ZIP_NAME.sha256.txt"
          echo "ZIP: $ZIP_NAME"
          echo "SHA256: $(cut -d' ' -f1 "$ZIP_NAME.sha256.txt")"

      - name: Upload R40A artifact
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R40A_3C279_STRICT_RERUN_SPEC_LOCK_NO_DOWNLOAD_NO_TS_RESULTS
          path: |
            ACIRM_R40A_3C279_STRICT_RERUN_SPEC_LOCK_NO_DOWNLOAD_NO_TS_RESULTS_PACKAGE.zip
            ACIRM_R40A_3C279_STRICT_RERUN_SPEC_LOCK_NO_DOWNLOAD_NO_TS_RESULTS_PACKAGE.zip.sha256.txt
          if-no-files-found: error
