name: ACIRM R40D 3C279 Download Manifest Size Budget No Download No TS

on:
  workflow_dispatch:

jobs:
  acirm-r40d-download-manifest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Build R40D download manifest no download no TS
        shell: bash
        run: |
          set -u
          RUN_ID="ACIRM_R40D_3C279_STRICT_DOWNLOAD_MANIFEST_SIZE_BUDGET_NO_DOWNLOAD_NO_TS"
          mkdir -p "$RUN_ID/results"

          cat > "$RUN_ID/results/CLAIM_CEILING.txt" <<'EOF'
          R40D is a strict download-manifest and size-budget lock only. No LAT/FITS payload download. No Fermitools execution. No photon selection. No likelihood. No TS. Not proof.
          EOF

          cat > "$RUN_ID/results/R40D_DOWNLOAD_MANIFEST.csv" <<'EOF'
          label,lag_week,week,kind,url,content_length_bytes,content_length_mib,priority,download_allowed_now,execution_allowed_now
          ANCHOR,0,286,photon,https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/photon/lat_photon_weekly_w286_p305_v001.fits,187560000,178.871,REQUIRED,false,false
          ANCHOR,0,286,spacecraft,https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/spacecraft/lat_spacecraft_weekly_w286_p310_v001.fits,2810880,2.681,REQUIRED,false,false
          TARGET_PLUS_4,4,290,photon,https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/photon/lat_photon_weekly_w290_p305_v001.fits,318951360,304.176,REQUIRED,false,false
          TARGET_PLUS_4,4,290,spacecraft,https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/spacecraft/lat_spacecraft_weekly_w290_p310_v001.fits,2862720,2.730,REQUIRED,false,false
          TARGET_PLUS_8,8,294,photon,https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/photon/lat_photon_weekly_w294_p305_v001.fits,360636480,343.930,REQUIRED,false,false
          TARGET_PLUS_8,8,294,spacecraft,https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/spacecraft/lat_spacecraft_weekly_w294_p310_v001.fits,2822400,2.692,REQUIRED,false,false
          CONTROL_PLUS_12,12,298,photon,https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/photon/lat_photon_weekly_w298_p305_v001.fits,323127360,308.158,CONTROL,false,false
          CONTROL_PLUS_12,12,298,spacecraft,https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/spacecraft/lat_spacecraft_weekly_w298_p310_v001.fits,2831040,2.700,CONTROL,false,false
          CONTROL_PLUS_16,16,302,photon,https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/photon/lat_photon_weekly_w302_p305_v001.fits,294649920,281.000,CONTROL,false,false
          CONTROL_PLUS_16,16,302,spacecraft,https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/spacecraft/lat_spacecraft_weekly_w302_p310_v001.fits,2828160,2.697,CONTROL,false,false
          CONTROL_PLUS_24,24,310,photon,https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/photon/lat_photon_weekly_w310_p305_v001.fits,199935360,190.673,CONTROL,false,false
          CONTROL_PLUS_24,24,310,spacecraft,https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/spacecraft/lat_spacecraft_weekly_w310_p310_v001.fits,2833920,2.703,CONTROL,false,false
          CONTROL_PLUS_32,32,318,photon,https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/photon/lat_photon_weekly_w318_p305_v001.fits,189610560,180.827,CONTROL,false,false
          CONTROL_PLUS_32,32,318,spacecraft,https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/spacecraft/lat_spacecraft_weekly_w318_p310_v001.fits,2802240,2.672,CONTROL,false,false
          CONTROL_PLUS_48,48,334,photon,https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/photon/lat_photon_weekly_w334_p305_v001.fits,322168320,307.244,CONTROL,false,false
          CONTROL_PLUS_48,48,334,spacecraft,https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/spacecraft/lat_spacecraft_weekly_w334_p310_v001.fits,2816640,2.686,CONTROL,false,false
          CONTROL_PLUS_64,64,350,photon,https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/photon/lat_photon_weekly_w350_p305_v001.fits,197677440,188.520,CONTROL,false,false
          CONTROL_PLUS_64,64,350,spacecraft,https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/spacecraft/lat_spacecraft_weekly_w350_p310_v001.fits,2828160,2.697,CONTROL,false,false
          CATALOG,NA,NA,4fgl_catalog,https://fermi.gsfc.nasa.gov/ssc/data/access/lat/14yr_catalog/gll_psc_v35.fit,7819200,7.457,REQUIRED,false,false
          EOF

          cat > "$RUN_ID/results/R40D_SIZE_BUDGET.csv" <<'EOF'
          metric,value
          row_count,19
          full_payload_bytes,2427573720
          full_payload_mib,2315.113
          required_only_bytes,1184045040
          required_only_mib,1129.193
          target_plus4_plus8_photon_bytes,679587840
          target_plus4_plus8_photon_mib,648.106
          spacecraft_total_bytes,25441920
          spacecraft_total_mib,24.263
          catalog_bytes,7819200
          catalog_mib,7.457
          download_allowed_now,false
          ts_allowed_now,false
          EOF

          cat > "$RUN_ID/results/R40D_GATES.csv" <<'EOF'
          gate,status
          SOURCE_LOCK,PASS
          PLUS4_PLUS8_LOCK,PASS
          QUERY_ROWS_19,PASS
          R40C_HEAD_ALL_OK_INHERITED,PASS
          DOWNLOAD_MANIFEST_BUILT,PASS
          SIZE_BUDGET_BUILT,PASS
          NO_LATDATA_DOWNLOAD,PASS
          NO_FERMITOOLS_EXECUTION,PASS
          NO_TS,PASS
          EOF

          cat > "$RUN_ID/results/R40D_DECISION_SUMMARY.json" <<'EOF'
          {
            "run_id": "ACIRM_R40D_3C279_STRICT_DOWNLOAD_MANIFEST_SIZE_BUDGET_NO_DOWNLOAD_NO_TS",
            "status": "R40D_3C279_STRICT_DOWNLOAD_MANIFEST_SIZE_BUDGET_PASS_READY_FOR_R40E_NO_DOWNLOAD_NO_TS_NOT_PROOF",
            "target_source": "3C279",
            "target_4fgl_name": "4FGL J1256.1-0547",
            "locked_lags_weeks": [4, 8],
            "reference_stage": "R35H_R2",
            "query_rows_expected": 19,
            "full_payload_bytes": 2427573720,
            "full_payload_mib": 2315.113,
            "download_allowed_now": false,
            "no_latdata_download": true,
            "no_fermitools_execution": true,
            "no_photon_selection": true,
            "no_likelihood": true,
            "no_ts": true,
            "claim_ceiling": "download manifest and size budget only; no FITS payload download; no Fermitools execution; no TS; not proof",
            "physical_interpretation": "not a physical test and not a physical null"
          }
          EOF

          cat > "$RUN_ID/results/R40E_NEXT_ACTION_PLAN.txt" <<'EOF'
          Next step: R40E may prepare an explicitly approved tiny download smoke plan. It must not download FITS payload or run TS unless explicitly approved.
          EOF

          echo "STATUS: R40D_3C279_STRICT_DOWNLOAD_MANIFEST_SIZE_BUDGET_PASS_READY_FOR_R40E_NO_DOWNLOAD_NO_TS_NOT_PROOF" > "$RUN_ID/results/README.txt"

          (
            cd "$RUN_ID/results"
            sha256sum CLAIM_CEILING.txt R40D_DECISION_SUMMARY.json R40D_DOWNLOAD_MANIFEST.csv R40D_GATES.csv R40D_SIZE_BUDGET.csv R40E_NEXT_ACTION_PLAN.txt README.txt > R40D_MANIFEST_SHA256.csv
          )

          ZIP_NAME="${RUN_ID}_RESULTS_PACKAGE.zip"
          zip -r "$ZIP_NAME" "$RUN_ID/results" >/dev/null
          sha256sum "$ZIP_NAME" > "$ZIP_NAME.sha256.txt"

          echo "STATUS: R40D_3C279_STRICT_DOWNLOAD_MANIFEST_SIZE_BUDGET_PASS_READY_FOR_R40E_NO_DOWNLOAD_NO_TS_NOT_PROOF"
          echo "TARGET_SOURCE: 3C279"
          echo "LOCKED_LAGS: +4,+8"
          echo "FULL_PAYLOAD_MIB: 2315.113"
          echo "DOWNLOAD_ALLOWED_NOW: false"
          echo "NO_LATDATA_DOWNLOAD: true"
          echo "NO_TS: true"
          echo "ZIP: $ZIP_NAME"
          echo "SHA256: $(cut -d' ' -f1 "$ZIP_NAME.sha256.txt")"

      - name: Upload R40D results
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R40D_3C279_STRICT_DOWNLOAD_MANIFEST_SIZE_BUDGET_NO_DOWNLOAD_NO_TS_RESULTS
          path: |
            ACIRM_R40D_3C279_STRICT_DOWNLOAD_MANIFEST_SIZE_BUDGET_NO_DOWNLOAD_NO_TS_RESULTS_PACKAGE.zip
            ACIRM_R40D_3C279_STRICT_DOWNLOAD_MANIFEST_SIZE_BUDGET_NO_DOWNLOAD_NO_TS_RESULTS_PACKAGE.zip.sha256.txt
          if-no-files-found: error
