name: ACIRM R40E 3C279 Tiny Download Approval Gate No Payload No TS

on:
  workflow_dispatch:

jobs:
  acirm-r40e-tiny-download-approval-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Prepare R40E result package
        shell: bash
        run: |
          set -u
          RUN_ID="ACIRM_R40E_3C279_TINY_DOWNLOAD_APPROVAL_GATE_NO_PAYLOAD_NO_TS"
          mkdir -p "$RUN_ID/results"

          STATUS="R40E_3C279_TINY_DOWNLOAD_SMOKE_PLAN_APPROVAL_GATE_PASS_READY_FOR_R40F_NO_PAYLOAD_NO_TS_NOT_PROOF"
          TARGET_SOURCE="3C279"
          TARGET_4FGL="4FGL J1256.1-0547"
          LOCKED_LAGS="+4,+8"
          REFERENCE_STAGE="R35H_R2"
          FULL_PAYLOAD_MIB="2315.113"
          REQUIRED_ONLY_MIB="1129.193"
          TARGET_PLUS4_PLUS8_PHOTON_MIB="648.106"
          DOWNLOAD_ALLOWED_NOW="false"
          TINY_DOWNLOAD_APPROVAL_REQUIRED="true"
          NO_FITS_PAYLOAD_DOWNLOAD="true"
          NO_LATDATA_DOWNLOAD="true"
          NO_FERMITOOLS_EXECUTION="true"
          NO_PHOTON_SELECTION="true"
          NO_LIKELIHOOD="true"
          NO_TS="true"

          cat > "$RUN_ID/results/R40E_DECISION_SUMMARY.json" <<EOF
          {
            "run_id": "$RUN_ID",
            "status": "$STATUS",
            "target_source": "$TARGET_SOURCE",
            "target_4fgl_name": "$TARGET_4FGL",
            "locked_lags": "$LOCKED_LAGS",
            "reference_stage": "$REFERENCE_STAGE",
            "full_payload_mib": $FULL_PAYLOAD_MIB,
            "required_only_mib": $REQUIRED_ONLY_MIB,
            "target_plus4_plus8_photon_mib": $TARGET_PLUS4_PLUS8_PHOTON_MIB,
            "download_allowed_now": $DOWNLOAD_ALLOWED_NOW,
            "tiny_download_approval_required": $TINY_DOWNLOAD_APPROVAL_REQUIRED,
            "no_fits_payload_download": $NO_FITS_PAYLOAD_DOWNLOAD,
            "no_latdata_download": $NO_LATDATA_DOWNLOAD,
            "no_fermitools_execution": $NO_FERMITOOLS_EXECUTION,
            "no_photon_selection": $NO_PHOTON_SELECTION,
            "no_likelihood": $NO_LIKELIHOOD,
            "no_ts": $NO_TS,
            "claim_ceiling": "approval gate and tiny-download plan only; no FITS payload download; no Fermitools execution; no likelihood; no TS; not proof",
            "physical_interpretation": "not a physical test and not a physical null"
          }
          EOF

          cat > "$RUN_ID/results/R40E_GATES.csv" <<EOF
          gate,status
          SOURCE_LOCK,PASS
          PLUS4_PLUS8_LOCK,PASS
          R40D_SIZE_BUDGET_INHERITED,PASS
          DOWNLOAD_ALLOWED_NOW_FALSE,PASS
          TINY_DOWNLOAD_REQUIRES_EXPLICIT_APPROVAL,PASS
          NO_FITS_PAYLOAD_DOWNLOAD,PASS
          NO_LATDATA_DOWNLOAD,PASS
          NO_FERMITOOLS_EXECUTION,PASS
          NO_TS,PASS
          EOF

          cat > "$RUN_ID/results/R40E_TINY_DOWNLOAD_PLAN.csv" <<EOF
          plan_item,allowed_now,requires_explicit_approval,description
          byte_range_probe,false,true,Future R40F may request only a tiny HTTP Range such as bytes 0-4095 to verify transfer path without downloading FITS payload.
          catalog_probe,false,true,Future R40F may request a tiny catalog byte-range only if explicitly approved.
          full_fits_download,false,true,Not allowed in R40E; full payload remains blocked.
          fermitools_execution,false,true,Not allowed in R40E.
          likelihood_ts,false,true,Not allowed in R40E.
          EOF

          cat > "$RUN_ID/results/R40F_NEXT_ACTION_PLAN.txt" <<EOF
          Next step: R40F may run a tiny approved byte-range transfer smoke test only if explicitly approved. It must not download full FITS payload, must not run Fermitools, and must not compute TS.
          EOF

          cat > "$RUN_ID/results/CLAIM_CEILING.txt" <<EOF
          R40E is an approval gate and tiny-download plan only. No FITS payload download. No Fermitools execution. No photon selection. No likelihood. No TS. Not proof.
          EOF

          echo "STATUS: $STATUS" > "$RUN_ID/results/README.txt"

          (cd "$RUN_ID/results" && sha256sum CLAIM_CEILING.txt R40E_DECISION_SUMMARY.json R40E_GATES.csv R40E_TINY_DOWNLOAD_PLAN.csv R40F_NEXT_ACTION_PLAN.txt README.txt > R40E_MANIFEST_SHA256.csv)

          ZIP_NAME="${RUN_ID}_RESULTS_PACKAGE.zip"
          zip -r "$ZIP_NAME" "$RUN_ID/results" >/dev/null
          sha256sum "$ZIP_NAME" > "$ZIP_NAME.sha256.txt"
          SHA256_VALUE="$(cut -d' ' -f1 "$ZIP_NAME.sha256.txt")"

          echo "STATUS: $STATUS"
          echo "TARGET_SOURCE: $TARGET_SOURCE"
          echo "LOCKED_LAGS: $LOCKED_LAGS"
          echo "TINY_DOWNLOAD_APPROVAL_REQUIRED: $TINY_DOWNLOAD_APPROVAL_REQUIRED"
          echo "NO_FITS_PAYLOAD_DOWNLOAD: $NO_FITS_PAYLOAD_DOWNLOAD"
          echo "NO_TS: $NO_TS"
          echo "SHA256: $SHA256_VALUE"

      - name: Upload R40E artifact
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R40E_3C279_TINY_DOWNLOAD_APPROVAL_GATE_NO_PAYLOAD_NO_TS_RESULTS
          path: |
            ACIRM_R40E_3C279_TINY_DOWNLOAD_APPROVAL_GATE_NO_PAYLOAD_NO_TS_RESULTS_PACKAGE.zip
            ACIRM_R40E_3C279_TINY_DOWNLOAD_APPROVAL_GATE_NO_PAYLOAD_NO_TS_RESULTS_PACKAGE.zip.sha256.txt
          if-no-files-found: error
