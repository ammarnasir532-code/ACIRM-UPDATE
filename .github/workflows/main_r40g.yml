name: ACIRM R40G 3C279 Controlled LAT Download Required Only No TS

on:
  workflow_dispatch:
    inputs:
      approval_token:
        description: 'Type APPROVE_R40G_REAL_DOWNLOAD to allow controlled LAT download.'
        required: true
        default: ''
      download_scope:
        description: 'REQUIRED_ONLY downloads anchor + +4 + +8 + catalog; ALL_19 downloads controls too.'
        required: true
        default: 'REQUIRED_ONLY'
        type: choice
        options:
          - REQUIRED_ONLY
          - ALL_19

jobs:
  acirm-r40g-controlled-download:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Prepare R40G folders and locked manifest
        shell: bash
        run: |
          set -u
          RUN_ID="ACIRM_R40G_3C279_CONTROLLED_LAT_DOWNLOAD_NO_TS"
          echo "$RUN_ID" > /tmp/acirm_run_id.txt
          mkdir -p "$RUN_ID/results" "$RUN_ID/logs" "$RUN_ID/data"
          cat > "$RUN_ID/results/CLAIM_CEILING.txt" <<'EOF'
          R40G downloads LAT/Fermi files only under explicit approval. It does not run Fermitools, photon selection, likelihood, or TS. It is not proof and not a physical result.
          EOF
          cat > "$RUN_ID/results/R40G_LOCKS.txt" <<'EOF'
          target_source=3C279
          target_4fgl_name=4FGL J1256.1-0547
          locked_lags=+4,+8
          reference_stage=R35H_R2
          plus4_ts_lock=2427.718553
          plus8_ts_lock=924.805371
          no_fermitools_execution=true
          no_photon_selection=true
          no_likelihood=true
          no_ts=true
          EOF
          cat > "$RUN_ID/results/R40G_DOWNLOAD_MANIFEST_LOCKED.csv" <<'EOF'
          label,lag_week,week,kind,url,expected_bytes,priority
          ANCHOR,0,286,photon,https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/photon/lat_photon_weekly_w286_p305_v001.fits,187560000,REQUIRED
          ANCHOR,0,286,spacecraft,https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/spacecraft/lat_spacecraft_weekly_w286_p310_v001.fits,2810880,REQUIRED
          TARGET_PLUS_4,4,290,photon,https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/photon/lat_photon_weekly_w290_p305_v001.fits,318951360,REQUIRED
          TARGET_PLUS_4,4,290,spacecraft,https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/spacecraft/lat_spacecraft_weekly_w290_p310_v001.fits,2862720,REQUIRED
          TARGET_PLUS_8,8,294,photon,https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/photon/lat_photon_weekly_w294_p305_v001.fits,360636480,REQUIRED
          TARGET_PLUS_8,8,294,spacecraft,https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/spacecraft/lat_spacecraft_weekly_w294_p310_v001.fits,2822400,REQUIRED
          CONTROL_PLUS_12,12,298,photon,https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/photon/lat_photon_weekly_w298_p305_v001.fits,323127360,CONTROL
          CONTROL_PLUS_12,12,298,spacecraft,https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/spacecraft/lat_spacecraft_weekly_w298_p310_v001.fits,2831040,CONTROL
          CONTROL_PLUS_16,16,302,photon,https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/photon/lat_photon_weekly_w302_p305_v001.fits,294649920,CONTROL
          CONTROL_PLUS_16,16,302,spacecraft,https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/spacecraft/lat_spacecraft_weekly_w302_p310_v001.fits,2828160,CONTROL
          CONTROL_PLUS_24,24,310,photon,https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/photon/lat_photon_weekly_w310_p305_v001.fits,199935360,CONTROL
          CONTROL_PLUS_24,24,310,spacecraft,https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/spacecraft/lat_spacecraft_weekly_w310_p310_v001.fits,2833920,CONTROL
          CONTROL_PLUS_32,32,318,photon,https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/photon/lat_photon_weekly_w318_p305_v001.fits,189610560,CONTROL
          CONTROL_PLUS_32,32,318,spacecraft,https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/spacecraft/lat_spacecraft_weekly_w318_p310_v001.fits,2802240,CONTROL
          CONTROL_PLUS_48,48,334,photon,https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/photon/lat_photon_weekly_w334_p305_v001.fits,322168320,CONTROL
          CONTROL_PLUS_48,48,334,spacecraft,https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/spacecraft/lat_spacecraft_weekly_w334_p310_v001.fits,2816640,CONTROL
          CONTROL_PLUS_64,64,350,photon,https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/photon/lat_photon_weekly_w350_p305_v001.fits,197677440,CONTROL
          CONTROL_PLUS_64,64,350,spacecraft,https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/spacecraft/lat_spacecraft_weekly_w350_p310_v001.fits,2828160,CONTROL
          CATALOG,NA,NA,4fgl_catalog,https://fermi.gsfc.nasa.gov/ssc/data/access/lat/14yr_catalog/gll_psc_v35.fit,7819200,REQUIRED
          EOF

      - name: Controlled real download with size and SHA audit
        shell: bash
        run: |
          set +e
          RUN_ID="$(cat /tmp/acirm_run_id.txt)"
          APPROVAL="${{ github.event.inputs.approval_token }}"
          SCOPE="${{ github.event.inputs.download_scope }}"
          echo "approval_token_length=${#APPROVAL}" > "$RUN_ID/logs/r40g_inputs.txt"
          echo "download_scope=$SCOPE" >> "$RUN_ID/logs/r40g_inputs.txt"
          echo "START_UTC=$(date -u +%Y-%m-%dT%H:%M:%SZ)" > "$RUN_ID/logs/run_status.txt"
          echo "label,kind,url,expected_bytes,actual_bytes,download_ok,size_ok,sha256,local_file" > "$RUN_ID/results/R40G_DOWNLOAD_RESULTS.csv"

          if [ "$APPROVAL" != "APPROVE_R40G_REAL_DOWNLOAD" ]; then
            echo "APPROVAL_MISSING_OR_WRONG" > "$RUN_ID/results/R40G_APPROVAL_STATUS.txt"
            echo "END_UTC=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$RUN_ID/logs/run_status.txt"
            exit 0
          fi

          echo "APPROVED" > "$RUN_ID/results/R40G_APPROVAL_STATUS.txt"
          TOTAL_BYTES=0
          DOWNLOADED_COUNT=0
          FAIL_COUNT=0
          EXPECTED_COUNT=0

          tail -n +2 "$RUN_ID/results/R40G_DOWNLOAD_MANIFEST_LOCKED.csv" | while IFS=, read -r LABEL LAG WEEK KIND URL EXPECTED PRIORITY; do
            DO_ROW=0
            if [ "$SCOPE" = "ALL_19" ]; then DO_ROW=1; fi
            if [ "$SCOPE" = "REQUIRED_ONLY" ] && [ "$PRIORITY" = "REQUIRED" ]; then DO_ROW=1; fi
            if [ "$DO_ROW" = "0" ]; then continue; fi
            BASENAME="$(basename "$URL")"
            LOCAL="$RUN_ID/data/${LABEL}_${KIND}_${BASENAME}"
            LOG="$RUN_ID/logs/download_${LABEL}_${KIND}.log"
            echo "Downloading $LABEL $KIND expected=$EXPECTED url=$URL"
            curl -L --fail --retry 5 --retry-delay 10 --connect-timeout 30 --max-time 3600 -o "$LOCAL" "$URL" > "$LOG" 2>&1
            RC=$?
            ACTUAL=0
            SHA="NA"
            DOK=false
            SOK=false
            if [ -f "$LOCAL" ]; then
              ACTUAL=$(stat -c%s "$LOCAL" 2>/dev/null || echo 0)
              SHA=$(sha256sum "$LOCAL" | awk '{print $1}')
            fi
            if [ "$RC" = "0" ]; then DOK=true; fi
            if [ "$ACTUAL" = "$EXPECTED" ]; then SOK=true; fi
            echo "$LABEL,$KIND,$URL,$EXPECTED,$ACTUAL,$DOK,$SOK,$SHA,$LOCAL" >> "$RUN_ID/results/R40G_DOWNLOAD_RESULTS.csv"
          done

          python3 - <<'PY'
          from pathlib import Path
          import csv
          run_id = Path('/tmp/acirm_run_id.txt').read_text().strip()
          root = Path(run_id)
          rows = list(csv.DictReader(open(root/'results'/'R40G_DOWNLOAD_RESULTS.csv', newline='', encoding='utf-8')))
          attempted = len(rows)
          downloaded = sum(1 for r in rows if r['download_ok'] == 'true')
          size_ok = sum(1 for r in rows if r['size_ok'] == 'true')
          fail = attempted - size_ok
          total = sum(int(r['actual_bytes']) for r in rows if r.get('actual_bytes','0').isdigit())
          with open(root/'results'/'R40G_DOWNLOAD_TOTALS.csv','w',encoding='utf-8') as f:
              f.write('metric,value\n')
              f.write(f'attempted_count,{attempted}\n')
              f.write(f'download_ok_count,{downloaded}\n')
              f.write(f'size_ok_count,{size_ok}\n')
              f.write(f'fail_count,{fail}\n')
              f.write(f'total_bytes,{total}\n')
              f.write(f'total_mib,{round(total/(1024**2),3)}\n')
          print('ATTEMPTED_COUNT:', attempted)
          print('DOWNLOAD_OK_COUNT:', downloaded)
          print('SIZE_OK_COUNT:', size_ok)
          print('FAIL_COUNT:', fail)
          print('TOTAL_BYTES:', total)
          print('TOTAL_MIB:', round(total/(1024**2),3))
          PY
          echo "END_UTC=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$RUN_ID/logs/run_status.txt"

      - name: Build decision and package small results only
        shell: bash
        run: |
          set +e
          RUN_ID="$(cat /tmp/acirm_run_id.txt)"
          SCOPE="${{ github.event.inputs.download_scope }}"
          APPROVAL_STATUS="$(cat "$RUN_ID/results/R40G_APPROVAL_STATUS.txt" 2>/dev/null || echo MISSING)"
          ATTEMPTED="0"
          SIZE_OK="0"
          FAIL_COUNT="0"
          TOTAL_BYTES="0"
          TOTAL_MIB="0"
          if [ -f "$RUN_ID/results/R40G_DOWNLOAD_TOTALS.csv" ]; then
            ATTEMPTED="$(awk -F, '$1=="attempted_count"{print $2}' "$RUN_ID/results/R40G_DOWNLOAD_TOTALS.csv")"
            SIZE_OK="$(awk -F, '$1=="size_ok_count"{print $2}' "$RUN_ID/results/R40G_DOWNLOAD_TOTALS.csv")"
            FAIL_COUNT="$(awk -F, '$1=="fail_count"{print $2}' "$RUN_ID/results/R40G_DOWNLOAD_TOTALS.csv")"
            TOTAL_BYTES="$(awk -F, '$1=="total_bytes"{print $2}' "$RUN_ID/results/R40G_DOWNLOAD_TOTALS.csv")"
            TOTAL_MIB="$(awk -F, '$1=="total_mib"{print $2}' "$RUN_ID/results/R40G_DOWNLOAD_TOTALS.csv")"
          fi

          EXPECTED="7"
          if [ "$SCOPE" = "ALL_19" ]; then EXPECTED="19"; fi

          if [ "$APPROVAL_STATUS" != "APPROVED" ]; then
            STATUS="R40G_APPROVAL_NOT_PROVIDED_NO_DOWNLOAD_NO_TS_NOT_PROOF"
          elif [ "$ATTEMPTED" = "$EXPECTED" ] && [ "$FAIL_COUNT" = "0" ]; then
            if [ "$SCOPE" = "ALL_19" ]; then
              STATUS="R40G_3C279_CONTROLLED_ALL19_LAT_DOWNLOAD_PASS_READY_FOR_R40H_NO_TS_NOT_PROOF"
            else
              STATUS="R40G_3C279_CONTROLLED_REQUIRED_LAT_DOWNLOAD_PASS_READY_FOR_R40H_NO_TS_NOT_PROOF"
            fi
          else
            STATUS="R40G_3C279_CONTROLLED_LAT_DOWNLOAD_PARTIAL_OR_FAILED_TECHNICAL_BLOCK_NOT_PHYSICAL_NULL"
          fi

          cat > "$RUN_ID/results/R40G_DECISION_SUMMARY.txt" <<EOF
          STATUS: $STATUS
          TARGET_SOURCE: 3C279
          LOCKED_LAGS: +4,+8
          DOWNLOAD_SCOPE: $SCOPE
          APPROVAL_STATUS: $APPROVAL_STATUS
          EXPECTED_COUNT: $EXPECTED
          ATTEMPTED_COUNT: $ATTEMPTED
          SIZE_OK_COUNT: $SIZE_OK
          FAIL_COUNT: $FAIL_COUNT
          TOTAL_BYTES: $TOTAL_BYTES
          TOTAL_MIB: $TOTAL_MIB
          NO_FERMITOOLS_EXECUTION: true
          NO_PHOTON_SELECTION: true
          NO_LIKELIHOOD: true
          NO_TS: true
          CLAIM_CEILING: controlled data download/cache audit only; not proof; not a physical result
          EOF

          cat > "$RUN_ID/results/R40G_GATES.csv" <<EOF
          gate,status
          SOURCE_LOCK,PASS
          PLUS4_PLUS8_LOCK,PASS
          APPROVAL_STATUS,$APPROVAL_STATUS
          DOWNLOAD_SCOPE,$SCOPE
          EXPECTED_COUNT,$EXPECTED
          ATTEMPTED_COUNT,$ATTEMPTED
          SIZE_OK_COUNT,$SIZE_OK
          FAIL_COUNT,$FAIL_COUNT
          NO_FERMITOOLS_EXECUTION,PASS
          NO_TS,PASS
          EOF

          cat > "$RUN_ID/results/R40H_NEXT_ACTION_PLAN.txt" <<'EOF'
          If R40G passes, next step R40H should run gtselect/gtmktime on downloaded/locked target files in the same workflow design. It must still keep +4/+8 locked and avoid rescue branches.
          EOF

          # Keep uploaded artifact small: do not upload FITS data. Keep only result CSV/logs/checksums.
          rm -rf "$RUN_ID/data"

          sha256sum "$RUN_ID"/results/* > "$RUN_ID/results/R40G_MANIFEST_SHA256.txt" 2>/dev/null || true
          ZIP_NAME="${RUN_ID}_RESULTS_PACKAGE.zip"
          zip -r "$ZIP_NAME" "$RUN_ID/results" "$RUN_ID/logs" >/dev/null
          sha256sum "$ZIP_NAME" > "$ZIP_NAME.sha256.txt"
          FINAL_SHA="$(cut -d' ' -f1 "$ZIP_NAME.sha256.txt")"
          echo "STATUS: $STATUS"
          echo "TARGET_SOURCE: 3C279"
          echo "LOCKED_LAGS: +4,+8"
          echo "DOWNLOAD_SCOPE: $SCOPE"
          echo "SIZE_OK_COUNT: $SIZE_OK/$EXPECTED"
          echo "TOTAL_BYTES: $TOTAL_BYTES"
          echo "NO_TS: true"
          echo "ZIP: $ZIP_NAME"
          echo "SHA256: $FINAL_SHA"

      - name: Upload R40G controlled download result artifact
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R40G_3C279_CONTROLLED_LAT_DOWNLOAD_NO_TS_RESULTS
          path: |
            ACIRM_R40G_3C279_CONTROLLED_LAT_DOWNLOAD_NO_TS_RESULTS_PACKAGE.zip
            ACIRM_R40G_3C279_CONTROLLED_LAT_DOWNLOAD_NO_TS_RESULTS_PACKAGE.zip.sha256.txt
          if-no-files-found: error
