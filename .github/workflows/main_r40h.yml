name: ACIRM R40H 3C279 gtselect gtmktime first real Fermitools pass no TS

on:
  workflow_dispatch:
    inputs:
      approval_token:
        description: 'Type exactly APPROVE_R40H_GTSELECT_GTMKTIME'
        required: true
        default: ''
      run_scope:
        description: 'Use TARGETS_ONLY only: +4 and +8 photon+spacecraft files'
        required: true
        default: 'TARGETS_ONLY'
        type: choice
        options:
          - TARGETS_ONLY

jobs:
  r40h-gtselect-gtmktime:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Prepare folders and locks
        shell: bash
        run: |
          set -euo pipefail
          RUN_ID="ACIRM_R40H_3C279_GTSELECT_GTMKTIME_FIRST_REAL_FERMITOOLS_PASS_NO_TS"
          echo "$RUN_ID" > /tmp/acirm_run_id.txt
          mkdir -p "$RUN_ID/results" "$RUN_ID/logs" "$RUN_ID/data" "$RUN_ID/products" "$RUN_ID/pfiles"
          cat > "$RUN_ID/results/R40H_LOCKS.txt" <<'EOF'
          target_source=3C279
          target_4fgl_name=4FGL J1256.1-0547
          ra=194.047
          dec=-5.789
          locked_lags=+4,+8
          reference_stage=R35H_R2
          energy_mev=100-300000
          roi_deg=12
          zmax=90
          evclass=128
          evtype=3
          irfs=P8R3_SOURCE_V3
          NO_LIKELIHOOD=true
          NO_TS=true
          NOT_PROOF=true
          EOF
          cat > "$RUN_ID/results/CLAIM_CEILING.txt" <<'EOF'
          R40H performs gtselect/gtmktime only on locked 3C279 +4/+8 target weeks.
          It does not run likelihood, does not compute TS, and is not proof.
          Any failure is technical unless a complete scientific likelihood stage is run later.
          EOF

      - name: Approval gate
        shell: bash
        run: |
          set -euo pipefail
          RUN_ID="$(cat /tmp/acirm_run_id.txt)"
          TOKEN='${{ github.event.inputs.approval_token }}'
          SCOPE='${{ github.event.inputs.run_scope }}'
          echo "approval_token_length=${#TOKEN}" > "$RUN_ID/logs/r40h_inputs.txt"
          echo "run_scope=$SCOPE" >> "$RUN_ID/logs/r40h_inputs.txt"
          if [ "$TOKEN" = "APPROVE_R40H_GTSELECT_GTMKTIME" ] && [ "$SCOPE" = "TARGETS_ONLY" ]; then
            echo "APPROVED" > "$RUN_ID/results/R40H_APPROVAL_STATUS.txt"
            echo "APPROVAL_STATUS=APPROVED"
          else
            echo "APPROVAL_MISSING_OR_WRONG" > "$RUN_ID/results/R40H_APPROVAL_STATUS.txt"
            echo "APPROVAL_STATUS=APPROVAL_MISSING_OR_WRONG"
          fi

      - name: Install micromamba and Fermitools environment
        shell: bash
        run: |
          set +e
          RUN_ID="$(cat /tmp/acirm_run_id.txt)"
          APPROVAL="$(cat "$RUN_ID/results/R40H_APPROVAL_STATUS.txt")"
          if [ "$APPROVAL" != "APPROVED" ]; then
            echo "Skipping install because approval was not provided." | tee "$RUN_ID/logs/install_skipped.log"
            exit 0
          fi
          set -u
          MM_ROOT="$HOME/micromamba_r40h"
          ENV_PREFIX="$HOME/acirm_fermi_env_r40h"
          echo "$ENV_PREFIX" > "$RUN_ID/logs/env_prefix.txt"
          mkdir -p "$MM_ROOT/bin"
          curl -Ls https://micro.mamba.pm/api/micromamba/linux-64/latest | tar -xvj -C "$MM_ROOT" bin/micromamba > "$RUN_ID/logs/micromamba_install.log" 2>&1
          "$MM_ROOT/bin/micromamba" --version > "$RUN_ID/logs/micromamba_version.txt" 2>&1
          "$MM_ROOT/bin/micromamba" create -y -p "$ENV_PREFIX" -c conda-forge -c fermi python=3.11 fermitools fermipy 'regions<0.12' astropy > "$RUN_ID/logs/env_create.log" 2>&1
          RC=$?
          echo "$RC" > "$RUN_ID/logs/env_create_rc.txt"
          echo "ENV_CREATE_RC=$RC"
          exit 0

      - name: Build target-only download manifest
        shell: bash
        run: |
          set -euo pipefail
          RUN_ID="$(cat /tmp/acirm_run_id.txt)"
          cat > "$RUN_ID/results/R40H_DOWNLOAD_MANIFEST.csv" <<'EOF'
          label,lag_week,week,kind,url,expected_bytes
          TARGET_PLUS_4,4,290,photon,https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/photon/lat_photon_weekly_w290_p305_v001.fits,318951360
          TARGET_PLUS_4,4,290,spacecraft,https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/spacecraft/lat_spacecraft_weekly_w290_p310_v001.fits,2862720
          TARGET_PLUS_8,8,294,photon,https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/photon/lat_photon_weekly_w294_p305_v001.fits,360636480
          TARGET_PLUS_8,8,294,spacecraft,https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/spacecraft/lat_spacecraft_weekly_w294_p310_v001.fits,2822400
          EOF

      - name: Download target +4/+8 photon and spacecraft files
        shell: bash
        run: |
          set +e
          RUN_ID="$(cat /tmp/acirm_run_id.txt)"
          APPROVAL="$(cat "$RUN_ID/results/R40H_APPROVAL_STATUS.txt")"
          echo "label,kind,url,expected_bytes,actual_bytes,download_ok,size_ok,sha256,local_file" > "$RUN_ID/results/R40H_DOWNLOAD_RESULTS.csv"
          if [ "$APPROVAL" != "APPROVED" ]; then
            echo "R40H_APPROVAL_NOT_PROVIDED_NO_DOWNLOAD_NO_TS_NOT_PROOF" > "$RUN_ID/results/R40H_STATUS_PRE.txt"
            exit 0
          fi
          tail -n +2 "$RUN_ID/results/R40H_DOWNLOAD_MANIFEST.csv" | while IFS=',' read -r label lag week kind url expected; do
            fname="${label}_${kind}_$(basename "$url")"
            out="$RUN_ID/data/$fname"
            log="$RUN_ID/logs/download_${label}_${kind}.log"
            curl -L --fail --retry 3 --retry-delay 5 --connect-timeout 30 -o "$out" "$url" > "$log" 2>&1
            rc=$?
            actual=0
            sha="NA"
            ok=false
            size_ok=false
            if [ -f "$out" ]; then
              actual=$(stat -c%s "$out")
              sha=$(sha256sum "$out" | cut -d' ' -f1)
            fi
            if [ "$rc" -eq 0 ]; then ok=true; fi
            if [ "$actual" = "$expected" ]; then size_ok=true; fi
            echo "$label,$kind,$url,$expected,$actual,$ok,$size_ok,$sha,$out" >> "$RUN_ID/results/R40H_DOWNLOAD_RESULTS.csv"
          done

      - name: Run gtselect and gtmktime for +4 and +8 only
        shell: bash
        run: |
          set +e
          RUN_ID="$(cat /tmp/acirm_run_id.txt)"
          APPROVAL="$(cat "$RUN_ID/results/R40H_APPROVAL_STATUS.txt")"
          ENV_PREFIX="$(cat "$RUN_ID/logs/env_prefix.txt" 2>/dev/null)"
          MM="$HOME/micromamba_r40h/bin/micromamba"
          echo "label,stage,returncode,output_file,output_size,notes" > "$RUN_ID/results/R40H_FERMITOOLS_COMMANDS.csv"
          if [ "$APPROVAL" != "APPROVED" ]; then
            echo "APPROVAL,SKIP,0,,0,no approval" >> "$RUN_ID/results/R40H_FERMITOOLS_COMMANDS.csv"
            exit 0
          fi
          if [ ! -x "$MM" ] || [ ! -d "$ENV_PREFIX" ]; then
            echo "ENV,FAIL,99,,0,missing micromamba or env" >> "$RUN_ID/results/R40H_FERMITOOLS_COMMANDS.csv"
            exit 0
          fi
          export PFILES="$PWD/$RUN_ID/pfiles:$ENV_PREFIX/share/fermitools/syspfiles:$ENV_PREFIX/syspfiles"
          mkdir -p "$PWD/$RUN_ID/pfiles"

          run_pair () {
            LABEL="$1"
            PHOTON="$2"
            SPACECRAFT="$3"
            SEL="$RUN_ID/products/${LABEL}_gtselect_3c279_roi12_100_300000MeV.fits"
            MK="$RUN_ID/products/${LABEL}_gtmktime_3c279_roi12_100_300000MeV.fits"
            LOG1="$RUN_ID/logs/${LABEL}_gtselect.log"
            LOG2="$RUN_ID/logs/${LABEL}_gtmktime.log"
            "$MM" run -p "$ENV_PREFIX" bash -lc "export PFILES='$PFILES'; gtselect infile='$PHOTON' outfile='$SEL' ra=194.047 dec=-5.789 rad=12 emin=100 emax=300000 zmax=90 evclass=128 evtype=3 clobber=yes mode=h" > "$LOG1" 2>&1
            RC1=$?
            SZ1=0; [ -f "$SEL" ] && SZ1=$(stat -c%s "$SEL")
            echo "$LABEL,gtselect,$RC1,$SEL,$SZ1,roi12_100_300000_zmax90_evclass128_evtype3" >> "$RUN_ID/results/R40H_FERMITOOLS_COMMANDS.csv"
            if [ "$RC1" -eq 0 ] && [ -f "$SEL" ]; then
              "$MM" run -p "$ENV_PREFIX" bash -lc "export PFILES='$PFILES'; gtmktime scfile='$SPACECRAFT' filter='(DATA_QUAL>0)&&(LAT_CONFIG==1)' roicut=yes evfile='$SEL' outfile='$MK' clobber=yes mode=h" > "$LOG2" 2>&1
              RC2=$?
            else
              echo "gtselect failed; gtmktime skipped" > "$LOG2"
              RC2=98
            fi
            SZ2=0; [ -f "$MK" ] && SZ2=$(stat -c%s "$MK")
            echo "$LABEL,gtmktime,$RC2,$MK,$SZ2,DATA_QUAL_LAT_CONFIG_roicut_yes" >> "$RUN_ID/results/R40H_FERMITOOLS_COMMANDS.csv"
          }

          run_pair TARGET_PLUS_4 "$RUN_ID/data/TARGET_PLUS_4_photon_lat_photon_weekly_w290_p305_v001.fits" "$RUN_ID/data/TARGET_PLUS_4_spacecraft_lat_spacecraft_weekly_w290_p310_v001.fits"
          run_pair TARGET_PLUS_8 "$RUN_ID/data/TARGET_PLUS_8_photon_lat_photon_weekly_w294_p305_v001.fits" "$RUN_ID/data/TARGET_PLUS_8_spacecraft_lat_spacecraft_weekly_w294_p310_v001.fits"

      - name: Inspect FITS outputs and build decision summary
        shell: bash
        run: |
          set +e
          RUN_ID="$(cat /tmp/acirm_run_id.txt)"
          ENV_PREFIX="$(cat "$RUN_ID/logs/env_prefix.txt" 2>/dev/null)"
          MM="$HOME/micromamba_r40h/bin/micromamba"
          cat > /tmp/r40h_inspect.py <<'PY'
          from pathlib import Path
          import csv, json, hashlib, os
          from datetime import datetime, timezone
          run_id = Path('/tmp/acirm_run_id.txt').read_text().strip()
          root = Path(run_id)
          approval = (root/'results'/'R40H_APPROVAL_STATUS.txt').read_text().strip() if (root/'results'/'R40H_APPROVAL_STATUS.txt').exists() else 'UNKNOWN'
          def read_csv(p):
              return list(csv.DictReader(open(p, newline='', encoding='utf-8'))) if Path(p).exists() else []
          downloads = read_csv(root/'results'/'R40H_DOWNLOAD_RESULTS.csv')
          commands = read_csv(root/'results'/'R40H_FERMITOOLS_COMMANDS.csv')
          attempted = len(downloads)
          download_ok = sum(1 for r in downloads if r.get('download_ok') == 'true')
          size_ok = sum(1 for r in downloads if r.get('size_ok') == 'true')
          total_bytes = sum(int(r.get('actual_bytes') or 0) for r in downloads)
          gtselect_ok = sum(1 for r in commands if r.get('stage') == 'gtselect' and r.get('returncode') == '0' and int(r.get('output_size') or 0) > 0)
          gtmktime_ok = sum(1 for r in commands if r.get('stage') == 'gtmktime' and r.get('returncode') == '0' and int(r.get('output_size') or 0) > 0)
          env_rc = None
          env_path = root/'logs'/'env_create_rc.txt'
          if env_path.exists():
              try: env_rc = int(env_path.read_text().strip())
              except Exception: pass
          # event audit is filled later if astropy stage runs; default unknown
          status = 'R40H_GTSELECT_GTMKTIME_NEEDS_MANUAL_REVIEW_TECHNICAL_NOT_PHYSICAL_NULL'
          if approval != 'APPROVED':
              status = 'R40H_APPROVAL_NOT_PROVIDED_NO_DOWNLOAD_NO_TS_NOT_PROOF'
          elif env_rc != 0:
              status = 'R40H_ENV_CREATE_FAILED_TECHNICAL_NOT_PHYSICAL_NULL'
          elif attempted == 4 and download_ok == 4 and size_ok == 4 and gtselect_ok == 2 and gtmktime_ok == 2:
              status = 'R40H_3C279_GTSELECT_GTMKTIME_PASS_READY_FOR_R40I_NO_TS_NOT_PROOF'
          elif attempted == 4 and size_ok == 4:
              status = 'R40H_DOWNLOAD_PASS_FERMITOOLS_PARTIAL_TECHNICAL_REVIEW_NOT_PHYSICAL_NULL'
          summary = {
              'run_id': run_id,
              'created_utc': datetime.now(timezone.utc).replace(microsecond=0).isoformat(),
              'status': status,
              'approval_status': approval,
              'env_create_rc': env_rc,
              'download_scope': 'TARGETS_ONLY',
              'attempted_count': attempted,
              'download_ok_count': download_ok,
              'size_ok_count': size_ok,
              'total_bytes': total_bytes,
              'total_mib': round(total_bytes/1024/1024, 3),
              'gtselect_ok_count': gtselect_ok,
              'gtmktime_ok_count': gtmktime_ok,
              'no_likelihood': True,
              'no_ts': True,
              'claim_ceiling': 'gtselect/gtmktime preparation only; no likelihood; no TS; not proof',
              'downloads': downloads,
              'commands': commands,
          }
          (root/'results'/'R40H_DECISION_SUMMARY.json').write_text(json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          with open(root/'results'/'R40H_GATES.csv','w',newline='',encoding='utf-8') as f:
              w=csv.writer(f); w.writerow(['gate','status'])
              w.writerow(['SOURCE_LOCK','PASS']); w.writerow(['PLUS4_PLUS8_LOCK','PASS']); w.writerow(['DOWNLOAD_SCOPE','TARGETS_ONLY'])
              w.writerow(['DOWNLOAD_SIZE_OK_COUNT',f'{size_ok}/4']); w.writerow(['GTSELECT_OK_COUNT',f'{gtselect_ok}/2']); w.writerow(['GTMKTIME_OK_COUNT',f'{gtmktime_ok}/2'])
              w.writerow(['NO_LIKELIHOOD','PASS']); w.writerow(['NO_TS','PASS'])
          print('STATUS:', status)
          print('DOWNLOAD_SCOPE: TARGETS_ONLY')
          print('SIZE_OK_COUNT:', f'{size_ok}/4')
          print('GTSELECT_OK_COUNT:', f'{gtselect_ok}/2')
          print('GTMKTIME_OK_COUNT:', f'{gtmktime_ok}/2')
          print('TOTAL_BYTES:', total_bytes)
          print('NO_TS: true')
          PY
          python /tmp/r40h_inspect.py | tee "$RUN_ID/logs/decision_stdout.txt"
          # FITS event-count audit if astropy exists in env. This does not alter the decision if it fails.
          cat > /tmp/r40h_fits_audit.py <<'PY'
          from pathlib import Path
          import csv
          from astropy.io import fits
          run_id = Path('/tmp/acirm_run_id.txt').read_text().strip()
          root = Path(run_id)
          rows=[]
          for p in sorted((root/'products').glob('*.fits')):
              try:
                  with fits.open(p, memmap=True) as hdul:
                      n = hdul[1].header.get('NAXIS2','NA') if len(hdul) > 1 else 'NA'
                      tstart = hdul[1].header.get('TSTART','NA') if len(hdul) > 1 else 'NA'
                      tstop = hdul[1].header.get('TSTOP','NA') if len(hdul) > 1 else 'NA'
                  rows.append({'file':p.name,'size_bytes':p.stat().st_size,'events':n,'tstart':tstart,'tstop':tstop,'read_ok':'true','error':''})
              except Exception as e:
                  rows.append({'file':p.name,'size_bytes':p.stat().st_size if p.exists() else 0,'events':'NA','tstart':'NA','tstop':'NA','read_ok':'false','error':repr(e)[:500]})
          with open(root/'results'/'R40H_FITS_OUTPUT_AUDIT.csv','w',newline='',encoding='utf-8') as f:
              w=csv.DictWriter(f,fieldnames=['file','size_bytes','events','tstart','tstop','read_ok','error']); w.writeheader(); w.writerows(rows)
          for r in rows:
              print('FITS_AUDIT:', r)
          PY
          if [ -x "$MM" ] && [ -d "$ENV_PREFIX" ]; then
            "$MM" run -p "$ENV_PREFIX" python /tmp/r40h_fits_audit.py > "$RUN_ID/logs/fits_audit_stdout.txt" 2>&1 || true
          fi

      - name: Manifest, remove large FITS, and package small results
        shell: bash
        run: |
          set +e
          RUN_ID="$(cat /tmp/acirm_run_id.txt)"
          # Keep only CSV/JSON/logs. Do not upload LAT FITS or selected/mktime FITS to phone/artifact.
          rm -rf "$RUN_ID/data" "$RUN_ID/products" "$RUN_ID/pfiles"
          echo "filename,size_bytes,sha256" > "$RUN_ID/results/R40H_MANIFEST_SHA256.csv"
          for f in "$RUN_ID"/results/*; do
            [ -f "$f" ] || continue
            base="$(basename "$f")"
            [ "$base" = "R40H_MANIFEST_SHA256.csv" ] && continue
            size=$(stat -c%s "$f")
            sha=$(sha256sum "$f" | cut -d' ' -f1)
            echo "$base,$size,$sha" >> "$RUN_ID/results/R40H_MANIFEST_SHA256.csv"
          done
          ZIP_NAME="${RUN_ID}_RESULTS_PACKAGE.zip"
          zip -r "$ZIP_NAME" "$RUN_ID/results" "$RUN_ID/logs" >/dev/null
          sha256sum "$ZIP_NAME" > "$ZIP_NAME.sha256.txt"
          echo "ZIP: $ZIP_NAME"
          echo "SHA256: $(cut -d' ' -f1 "$ZIP_NAME.sha256.txt")"
          SUMMARY="$RUN_ID/results/R40H_DECISION_SUMMARY.json"
          if [ -f "$SUMMARY" ]; then
            python - <<PY
          import json
          data=json.load(open('$SUMMARY'))
          print('STATUS:', data.get('status'))
          print('DOWNLOAD_SCOPE:', data.get('download_scope'))
          print('SIZE_OK_COUNT:', str(data.get('size_ok_count')) + '/4')
          print('GTSELECT_OK_COUNT:', str(data.get('gtselect_ok_count')) + '/2')
          print('GTMKTIME_OK_COUNT:', str(data.get('gtmktime_ok_count')) + '/2')
          print('TOTAL_BYTES:', data.get('total_bytes'))
          print('NO_TS:', str(data.get('no_ts')).lower())
          PY
          fi

      - name: Upload R40H small result artifact only
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R40H_3C279_GTSELECT_GTMKTIME_FIRST_REAL_FERMITOOLS_PASS_NO_TS_RESULTS
          path: |
            ACIRM_R40H_3C279_GTSELECT_GTMKTIME_FIRST_REAL_FERMITOOLS_PASS_NO_TS_RESULTS_PACKAGE.zip
            ACIRM_R40H_3C279_GTSELECT_GTMKTIME_FIRST_REAL_FERMITOOLS_PASS_NO_TS_RESULTS_PACKAGE.zip.sha256.txt
          if-no-files-found: error
