name: ACIRM R40I R3 UltraSafe gtbin no TS

on:
  workflow_dispatch:
    inputs:
      approval_token:
        description: Type APPROVE_R40I_GTBIN_COUNTS
        required: true
        default: ''

jobs:
  r40i-r3:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Run R40I R3 UltraSafe
        shell: bash
        run: |
          set +e
          RUN_ID="ACIRM_R40I_R3_ULTRASAFE_GTBIN_NO_TS"
          mkdir -p "$RUN_ID/results" "$RUN_ID/logs" "$RUN_ID/data" "$RUN_ID/products" "$RUN_ID/pfiles"
          TOKEN='${{ github.event.inputs.approval_token }}'
          echo "target_source=3C279" > "$RUN_ID/results/locks.txt"
          echo "locked_lags=+4,+8" >> "$RUN_ID/results/locks.txt"
          echo "NO_LIKELIHOOD=true" >> "$RUN_ID/results/locks.txt"
          echo "NO_TS=true" >> "$RUN_ID/results/locks.txt"
          echo "NOT_PROOF=true" >> "$RUN_ID/results/locks.txt"
          if [ "$TOKEN" != "APPROVE_R40I_GTBIN_COUNTS" ]; then
            STATUS="R40I_R3_APPROVAL_NOT_PROVIDED_NO_DOWNLOAD_NO_TS_NOT_PROOF"
            echo "STATUS: $STATUS" | tee "$RUN_ID/results/summary.txt"
            echo "SIZE_OK_COUNT: 0/4" | tee -a "$RUN_ID/results/summary.txt"
            echo "GTSELECT_OK_COUNT: 0/2" | tee -a "$RUN_ID/results/summary.txt"
            echo "GTMKTIME_OK_COUNT: 0/2" | tee -a "$RUN_ID/results/summary.txt"
            echo "GTBIN_OK_COUNT: 0/2" | tee -a "$RUN_ID/results/summary.txt"
            echo "NO_TS: true" | tee -a "$RUN_ID/results/summary.txt"
            zip -r "${RUN_ID}_RESULTS_PACKAGE.zip" "$RUN_ID/results" "$RUN_ID/logs" >/dev/null
            sha256sum "${RUN_ID}_RESULTS_PACKAGE.zip" > "${RUN_ID}_RESULTS_PACKAGE.zip.sha256.txt"
            echo "SHA256: $(cut -d' ' -f1 "${RUN_ID}_RESULTS_PACKAGE.zip.sha256.txt")"
            exit 0
          fi

          MM_ROOT="$HOME/mm_r40i3"
          ENV_PREFIX="$HOME/fermi_r40i3"
          mkdir -p "$MM_ROOT/bin"
          curl -Ls https://micro.mamba.pm/api/micromamba/linux-64/latest | tar -xvj -C "$MM_ROOT" bin/micromamba > "$RUN_ID/logs/micromamba.log" 2>&1
          "$MM_ROOT/bin/micromamba" create -y -p "$ENV_PREFIX" -c conda-forge -c fermi python=3.11 fermitools fermipy 'regions<0.12' astropy > "$RUN_ID/logs/env_create.log" 2>&1
          ENV_RC=$?
          echo "ENV_RC=$ENV_RC" | tee "$RUN_ID/logs/env_rc.txt"

          URL_P4="https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/photon/lat_photon_weekly_w290_p305_v001.fits"
          URL_S4="https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/spacecraft/lat_spacecraft_weekly_w290_p310_v001.fits"
          URL_P8="https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/photon/lat_photon_weekly_w294_p305_v001.fits"
          URL_S8="https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/spacecraft/lat_spacecraft_weekly_w294_p310_v001.fits"
          curl -L --fail --retry 3 -o "$RUN_ID/data/p4.fits" "$URL_P4" > "$RUN_ID/logs/dl_p4.log" 2>&1; D1=$?
          curl -L --fail --retry 3 -o "$RUN_ID/data/s4.fits" "$URL_S4" > "$RUN_ID/logs/dl_s4.log" 2>&1; D2=$?
          curl -L --fail --retry 3 -o "$RUN_ID/data/p8.fits" "$URL_P8" > "$RUN_ID/logs/dl_p8.log" 2>&1; D3=$?
          curl -L --fail --retry 3 -o "$RUN_ID/data/s8.fits" "$URL_S8" > "$RUN_ID/logs/dl_s8.log" 2>&1; D4=$?
          SIZE_OK=0
          [ -f "$RUN_ID/data/p4.fits" ] && [ "$(stat -c%s "$RUN_ID/data/p4.fits")" = "318951360" ] && SIZE_OK=$((SIZE_OK+1))
          [ -f "$RUN_ID/data/s4.fits" ] && [ "$(stat -c%s "$RUN_ID/data/s4.fits")" = "2862720" ] && SIZE_OK=$((SIZE_OK+1))
          [ -f "$RUN_ID/data/p8.fits" ] && [ "$(stat -c%s "$RUN_ID/data/p8.fits")" = "360636480" ] && SIZE_OK=$((SIZE_OK+1))
          [ -f "$RUN_ID/data/s8.fits" ] && [ "$(stat -c%s "$RUN_ID/data/s8.fits")" = "2822400" ] && SIZE_OK=$((SIZE_OK+1))
          TOTAL_BYTES=$(du -cb "$RUN_ID/data"/*.fits 2>/dev/null | tail -1 | cut -f1)

          export PFILES="$PWD/$RUN_ID/pfiles:$ENV_PREFIX/share/fermitools/syspfiles:$ENV_PREFIX/syspfiles"
          mkdir -p "$PWD/$RUN_ID/pfiles"
          GTSELECT_OK=0; GTMKTIME_OK=0; GTBIN_OK=0
          if [ "$ENV_RC" = "0" ] && [ "$SIZE_OK" = "4" ]; then
            "$MM_ROOT/bin/micromamba" run -p "$ENV_PREFIX" bash -lc "export PFILES='$PFILES'; gtselect infile='$RUN_ID/data/p4.fits' outfile='$RUN_ID/products/p4_sel.fits' ra=194.047 dec=-5.789 rad=12 emin=100 emax=300000 zmax=90 evclass=128 evtype=3 clobber=yes mode=h" > "$RUN_ID/logs/p4_gtselect.log" 2>&1; R1=$?
            [ "$R1" = "0" ] && [ -s "$RUN_ID/products/p4_sel.fits" ] && GTSELECT_OK=$((GTSELECT_OK+1))
            "$MM_ROOT/bin/micromamba" run -p "$ENV_PREFIX" bash -lc "export PFILES='$PFILES'; gtmktime scfile='$RUN_ID/data/s4.fits' filter='(DATA_QUAL>0)&&(LAT_CONFIG==1)' roicut=yes evfile='$RUN_ID/products/p4_sel.fits' outfile='$RUN_ID/products/p4_mk.fits' clobber=yes mode=h" > "$RUN_ID/logs/p4_gtmktime.log" 2>&1; R2=$?
            [ "$R2" = "0" ] && [ -s "$RUN_ID/products/p4_mk.fits" ] && GTMKTIME_OK=$((GTMKTIME_OK+1))
            "$MM_ROOT/bin/micromamba" run -p "$ENV_PREFIX" bash -lc "export PFILES='$PFILES'; gtbin evfile='$RUN_ID/products/p4_mk.fits' scfile='$RUN_ID/data/s4.fits' outfile='$RUN_ID/products/p4_ccube.fits' algorithm=CCUBE nxpix=120 nypix=120 binsz=0.2 coordsys=CEL xref=194.047 yref=-5.789 axisrot=0 proj=AIT ebinalg=LOG emin=100 emax=300000 enumbins=30 clobber=yes mode=h" > "$RUN_ID/logs/p4_gtbin.log" 2>&1; R3=$?
            [ "$R3" = "0" ] && [ -s "$RUN_ID/products/p4_ccube.fits" ] && GTBIN_OK=$((GTBIN_OK+1))

            "$MM_ROOT/bin/micromamba" run -p "$ENV_PREFIX" bash -lc "export PFILES='$PFILES'; gtselect infile='$RUN_ID/data/p8.fits' outfile='$RUN_ID/products/p8_sel.fits' ra=194.047 dec=-5.789 rad=12 emin=100 emax=300000 zmax=90 evclass=128 evtype=3 clobber=yes mode=h" > "$RUN_ID/logs/p8_gtselect.log" 2>&1; R4=$?
            [ "$R4" = "0" ] && [ -s "$RUN_ID/products/p8_sel.fits" ] && GTSELECT_OK=$((GTSELECT_OK+1))
            "$MM_ROOT/bin/micromamba" run -p "$ENV_PREFIX" bash -lc "export PFILES='$PFILES'; gtmktime scfile='$RUN_ID/data/s8.fits' filter='(DATA_QUAL>0)&&(LAT_CONFIG==1)' roicut=yes evfile='$RUN_ID/products/p8_sel.fits' outfile='$RUN_ID/products/p8_mk.fits' clobber=yes mode=h" > "$RUN_ID/logs/p8_gtmktime.log" 2>&1; R5=$?
            [ "$R5" = "0" ] && [ -s "$RUN_ID/products/p8_mk.fits" ] && GTMKTIME_OK=$((GTMKTIME_OK+1))
            "$MM_ROOT/bin/micromamba" run -p "$ENV_PREFIX" bash -lc "export PFILES='$PFILES'; gtbin evfile='$RUN_ID/products/p8_mk.fits' scfile='$RUN_ID/data/s8.fits' outfile='$RUN_ID/products/p8_ccube.fits' algorithm=CCUBE nxpix=120 nypix=120 binsz=0.2 coordsys=CEL xref=194.047 yref=-5.789 axisrot=0 proj=AIT ebinalg=LOG emin=100 emax=300000 enumbins=30 clobber=yes mode=h" > "$RUN_ID/logs/p8_gtbin.log" 2>&1; R6=$?
            [ "$R6" = "0" ] && [ -s "$RUN_ID/products/p8_ccube.fits" ] && GTBIN_OK=$((GTBIN_OK+1))
          fi

          STATUS="R40I_R3_TECHNICAL_BLOCK_NOT_PHYSICAL_NULL_NO_TS_NOT_PROOF"
          if [ "$ENV_RC" = "0" ] && [ "$SIZE_OK" = "4" ] && [ "$GTSELECT_OK" = "2" ] && [ "$GTMKTIME_OK" = "2" ] && [ "$GTBIN_OK" = "2" ]; then
            STATUS="R40I_R3_GTBIN_COUNTS_CUBE_PASS_READY_FOR_R40J_NO_LIKELIHOOD_NO_TS_NOT_PROOF"
          fi
          cat > "$RUN_ID/results/summary.txt" <<EOF
          STATUS: $STATUS
          DOWNLOAD_SCOPE: TARGETS_ONLY
          SIZE_OK_COUNT: $SIZE_OK/4
          GTSELECT_OK_COUNT: $GTSELECT_OK/2
          GTMKTIME_OK_COUNT: $GTMKTIME_OK/2
          GTBIN_OK_COUNT: $GTBIN_OK/2
          TOTAL_BYTES: $TOTAL_BYTES
          NO_TS: true
          NOT_PROOF: true
          EOF
          cat "$RUN_ID/results/summary.txt"
          rm -rf "$RUN_ID/data" "$RUN_ID/products" "$RUN_ID/pfiles"
          zip -r "${RUN_ID}_RESULTS_PACKAGE.zip" "$RUN_ID/results" "$RUN_ID/logs" >/dev/null
          sha256sum "${RUN_ID}_RESULTS_PACKAGE.zip" > "${RUN_ID}_RESULTS_PACKAGE.zip.sha256.txt"
          echo "SHA256: $(cut -d' ' -f1 "${RUN_ID}_RESULTS_PACKAGE.zip.sha256.txt")"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R40I_R3_ULTRASAFE_GTBIN_NO_TS_RESULTS
          path: |
            ACIRM_R40I_R3_ULTRASAFE_GTBIN_NO_TS_RESULTS_PACKAGE.zip
            ACIRM_R40I_R3_ULTRASAFE_GTBIN_NO_TS_RESULTS_PACKAGE.zip.sha256.txt
          if-no-files-found: error
