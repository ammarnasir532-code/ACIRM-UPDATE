name: ACIRM R40K R2 Real Mini 3C279 No TS

on:
  workflow_dispatch:

jobs:
  real-mini:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Real LAT mini analysis no TS
        shell: bash
        run: |
          set +e
          R=ACIRM_R40K_R2_REAL_MINI_3C279_NO_TS
          mkdir -p $R/data $R/out $R/logs $R/results
          echo "REAL_LAT_DATA=true" > $R/results/summary.txt
          echo "TARGET_SOURCE=3C279" >> $R/results/summary.txt
          echo "LOCKED_LAGS=+4,+8" >> $R/results/summary.txt
          echo "NO_LIKELIHOOD=true" >> $R/results/summary.txt
          echo "NO_TS=true" >> $R/results/summary.txt
          echo "NOT_PROOF=true" >> $R/results/summary.txt

          MM=$HOME/mm/bin/micromamba
          ENV=$HOME/fermi_env
          mkdir -p $HOME/mm/bin
          curl -Ls https://micro.mamba.pm/api/micromamba/linux-64/latest | tar -xvj -C $HOME/mm bin/micromamba > $R/logs/micromamba.log 2>&1
          $MM create -y -p $ENV -c conda-forge -c fermi python=3.11 fermitools fermipy 'regions<0.12' astropy numpy > $R/logs/env.log 2>&1
          ENV_RC=$?

          curl -L --fail --retry 3 -o $R/data/p4.fits https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/photon/lat_photon_weekly_w290_p305_v001.fits > $R/logs/dl_p4.log 2>&1; D1=$?
          curl -L --fail --retry 3 -o $R/data/s4.fits https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/spacecraft/lat_spacecraft_weekly_w290_p310_v001.fits > $R/logs/dl_s4.log 2>&1; D2=$?
          curl -L --fail --retry 3 -o $R/data/p8.fits https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/photon/lat_photon_weekly_w294_p305_v001.fits > $R/logs/dl_p8.log 2>&1; D3=$?
          curl -L --fail --retry 3 -o $R/data/s8.fits https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/spacecraft/lat_spacecraft_weekly_w294_p310_v001.fits > $R/logs/dl_s8.log 2>&1; D4=$?

          SIZE_OK=0
          [ -f $R/data/p4.fits ] && [ "$(stat -c%s $R/data/p4.fits)" = "318951360" ] && SIZE_OK=$((SIZE_OK+1))
          [ -f $R/data/s4.fits ] && [ "$(stat -c%s $R/data/s4.fits)" = "2862720" ] && SIZE_OK=$((SIZE_OK+1))
          [ -f $R/data/p8.fits ] && [ "$(stat -c%s $R/data/p8.fits)" = "360636480" ] && SIZE_OK=$((SIZE_OK+1))
          [ -f $R/data/s8.fits ] && [ "$(stat -c%s $R/data/s8.fits)" = "2822400" ] && SIZE_OK=$((SIZE_OK+1))
          TOTAL_BYTES=$(du -cb $R/data/*.fits 2>/dev/null | tail -1 | cut -f1)

          export PFILES=$PWD/$R/pfiles:$ENV/share/fermitools/syspfiles:$ENV/syspfiles
          mkdir -p $PWD/$R/pfiles
          GS=0; GM=0; GB=0; P4=NA; P8=NA
          if [ "$ENV_RC" = "0" ] && [ "$SIZE_OK" = "4" ]; then
            $MM run -p $ENV bash -lc "export PFILES='$PFILES'; gtselect infile=$R/data/p4.fits outfile=$R/out/p4_sel.fits ra=194.047 dec=-5.789 rad=12 emin=100 emax=300000 zmax=90 evclass=128 evtype=3 clobber=yes mode=h" > $R/logs/p4_gtselect.log 2>&1; [ $? = 0 ] && GS=$((GS+1))
            $MM run -p $ENV bash -lc "export PFILES='$PFILES'; gtmktime scfile=$R/data/s4.fits filter='(DATA_QUAL>0)&&(LAT_CONFIG==1)' roicut=yes evfile=$R/out/p4_sel.fits outfile=$R/out/p4_mk.fits clobber=yes mode=h" > $R/logs/p4_gtmktime.log 2>&1; [ $? = 0 ] && GM=$((GM+1))
            $MM run -p $ENV bash -lc "export PFILES='$PFILES'; gtbin evfile=$R/out/p4_mk.fits scfile=$R/data/s4.fits outfile=$R/out/p4_ccube.fits algorithm=CCUBE nxpix=120 nypix=120 binsz=0.2 coordsys=CEL xref=194.047 yref=-5.789 axisrot=0 proj=AIT ebinalg=LOG emin=100 emax=300000 enumbins=30 clobber=yes mode=h" > $R/logs/p4_gtbin.log 2>&1; [ $? = 0 ] && GB=$((GB+1))
            $MM run -p $ENV bash -lc "export PFILES='$PFILES'; gtselect infile=$R/data/p8.fits outfile=$R/out/p8_sel.fits ra=194.047 dec=-5.789 rad=12 emin=100 emax=300000 zmax=90 evclass=128 evtype=3 clobber=yes mode=h" > $R/logs/p8_gtselect.log 2>&1; [ $? = 0 ] && GS=$((GS+1))
            $MM run -p $ENV bash -lc "export PFILES='$PFILES'; gtmktime scfile=$R/data/s8.fits filter='(DATA_QUAL>0)&&(LAT_CONFIG==1)' roicut=yes evfile=$R/out/p8_sel.fits outfile=$R/out/p8_mk.fits clobber=yes mode=h" > $R/logs/p8_gtmktime.log 2>&1; [ $? = 0 ] && GM=$((GM+1))
            $MM run -p $ENV bash -lc "export PFILES='$PFILES'; gtbin evfile=$R/out/p8_mk.fits scfile=$R/data/s8.fits outfile=$R/out/p8_ccube.fits algorithm=CCUBE nxpix=120 nypix=120 binsz=0.2 coordsys=CEL xref=194.047 yref=-5.789 axisrot=0 proj=AIT ebinalg=LOG emin=100 emax=300000 enumbins=30 clobber=yes mode=h" > $R/logs/p8_gtbin.log 2>&1; [ $? = 0 ] && GB=$((GB+1))
            P4=$($MM run -p $ENV python -c "from astropy.io import fits;print(fits.getheader('$R/out/p4_mk.fits',1)['NAXIS2'])" 2>/dev/null)
            P8=$($MM run -p $ENV python -c "from astropy.io import fits;print(fits.getheader('$R/out/p8_mk.fits',1)['NAXIS2'])" 2>/dev/null)
          fi

          STATUS=R40K_R2_REAL_MINI_TECHNICAL_BLOCK_NOT_PHYSICAL_NULL_NO_TS_NOT_PROOF
          [ "$SIZE_OK" = "4" ] && [ "$GS" = "2" ] && [ "$GM" = "2" ] && [ "$GB" = "2" ] && STATUS=R40K_R2_REAL_MINI_PASS_READY_FOR_LIKELIHOOD_STAGE_NO_TS_NOT_PROOF
          echo "STATUS: $STATUS" >> $R/results/summary.txt
          echo "SIZE_OK_COUNT: $SIZE_OK/4" >> $R/results/summary.txt
          echo "GTSELECT_OK_COUNT: $GS/2" >> $R/results/summary.txt
          echo "GTMKTIME_OK_COUNT: $GM/2" >> $R/results/summary.txt
          echo "GTBIN_OK_COUNT: $GB/2" >> $R/results/summary.txt
          echo "P4_GTMKTIME_EVENTS: $P4" >> $R/results/summary.txt
          echo "P8_GTMKTIME_EVENTS: $P8" >> $R/results/summary.txt
          echo "TOTAL_BYTES: $TOTAL_BYTES" >> $R/results/summary.txt
          cat $R/results/summary.txt
          rm -rf $R/data $R/out $R/pfiles
          zip -r ${R}_RESULTS_PACKAGE.zip $R/results $R/logs >/dev/null
          sha256sum ${R}_RESULTS_PACKAGE.zip > ${R}_RESULTS_PACKAGE.zip.sha256.txt
          echo "SHA256: $(cut -d' ' -f1 ${R}_RESULTS_PACKAGE.zip.sha256.txt)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R40K_R2_REAL_MINI_3C279_NO_TS_RESULTS
          path: |
            ACIRM_R40K_R2_REAL_MINI_3C279_NO_TS_RESULTS_PACKAGE.zip
            ACIRM_R40K_R2_REAL_MINI_3C279_NO_TS_RESULTS_PACKAGE.zip.sha256.txt
