name: ACIRM R40N Real Likelihood TS Extractor Controls 3C279

on:
  workflow_dispatch:

jobs:
  r40n-real-ts-controls:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: R40N target plus controls real Fermipy likelihood
        shell: bash
        run: |
          set +e
          R=ACIRM_R40N_3C279_TS_EXTRACTOR_REPAIR_AND_CONTROL_WEEK_LIKELIHOOD_AUDIT
          mkdir -p $R/data $R/logs $R/results $R/work $R/pfiles
          echo "TARGET_SOURCE=3C279" > $R/results/summary.txt
          echo "TARGET_4FGL=4FGL J1256.1-0547" >> $R/results/summary.txt
          echo "TARGET_WEEKS=290,294" >> $R/results/summary.txt
          echo "CONTROL_WEEKS=298,302,310,318,334,350" >> $R/results/summary.txt
          echo "REAL_LAT_DATA=true" >> $R/results/summary.txt
          echo "LIKELIHOOD_AND_TS_ATTEMPTED=true" >> $R/results/summary.txt
          echo "NOT_PROOF=true" >> $R/results/summary.txt

          MM=$HOME/mm/bin/micromamba
          ENV=$HOME/fermi_env
          mkdir -p $HOME/mm/bin
          curl -Ls https://micro.mamba.pm/api/micromamba/linux-64/latest | tar -xvj -C $HOME/mm bin/micromamba > $R/logs/micromamba.log 2>&1
          $MM create -y -p $ENV -c conda-forge -c fermi python=3.11 fermitools fermipy 'regions<0.12' astropy numpy pyyaml > $R/logs/env.log 2>&1
          ENV_RC=$?

          GALDIFF=$(find "$ENV" -type f -name 'gll_iem_v07.fits' | head -1)
          ISODIFF=$(find "$ENV" -type f -name 'iso_P8R3_SOURCE_V3_v1.txt' | head -1)
          echo "GALDIFF=$GALDIFF" > $R/results/diffuse_paths.txt
          echo "ISODIFF=$ISODIFF" >> $R/results/diffuse_paths.txt

          cat > $R/results/download_manifest.csv <<'EOF'
          tag,role,week,photon,spacecraft
          P4,TARGET_PLUS4,290,lat_photon_weekly_w290_p305_v001.fits,lat_spacecraft_weekly_w290_p310_v001.fits
          P8,TARGET_PLUS8,294,lat_photon_weekly_w294_p305_v001.fits,lat_spacecraft_weekly_w294_p310_v001.fits
          C298,CONTROL,298,lat_photon_weekly_w298_p305_v001.fits,lat_spacecraft_weekly_w298_p310_v001.fits
          C302,CONTROL,302,lat_photon_weekly_w302_p305_v001.fits,lat_spacecraft_weekly_w302_p310_v001.fits
          C310,CONTROL,310,lat_photon_weekly_w310_p305_v001.fits,lat_spacecraft_weekly_w310_p310_v001.fits
          C318,CONTROL,318,lat_photon_weekly_w318_p305_v001.fits,lat_spacecraft_weekly_w318_p310_v001.fits
          C334,CONTROL,334,lat_photon_weekly_w334_p305_v001.fits,lat_spacecraft_weekly_w334_p310_v001.fits
          C350,CONTROL,350,lat_photon_weekly_w350_p305_v001.fits,lat_spacecraft_weekly_w350_p310_v001.fits
          EOF

          curl -L --fail --retry 3 -o $R/data/gll_psc_v35.fit https://fermi.gsfc.nasa.gov/ssc/data/access/lat/14yr_catalog/gll_psc_v35.fit > $R/logs/dl_catalog.log 2>&1
          CATALOG_RC=$?
          tail -n +2 $R/results/download_manifest.csv | while IFS=, read tag role week photon spacecraft; do
            curl -L --fail --retry 3 -o $R/data/${tag}_photon.fits https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/photon/$photon > $R/logs/dl_${tag}_photon.log 2>&1
            echo "$tag,photon,$?,$(stat -c%s $R/data/${tag}_photon.fits 2>/dev/null || echo 0)" >> $R/results/download_status.csv
            curl -L --fail --retry 3 -o $R/data/${tag}_spacecraft.fits https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/spacecraft/$spacecraft > $R/logs/dl_${tag}_spacecraft.log 2>&1
            echo "$tag,spacecraft,$?,$(stat -c%s $R/data/${tag}_spacecraft.fits 2>/dev/null || echo 0)" >> $R/results/download_status.csv
          done

          DOWNLOAD_OK=$(awk -F, 'NF==4 && $3==0 && $4>0 {n++} END{print n+0}' $R/results/download_status.csv 2>/dev/null)
          TOTAL_BYTES=$(du -cb $R/data/* 2>/dev/null | tail -1 | cut -f1)
          export PFILES=$PWD/$R/pfiles:$ENV/share/fermitools/syspfiles:$ENV/syspfiles
          export ACIRM_GALDIFF="$GALDIFF"
          export ACIRM_ISODIFF="$ISODIFF"

          cat > $R/work/run_r40n.py <<'PY'
          import csv, json, os, re, traceback
          from pathlib import Path
          import yaml
          from astropy.io import fits
          R = Path('ACIRM_R40N_3C279_TS_EXTRACTOR_REPAIR_AND_CONTROL_WEEK_LIKELIHOOD_AUDIT')
          TARGET = '4FGL J1256.1-0547'
          GAL = os.environ.get('ACIRM_GALDIFF','')
          ISO = os.environ.get('ACIRM_ISODIFF','')
          rows=[]
          def get_time_bounds(evfile):
              with fits.open(evfile) as hdul:
                  h = hdul['EVENTS'].header if 'EVENTS' in hdul else hdul[1].header
                  tmin, tmax = h.get('TSTART'), h.get('TSTOP')
                  if tmin is None or tmax is None:
                      data = hdul['EVENTS'].data if 'EVENTS' in hdul else hdul[1].data
                      tmin, tmax = float(data['TIME'].min()), float(data['TIME'].max())
                  return float(tmin), float(tmax)
          def get_val(src, key):
              for getter in [lambda: getattr(src,key), lambda: src[key], lambda: src.data.get(key), lambda: src.data[key]]:
                  try:
                      v = getter()
                      if v is not None: return v
                  except Exception: pass
              return 'NA'
          def log_pos():
              return {str(p):p.stat().st_size for p in R.rglob('*.log') if p.is_file()}
          def read_new(pos):
              out=''
              for p in R.rglob('*.log'):
                  try:
                      old=pos.get(str(p),0)
                      with open(p,'r',errors='ignore') as f:
                          f.seek(old); out += '\n' + f.read()
                  except Exception: pass
              return out
          def parse_ts(txt):
              pat = r'Fitting shape\s+' + re.escape(TARGET) + r'\s+TS:\s*([-+0-9.eE]+)'
              m = re.findall(pat, txt)
              if m: return m[-1]
              pat2 = re.escape(TARGET) + r'.{0,80}?TS[:=]\s*([-+0-9.eE]+)'
              m = re.findall(pat2, txt)
              return m[-1] if m else 'NA'
          def make_cfg(tag, evfile, scfile):
              outdir = str(R/'work'/('fermipy_'+tag))
              tmin,tmax = get_time_bounds(evfile)
              with open(R/'results'/'time_bounds.csv','a',encoding='utf-8') as f: f.write(f'{tag},{tmin},{tmax}\n')
              cfg = {
                'data': {'evfile': str(evfile), 'scfile': str(scfile)},
                'binning': {'roiwidth': 12.0, 'binsz': 0.2, 'binsperdec': 4, 'coordsys': 'CEL'},
                'selection': {'ra': 194.047, 'dec': -5.789, 'radius': 12.0, 'emin': 100, 'emax': 300000, 'zmax': 90, 'evclass': 128, 'evtype': 3, 'target': TARGET, 'tmin': tmin, 'tmax': tmax, 'filter': 'DATA_QUAL>0 && LAT_CONFIG==1'},
                'gtlike': {'irfs': 'P8R3_SOURCE_V3', 'edisp': False},
                'model': {'src_roiwidth': 15.0, 'galdiff': GAL, 'isodiff': ISO, 'catalogs': [str(R/'data'/'gll_psc_v35.fit')]},
                'fileio': {'outdir': outdir, 'logfile': str(R/'logs'/(tag+'_fermipy.log')), 'usescratch': False},
                'optimizer': {'optimizer': 'MINUIT', 'tol': 1e-3}
              }
              p=R/'work'/(tag+'_config.yaml')
              p.write_text(yaml.safe_dump(cfg, sort_keys=False), encoding='utf-8')
              return p
          manifest=[]
          with open(R/'results'/'download_manifest.csv', newline='', encoding='utf-8-sig') as f:
              for row in csv.DictReader(f): manifest.append(row)
          from fermipy.gtanalysis import GTAnalysis
          for item in manifest:
              tag=item['tag']; role=item['role']; week=item['week']
              rec={'tag':tag,'role':role,'week':week,'setup_ok':False,'optimize_ok':False,'fit_ok':False,'ts':'NA','ts_log':'NA','npred':'NA','flux':'NA','fit_quality':'NA','error':''}
              try:
                  cfg=make_cfg(tag, R/'data'/f'{tag}_photon.fits', R/'data'/f'{tag}_spacecraft.fits')
                  before=log_pos()
                  gta=GTAnalysis(str(cfg), logging={'verbosity':3})
                  gta.setup(); rec['setup_ok']=True
                  gta.optimize(); rec['optimize_ok']=True
                  gta.free_source(TARGET, pars='norm')
                  fitres=gta.fit(); rec['fit_ok']=True
                  try: rec['fit_quality']=fitres.get('fit_quality','NA') if isinstance(fitres,dict) else 'NA'
                  except Exception: pass
                  try:
                      src=gta.roi[TARGET]
                      rec['ts']=get_val(src,'ts'); rec['npred']=get_val(src,'npred'); rec['flux']=get_val(src,'flux')
                  except Exception: pass
                  rec['ts_log']=parse_ts(read_new(before))
                  if rec['ts']=='NA' and rec['ts_log']!='NA': rec['ts']=rec['ts_log']
              except Exception as e:
                  rec['error']=repr(e)+' '+traceback.format_exc()[-3000:].replace('\n',' ')
              rows.append(rec)
          (R/'results'/'R40N_LIKELIHOOD_RESULTS.json').write_text(json.dumps(rows,indent=2),encoding='utf-8')
          with open(R/'results'/'R40N_LIKELIHOOD_RESULTS.csv','w',newline='',encoding='utf-8') as f:
              fields=['tag','role','week','setup_ok','optimize_ok','fit_ok','ts','ts_log','npred','flux','fit_quality','error']
              w=csv.DictWriter(f,fieldnames=fields); w.writeheader(); w.writerows(rows)
          def fnum(x):
              try: return float(x)
              except Exception: return None
          target_ts=[fnum(r['ts']) for r in rows if r['role'].startswith('TARGET')]
          control_ts=[fnum(r['ts']) for r in rows if r['role']=='CONTROL']
          target_ts=[x for x in target_ts if x is not None]
          control_ts=[x for x in control_ts if x is not None]
          metrics={'fit_ok_count':sum(1 for r in rows if r['fit_ok']),'setup_ok_count':sum(1 for r in rows if r['setup_ok']),'ts_numeric_count':sum(1 for r in rows if fnum(r['ts']) is not None),'target_min_ts':min(target_ts) if target_ts else 'NA','target_sum_ts':sum(target_ts) if target_ts else 'NA','best_control_ts':max(control_ts) if control_ts else 'NA','control_numeric_count':len(control_ts)}
          if target_ts and control_ts: metrics['target_min_minus_best_control']=min(target_ts)-max(control_ts)
          else: metrics['target_min_minus_best_control']='NA'
          (R/'results'/'R40N_DECISION_METRICS.json').write_text(json.dumps(metrics,indent=2),encoding='utf-8')
          print('SETUP_OK_COUNT:', metrics['setup_ok_count'])
          print('LIKELIHOOD_FIT_OK_COUNT:', metrics['fit_ok_count'])
          print('TS_NUMERIC_COUNT:', metrics['ts_numeric_count'])
          print('TARGET_MIN_TS:', metrics['target_min_ts'])
          print('BEST_CONTROL_TS:', metrics['best_control_ts'])
          print('TARGET_MIN_MINUS_BEST_CONTROL:', metrics['target_min_minus_best_control'])
          PY

          SETUP_OK=0; FIT_OK=0; TS_NUMERIC=0; TARGET_MIN_TS=NA; BEST_CONTROL_TS=NA; MARGIN=NA
          if [ "$ENV_RC" = "0" ] && [ "$DOWNLOAD_OK" -ge "16" ] && [ -s "$GALDIFF" ] && [ -s "$ISODIFF" ] && [ -s "$R/data/gll_psc_v35.fit" ]; then
            $MM run -p $ENV bash -lc "export PFILES='$PFILES'; export ACIRM_GALDIFF='$GALDIFF'; export ACIRM_ISODIFF='$ISODIFF'; python $R/work/run_r40n.py" > $R/logs/r40n_driver.log 2>&1
            RUN_RC=$?
            SETUP_OK=$(grep 'SETUP_OK_COUNT:' $R/logs/r40n_driver.log | tail -1 | awk '{print $2}')
            FIT_OK=$(grep 'LIKELIHOOD_FIT_OK_COUNT:' $R/logs/r40n_driver.log | tail -1 | awk '{print $2}')
            TS_NUMERIC=$(grep 'TS_NUMERIC_COUNT:' $R/logs/r40n_driver.log | tail -1 | awk '{print $2}')
            TARGET_MIN_TS=$(grep 'TARGET_MIN_TS:' $R/logs/r40n_driver.log | tail -1 | cut -d' ' -f2-)
            BEST_CONTROL_TS=$(grep 'BEST_CONTROL_TS:' $R/logs/r40n_driver.log | tail -1 | cut -d' ' -f2-)
            MARGIN=$(grep 'TARGET_MIN_MINUS_BEST_CONTROL:' $R/logs/r40n_driver.log | tail -1 | cut -d' ' -f2-)
          else
            RUN_RC=999
          fi
          [ -z "$SETUP_OK" ] && SETUP_OK=0
          [ -z "$FIT_OK" ] && FIT_OK=0
          [ -z "$TS_NUMERIC" ] && TS_NUMERIC=0
          STATUS=R40N_TS_EXTRACTOR_CONTROL_AUDIT_TECHNICAL_BLOCK_NOT_PHYSICAL_NULL_NOT_PROOF
          [ "$FIT_OK" = "8" ] && [ "$TS_NUMERIC" = "8" ] && STATUS=R40N_TS_EXTRACTOR_AND_CONTROL_WEEK_LIKELIHOOD_AUDIT_COMPLETE_REVIEW_REQUIRED_NOT_PROOF
          echo "STATUS: $STATUS" >> $R/results/summary.txt
          echo "ENV_RC: $ENV_RC" >> $R/results/summary.txt
          echo "DOWNLOAD_OK_COUNT: $DOWNLOAD_OK/16" >> $R/results/summary.txt
          echo "SETUP_OK_COUNT: $SETUP_OK/8" >> $R/results/summary.txt
          echo "LIKELIHOOD_FIT_OK_COUNT: $FIT_OK/8" >> $R/results/summary.txt
          echo "TS_NUMERIC_COUNT: $TS_NUMERIC/8" >> $R/results/summary.txt
          echo "TARGET_MIN_TS: $TARGET_MIN_TS" >> $R/results/summary.txt
          echo "BEST_CONTROL_TS: $BEST_CONTROL_TS" >> $R/results/summary.txt
          echo "TARGET_MIN_MINUS_BEST_CONTROL: $MARGIN" >> $R/results/summary.txt
          echo "TOTAL_BYTES: $TOTAL_BYTES" >> $R/results/summary.txt
          echo "RUN_RC: $RUN_RC" >> $R/results/summary.txt
          echo "NO_PROOF=true" >> $R/results/summary.txt
          if [ -f $R/results/R40N_LIKELIHOOD_RESULTS.csv ]; then cat $R/results/R40N_LIKELIHOOD_RESULTS.csv >> $R/results/summary.txt; fi
          cat $R/results/summary.txt
          rm -rf $R/data $R/work $R/pfiles
          zip -r ${R}_RESULTS_PACKAGE.zip $R/results $R/logs >/dev/null
          sha256sum ${R}_RESULTS_PACKAGE.zip > ${R}_RESULTS_PACKAGE.zip.sha256.txt
          echo "SHA256: $(cut -d' ' -f1 ${R}_RESULTS_PACKAGE.zip.sha256.txt)"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R40N_3C279_TS_EXTRACTOR_REPAIR_AND_CONTROL_WEEK_LIKELIHOOD_AUDIT_RESULTS
          path: |
            ACIRM_R40N_3C279_TS_EXTRACTOR_REPAIR_AND_CONTROL_WEEK_LIKELIHOOD_AUDIT_RESULTS_PACKAGE.zip
            ACIRM_R40N_3C279_TS_EXTRACTOR_REPAIR_AND_CONTROL_WEEK_LIKELIHOOD_AUDIT_RESULTS_PACKAGE.zip.sha256.txt
